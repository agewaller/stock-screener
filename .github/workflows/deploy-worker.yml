name: Deploy Cloudflare Workers

# 全 Worker を main push で自動デプロイ + workflow_dispatch で手動実行可。
# Account ID はハードコード (Cloudflare ダッシュボード URL に表示される
# 公開 ID なので secret 化不要)。CLOUDFLARE_API_TOKEN の権限で
# Account 一覧を取れない場合でも、Workers Scripts: Edit さえあれば
# deploy は通る。

env:
  CLOUDFLARE_ACCOUNT_ID: e479bf26646b0349928aed8505418638

on:
  push:
    branches: ["main"]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - "wrangler.jsonc"
      - "wrangler.relay.jsonc"
      - "wrangler.plaud-inbox.toml"
      - "wrangler.professional-mailer.toml"
      - "wrangler.research-updater.toml"
      - "wrangler.learning.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  verify-token:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing."
            exit 1
          fi
          echo "✓ token present (length=${#T})"
          echo "--- /user/tokens/verify ---"
          curl -s -H "Authorization: Bearer $T" \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            | python3 -m json.tool || echo "(verify response not JSON)"

  deploy-anthropic-proxy:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Resolve RESEARCH_KV namespace
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          KV_NAME: stock-screener-research
        run: |
          set -euo pipefail
          echo "Resolving KV namespace: $KV_NAME"
          RAW=$(curl -fsS -H "Authorization: Bearer $T" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces?per_page=100")
          ID=$(echo "$RAW" | python3 -c "import json,os,sys; d=json.load(sys.stdin); name=os.environ['KV_NAME']; print(next((n.get('id','') for n in d.get('result',[]) if n.get('title')==name), ''))")
          if [ -z "$ID" ]; then
            echo "KV namespace not found; creating $KV_NAME"
            CREATE=$(curl -fsS -X POST \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d "{\"title\":\"$KV_NAME\"}" \
              "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/storage/kv/namespaces")
            ID=$(echo "$CREATE" | python3 -c "import json,sys; d=json.load(sys.stdin); print((d.get('result') or {}).get('id',''))")
          fi
          if [ -z "$ID" ]; then
            echo "::error::Could not resolve or create KV namespace '$KV_NAME'. Add Account → Workers KV Storage → Edit to CLOUDFLARE_API_TOKEN, or create the namespace manually and replace the placeholder in wrangler.jsonc."
            exit 1
          fi
          export RESEARCH_KV_ID="$ID"
          node -e "const fs=require('fs'); const p='wrangler.jsonc'; let s=fs.readFileSync(p,'utf8'); s=s.replace(/REPLACE_WITH_STOCK_SCREENER_RESEARCH_KV_ID/g, process.env.RESEARCH_KV_ID); if(s.includes('REPLACE_WITH_STOCK_SCREENER_RESEARCH_KV_ID')) throw new Error('KV placeholder remains'); fs.writeFileSync(p,s);"
          {
            echo "## stock-screener KV"
            echo "- namespace: \`$KV_NAME\`"
            echo "- id: \`$ID\`"
          } >> $GITHUB_STEP_SUMMARY
      - name: Deploy stock-screener
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.jsonc
      - name: Probe stock-screener custom domain
        if: always()
        run: |
          echo "Waiting 15s for DNS/cert propagation..."; sleep 15
          FINAL="000"
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/ai-probe.txt -w "%{http_code}" -m 10 \
              -X OPTIONS https://ai.cares.advisers.jp/v1/messages \
              -H "Origin: https://cares.advisers.jp" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: content-type,anthropic-version" || echo "000")
            echo "  attempt $i: HTTP $code"
            FINAL="$code"
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then break; fi
            sleep 10
          done
          {
            echo ""
            echo "## AI custom domain probe"
            echo "- endpoint: \`OPTIONS https://ai.cares.advisers.jp/v1/messages\`"
            echo "- result: \`HTTP $FINAL\`"
            echo ""
            echo '```'
            head -c 1200 /tmp/ai-probe.txt 2>/dev/null || true
            echo ''
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

  deploy-relay:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy cares-relay (service binding to stock-screener)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.relay.jsonc || echo "::warning::legacy cares-relay deploy failed (non-blocking)"
      - name: Probe cares-relay
        run: |
          sleep 8
          echo "--- probe cares-relay.agewaller.workers.dev ---"
          curl -is -o /tmp/p.txt -w "HTTP %{http_code} in %{time_total}s\n" \
            https://cares-relay.agewaller.workers.dev/ || true
          head -c 800 /tmp/p.txt

  deploy-plaud-inbox:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy Plaud inbox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.plaud-inbox.toml || echo "::warning::plaud-inbox deploy failed (non-blocking)"

  deploy-professional-mailer:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy professional mailer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.professional-mailer.toml || echo "::warning::professional-mailer deploy failed (non-blocking)"

  deploy-research-updater:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy research updater
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.research-updater.toml || echo "::warning::research-updater deploy failed (non-blocking)"

  deploy-learning-orchestrator:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy Personal Learning Companion
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.learning.toml || echo "::warning::learning-orchestrator deploy failed (non-blocking)"


name: Deploy Cloudflare Workers

on:
  push:
    branches: ["main"]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - "wrangler.jsonc"
      - "wrangler.plaud-inbox.toml"
      - "wrangler.professional-mailer.toml"
      - "wrangler.research-updater.toml"
      - "wrangler.learning.toml"
  workflow_dispatch:

jobs:
  deploy-anthropic-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Anthropic proxy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "."
          command: deploy --config wrangler.jsonc

  deploy-plaud-inbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Plaud inbox email Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "."
          command: deploy --config wrangler.plaud-inbox.toml

  deploy-professional-mailer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy professional mailer Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "."
          command: deploy --config wrangler.professional-mailer.toml

  deploy-research-updater:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy research updater Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "."
          command: deploy --config wrangler.research-updater.toml

  deploy-learning-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Personal Learning Companion Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: "."
          command: deploy --config wrangler.learning.toml

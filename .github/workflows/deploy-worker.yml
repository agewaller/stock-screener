name: Deploy Cloudflare Workers

# 全 Worker を main push で自動デプロイ + workflow_dispatch で手動実行可。
# Account ID はハードコード (Cloudflare ダッシュボード URL に表示される
# 公開 ID なので secret 化不要)。CLOUDFLARE_API_TOKEN の権限で
# Account 一覧を取れない場合でも、Workers Scripts: Edit さえあれば
# deploy は通る。

env:
  CLOUDFLARE_ACCOUNT_ID: e479bf26646b0349928aed8505418638

on:
  push:
    branches: ["main"]
    paths:
      - "worker/**"
      - "wrangler.toml"
      - "wrangler.jsonc"
      - "wrangler.relay.jsonc"
      - "wrangler.plaud-inbox.toml"
      - "wrangler.professional-mailer.toml"
      - "wrangler.research-updater.toml"
      - "wrangler.learning.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  verify-token:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing."
            exit 1
          fi
          echo "✓ token present (length=${#T})"
          echo "--- /user/tokens/verify ---"
          curl -s -H "Authorization: Bearer $T" \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            | python3 -m json.tool || echo "(verify response not JSON)"

  deploy-anthropic-proxy:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy stock-screener
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.jsonc

  deploy-relay:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy cares-relay (service binding to stock-screener)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.relay.jsonc
      - name: Probe cares-relay
        run: |
          sleep 8
          echo "--- probe cares-relay.agewaller.workers.dev ---"
          curl -is -o /tmp/p.txt -w "HTTP %{http_code} in %{time_total}s\n" \
            https://cares-relay.agewaller.workers.dev/ || true
          head -c 800 /tmp/p.txt

  deploy-plaud-inbox:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy Plaud inbox
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.plaud-inbox.toml || echo "::warning::plaud-inbox deploy failed (non-blocking)"

  deploy-professional-mailer:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy professional mailer
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.professional-mailer.toml || echo "::warning::professional-mailer deploy failed (non-blocking)"

  deploy-research-updater:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy research updater
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.research-updater.toml || echo "::warning::research-updater deploy failed (non-blocking)"

  deploy-learning-orchestrator:
    needs: verify-token
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Deploy Personal Learning Companion
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.learning.toml || echo "::warning::learning-orchestrator deploy failed (non-blocking)"


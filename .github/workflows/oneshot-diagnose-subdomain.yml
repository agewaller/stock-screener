name: Oneshot - Diagnose workers.dev subdomain (post as issue)

on:
  push:
    branches:
      - claude/health-diary-spec-IjT9N
    paths:
      - ".github/workflows/oneshot-diagnose-subdomain.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: e479bf26646b0349928aed8505418638
    steps:
      - name: Collect API responses
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          OUT=/tmp/diag.md
          {
            echo "# workers.dev Subdomain Diagnostics"
            echo ""
            echo "Run: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Account: $CLOUDFLARE_ACCOUNT_ID"
            echo ""
            echo "## 1. Token verify"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              https://api.cloudflare.com/client/v4/user/tokens/verify
            echo ""
            echo '```'
            echo ""
            echo "## 2. Account-level subdomain (GET)"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
            echo ""
            echo '```'
            echo ""
            echo "## 3. Try PUT subdomain {name: agewaller}"
            echo '```json'
            curl -s -X PUT \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d '{"name":"agewaller"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
            echo ""
            echo '```'
            echo ""
            echo "## 4. Per-Worker cares-ai-proxy subdomain (GET)"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/cares-ai-proxy/subdomain"
            echo ""
            echo '```'
            echo ""
            echo "## 5. POST per-Worker subdomain {enabled:true}"
            echo '```json'
            curl -s -X POST \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d '{"enabled":true,"previews_enabled":false}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/cares-ai-proxy/subdomain"
            echo ""
            echo '```'
            echo ""
            echo "## 6. List Access apps targeting workers.dev"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/access/apps?per_page=200" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); apps=[a for a in d.get('result',[]) if any('.workers.dev' in str(x) for x in [a.get('domain','')]+[s for s in (a.get('self_hosted_domains') or [])]+[str(r) for r in (a.get('destinations') or [])])]; print(json.dumps({'success':d.get('success'),'workers_dev_apps_count':len(apps),'apps':[{'id':a.get('id',''),'name':a.get('name'),'domain':a.get('domain'),'destinations':a.get('destinations'),'self_hosted_domains':a.get('self_hosted_domains')} for a in apps]}, indent=2, ensure_ascii=False))"
            echo '```'
            echo ""
            echo "## 7. Probe from runner"
            echo '```'
            for host in cares-ai-proxy.agewaller.workers.dev stock-screener.agewaller.workers.dev cares-relay.agewaller.workers.dev lms-api-proxy.agewaller.workers.dev; do
              code=$(curl -s -o /tmp/b.txt -w "%{http_code}" -m 8 "https://$host/" || echo "000")
              body=$(head -c 80 /tmp/b.txt 2>/dev/null)
              echo "$host: HTTP $code | $body"
            done
            echo '```'
            echo ""
            echo "## 8. All Worker scripts"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps({'success':d.get('success'),'count':len(d.get('result',[])),'names':sorted([s.get('id') for s in d.get('result',[])])}, indent=2, ensure_ascii=False))"
            echo '```'
          } > $OUT
          wc -l $OUT

      - name: Post as GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Diag: workers.dev subdomain state $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body-file /tmp/diag.md \
            --label "diagnostic" 2>&1 || \
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Diag: workers.dev subdomain state $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body-file /tmp/diag.md

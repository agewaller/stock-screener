name: Oneshot - Diagnose workers.dev subdomain (post as issue v2)

on:
  push:
    branches:
      - claude/health-diary-spec-IjT9N
    paths:
      - ".github/workflows/oneshot-diagnose-subdomain.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: e479bf26646b0349928aed8505418638
    steps:
      - name: Collect API responses
        id: collect
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          OUT=/tmp/diag.md
          {
            echo "# workers.dev Subdomain Diagnostics"
            echo ""
            echo "Run: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "## 1. Token verify"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              https://api.cloudflare.com/client/v4/user/tokens/verify
            echo ""
            echo '```'
            echo "## 2. Account-level subdomain (GET)"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
            echo ""
            echo '```'
            echo "## 3. PUT subdomain {name:agewaller}"
            echo '```json'
            curl -s -X PUT \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d '{"name":"agewaller"}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain"
            echo ""
            echo '```'
            echo "## 4. Per-Worker cares-ai-proxy subdomain (GET)"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/cares-ai-proxy/subdomain"
            echo ""
            echo '```'
            echo "## 5. POST per-Worker {enabled:true}"
            echo '```json'
            curl -s -X POST \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d '{"enabled":true,"previews_enabled":false}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/cares-ai-proxy/subdomain"
            echo ""
            echo '```'
            echo "## 6. Probe Worker URLs"
            echo '```'
            for host in cares-ai-proxy.agewaller.workers.dev stock-screener.agewaller.workers.dev; do
              code=$(curl -s -o /tmp/b.txt -w "%{http_code}" -m 8 "https://$host/" || echo "000")
              body=$(head -c 80 /tmp/b.txt 2>/dev/null)
              echo "$host: HTTP $code | $body"
            done
            echo '```'
            echo "## 7. List all Workers (sanity)"
            echo '```json'
            curl -s -H "Authorization: Bearer $T" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps({'success':d.get('success'),'names':sorted([s.get('id') for s in d.get('result',[])])}, indent=2))"
            echo '```'
          } > $OUT
          echo "Wrote $(wc -c < $OUT) bytes to $OUT"

      - name: Post results as issue (via API)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/diag.md', 'utf8');
            const now = new Date().toISOString();
            const result = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Diag: subdomain state ${now}`,
              body: body
            });
            core.info(`Created issue #${result.data.number}: ${result.data.html_url}`);

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache busting — inject commit hash into SW
        run: sed -i "s/__COMMIT_HASH__/${GITHUB_SHA::8}/g" sw.js
      # Substitute production Firebase config placeholders in
      # js/environment.js. Required Secrets must be set in
      # Settings → Secrets and variables → Actions:
      #   FB_PROD_API_KEY, FB_PROD_AUTH_DOMAIN, FB_PROD_PROJECT_ID,
      #   FB_PROD_STORAGE_BUCKET, FB_PROD_MESSAGING_SENDER_ID,
      #   FB_PROD_APP_ID, FB_PROD_MEASUREMENT_ID
      # If any is missing the script exits non-zero and the deploy
      # fails — production stays on the previously-deployed version.
      - name: Inject Firebase production config
        env:
          FB_PROD_API_KEY: ${{ secrets.FB_PROD_API_KEY }}
          FB_PROD_AUTH_DOMAIN: ${{ secrets.FB_PROD_AUTH_DOMAIN }}
          FB_PROD_PROJECT_ID: ${{ secrets.FB_PROD_PROJECT_ID }}
          FB_PROD_STORAGE_BUCKET: ${{ secrets.FB_PROD_STORAGE_BUCKET }}
          FB_PROD_MESSAGING_SENDER_ID: ${{ secrets.FB_PROD_MESSAGING_SENDER_ID }}
          FB_PROD_APP_ID: ${{ secrets.FB_PROD_APP_ID }}
          FB_PROD_MEASUREMENT_ID: ${{ secrets.FB_PROD_MEASUREMENT_ID }}
        run: bash scripts/inject-firebase-config.sh PROD
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

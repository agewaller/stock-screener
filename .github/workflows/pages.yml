name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache busting — inject commit hash into SW
        run: sed -i "s/__COMMIT_HASH__/${GITHUB_SHA::8}/g" sw.js
      - name: Generate PWA icons from og-image
        run: |
          convert og-image.png -resize 512x512 -background white -gravity center -extent 512x512 icon-512.png
          convert og-image.png -resize 192x192 -background white -gravity center -extent 192x192 icon-192.png
      - name: Stamp schema lastReviewed with today's date
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          sed -i "s/\"lastReviewed\": \"[0-9-]*\"/\"lastReviewed\": \"${TODAY}\"/" index.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

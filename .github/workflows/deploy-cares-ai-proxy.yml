name: Worker status + deploy cares-ai-proxy

# 緊急復旧: cares-ai-proxy Worker をデプロイし、現状を診断する。
# ユーザーがすでに stock-screener の ANTHROPIC_API_KEY を設定済みなので、
# その値を新 Worker にコピーするのは Cloudflare の secret 仕様 (read 不可)
# で無理。代わりに以下を実施:
#   1. アカウント配下の全 Worker を列挙
#   2. cares-ai-proxy の存在と URL を確認
#   3. cares-ai-proxy が無ければ wrangler でデプロイ (上書きせず create)
#   4. 両 Worker URL に curl で probe して状態を表示
#
# トリガー: workflow_dispatch のみ。

on:
  workflow_dispatch:

jobs:
  deploy-and-probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret missing."
            exit 1
          fi
          echo "✓ token present (length=${#T})"

      - name: Discover account ID
        id: acct
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -e
          ACC=$(curl -fsS -H "Authorization: Bearer $T" \
            https://api.cloudflare.com/client/v4/accounts)
          ACCOUNT_ID=$(echo "$ACC" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('result',[{}])[0].get('id',''))")
          if [ -z "$ACCOUNT_ID" ]; then
            echo "::error::Could not discover account ID."
            echo "$ACC" | python3 -m json.tool || true
            exit 1
          fi
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ account=$ACCOUNT_ID"

      - name: List all Workers in account
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ steps.acct.outputs.ACCOUNT_ID }}
        run: |
          set -e
          echo "--- Workers Scripts list ---"
          RAW=$(curl -fsS -H "Authorization: Bearer $T" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts" || echo '{"result":[]}')
          echo "$RAW" > /tmp/workers.json
          python3 - <<'PY'
          import json
          with open('/tmp/workers.json') as f:
            d = json.load(f)
          if not d.get('success', False):
            print('::warning::workers/scripts API returned non-success. Token may need "Workers Scripts → Read" permission.')
            print(json.dumps(d.get('errors',[]), ensure_ascii=False))
          ws = d.get('result', []) or []
          print(f'Total workers: {len(ws)}')
          for w in ws:
            print(f'  - {w.get("id","?")}  modified={w.get("modified_on","?")}')
          # Save names for later
          with open('/tmp/worker-names.txt','w') as f:
            for w in ws:
              f.write(str(w.get('id','')) + '\n')
          PY

      - name: Setup Node + wrangler
        if: always()
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy cares-ai-proxy via wrangler (creates if absent)
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.acct.outputs.ACCOUNT_ID }}
        run: |
          echo "--- npx wrangler deploy --config wrangler.jsonc ---"
          npx -y wrangler@4 deploy --config wrangler.jsonc 2>&1 | tee /tmp/deploy.txt || true

      - name: Probe stock-screener
        if: always()
        run: |
          echo "--- HEAD/GET stock-screener ---"
          curl -is -o /tmp/p1.txt -w "HTTP %{http_code} in %{time_total}s\n" \
            https://stock-screener.agewaller.workers.dev/ || true
          head -c 1200 /tmp/p1.txt
          echo ""

      - name: Probe cares-ai-proxy
        if: always()
        run: |
          echo "Waiting 6s..."; sleep 6
          echo "--- HEAD/GET cares-ai-proxy ---"
          curl -is -o /tmp/p2.txt -w "HTTP %{http_code} in %{time_total}s\n" \
            https://cares-ai-proxy.agewaller.workers.dev/ || true
          head -c 1200 /tmp/p2.txt
          echo ""

      - name: List secrets on cares-ai-proxy (names only)
        if: always()
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ steps.acct.outputs.ACCOUNT_ID }}
        run: |
          echo "--- secrets on cares-ai-proxy ---"
          curl -fsS -H "Authorization: Bearer $T" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/cares-ai-proxy/secrets" \
            | python3 -m json.tool || echo "(secrets endpoint returned non-OK; ANTHROPIC_API_KEY may not be set)"
          echo ""
          echo "--- secrets on stock-screener (for reference) ---"
          curl -fsS -H "Authorization: Bearer $T" \
            "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/workers/scripts/stock-screener/secrets" \
            | python3 -m json.tool || echo "(could not list)"

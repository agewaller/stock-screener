name: Deploy Firestore Rules

# Automatically deploy firestore.rules to the care-14c31 Firebase
# project whenever the file changes on main. Without this workflow
# the security rules would drift out of sync with the frontend
# code — for example, the admin user-management tab requires the
# admin to have read access on /users/{*}, which is controlled by
# firestore.rules.
#
# Setup (once per repo):
#   1. Run locally on your machine:
#        firebase login:ci
#      That prints a token like 1//0abc...xyz
#   2. In GitHub → Settings → Secrets and variables → Actions →
#      New repository secret:
#        Name:  FIREBASE_TOKEN
#        Value: (paste the token from step 1)
#   3. Push any change to firestore.rules on main (or trigger this
#      workflow manually from the Actions tab) — deploy happens
#      automatically.
#
# Alternatively, you can deploy manually from your machine:
#   firebase deploy --only firestore:rules --project care-14c31

on:
  push:
    branches: ["main"]
    paths:
      - "firestore.rules"
      - "firebase.json"
      - ".github/workflows/deploy-firestore-rules.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install firebase-tools
        run: npm install -g firebase-tools
      - name: Deploy firestore.rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN secret is not set. Run 'firebase login:ci' locally and add the token as a repo secret named FIREBASE_TOKEN."
            exit 1
          fi
          firebase deploy --only firestore:rules --project care-14c31 --non-interactive --token "$FIREBASE_TOKEN"

name: Deploy cares-relay Worker

# Legacy service-binding relay that forwards requests to stock-screener.
# The production AI hostname is now ai.cares.advisers.jp on the
# stock-screener Worker itself. This relay is kept for rollback and
# diagnostics only and must not own the ai.cares.advisers.jp custom
# domain.

on:
  push:
    branches: ["main"]
    paths:
      - "worker/relay.js"
      - "wrangler.relay.jsonc"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret missing."
            exit 1
          fi
          echo "✓ token present"

      - name: Discover account ID
        id: acct
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ACC=$(curl -fsS -H "Authorization: Bearer $T" \
            https://api.cloudflare.com/client/v4/accounts)
          ACCOUNT_ID=$(echo "$ACC" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('result',[{}])[0].get('id',''))")
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ account=$ACCOUNT_ID"

      - name: Deploy cares-relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.acct.outputs.ACCOUNT_ID }}
        run: |
          # pipefail 必須: これがないと wrangler が失敗しても tee の exit 0 が
          # 採用されてジョブが「成功」になる。実際に 2026-05 の認証エラーが
          # 1 か月間この緑色の成功表示に隠れて、本番が古いコードのまま
          # AI 全停止していた。
          set -o pipefail
          npx -y wrangler@4 deploy --config wrangler.relay.jsonc 2>&1 | tee /tmp/deploy.txt

      - name: Probe cares-relay
        run: |
          echo "Waiting 10s for propagation..."; sleep 10
          echo "--- HEAD/GET cares-relay.agewaller.workers.dev ---"
          curl -is -o /tmp/probe.txt -w "HTTP %{http_code} in %{time_total}s\n" \
            https://cares-relay.agewaller.workers.dev/ || true
          head -c 1500 /tmp/probe.txt
          echo ""

      # E2E: 実際の AI 呼び出しが通るか（鍵注入・モデル解決まで含めた本物のテスト）。
      # 200 + content が返れば「ブラウザから AI が使える」ことの証明になる。
      # ステータスだけで成否判定し、失敗時は本文先頭を表示して原因を見える化する。
      - name: E2E probe (POST /v1/messages)
        run: |
          echo "--- POST /v1/messages (real AI round-trip) ---"
          code=$(curl -s -o /tmp/probe-post.txt -w "%{http_code}" -m 60 \
            -X POST https://cares-relay.agewaller.workers.dev/v1/messages \
            -H "Content-Type: application/json" \
            -H "anthropic-version: 2023-06-01" \
            -H "Origin: https://cares.advisers.jp" \
            -d '{"model":"claude-haiku-4-5","max_tokens":16,"messages":[{"role":"user","content":"reply with exactly: OK"}]}' || echo "000")
          echo "HTTP $code"
          head -c 600 /tmp/probe-post.txt; echo ""
          if [ "$code" != "200" ]; then
            echo "::error::E2E AI probe failed with HTTP $code"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Deploy result" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/deploy.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no deploy log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '## Probe (legacy workers.dev)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -c 1000 /tmp/probe.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no probe)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo 'Production AI custom-domain checks run in deploy-worker.yml, not this legacy relay workflow.' >> $GITHUB_STEP_SUMMARY

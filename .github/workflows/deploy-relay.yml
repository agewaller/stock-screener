name: Deploy cares-relay Worker

# Service-binding relay that forwards requests to stock-screener,
# bypassing the Cloudflare Access protection on stock-screener's
# public URL. Auto-deploys on push when relay files change, also
# triggerable manually.

on:
  push:
    branches: ["main"]
    paths:
      - "worker/relay.js"
      - "wrangler.relay.jsonc"
      - ".github/workflows/deploy-relay.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret missing."
            exit 1
          fi
          echo "✓ token present"

      - name: Discover account ID
        id: acct
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          ACC=$(curl -fsS -H "Authorization: Bearer $T" \
            https://api.cloudflare.com/client/v4/accounts)
          ACCOUNT_ID=$(echo "$ACC" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('result',[{}])[0].get('id',''))")
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "✓ account=$ACCOUNT_ID"

      - name: Deploy cares-relay
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ steps.acct.outputs.ACCOUNT_ID }}
        run: |
          npx -y wrangler@4 deploy --config wrangler.relay.jsonc 2>&1 | tee /tmp/deploy.txt

      - name: Probe cares-relay
        run: |
          echo "Waiting 10s for propagation..."; sleep 10
          echo "--- HEAD/GET cares-relay.agewaller.workers.dev ---"
          curl -is -o /tmp/probe.txt -w "HTTP %{http_code} in %{time_total}s\n" \
            https://cares-relay.agewaller.workers.dev/ || true
          head -c 1500 /tmp/probe.txt
          echo ""
          echo "--- HEAD/GET ai.cares.advisers.jp (custom domain) ---"
          # Custom domain may need a few extra seconds for the Cloudflare
          # SSL cert + route to propagate on first registration. Retry up
          # to 6 times with 10s gaps before giving up.
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /tmp/probe-custom.txt -w "%{http_code}" -m 10 \
              -X OPTIONS https://ai.cares.advisers.jp/v1/messages \
              -H "Origin: https://cares.advisers.jp" \
              -H "Access-Control-Request-Method: POST" \
              -H "Access-Control-Request-Headers: content-type" || echo "000")
            echo "  attempt $i: HTTP $code"
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              break
            fi
            sleep 10
          done
          head -c 1500 /tmp/probe-custom.txt 2>/dev/null || true
          echo ""

      - name: Summary
        if: always()
        run: |
          echo "## Deploy result" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 /tmp/deploy.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no deploy log)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '## Probe (legacy workers.dev)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -c 1000 /tmp/probe.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no probe)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '## Probe (custom domain — ai.cares.advisers.jp)' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -c 1500 /tmp/probe-custom.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "(no probe)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # If wrangler refused to register the custom domain, surface
          # the most likely cause so the operator knows exactly which
          # token permission to add — saves a round-trip to docs.
          if grep -qiE "custom_domain|Authentication error|10000|10006|workers_routes" /tmp/deploy.txt; then
            {
              echo ''
              echo '## ⚠️ カスタムドメイン登録が失敗した可能性'
              echo ''
              echo '`ai.cares.advisers.jp` の `custom_domain: true` 登録には'
              echo '`CLOUDFLARE_API_TOKEN` に **Zone → Workers Routes → Edit** 権限が必要です。'
              echo '不足している場合は Cloudflare ダッシュボード → My Profile → API Tokens'
              echo 'で既存トークンを編集し、advisers.jp ゾーンに対する Workers Routes:Edit を追加してください。'
            } >> $GITHUB_STEP_SUMMARY
          fi

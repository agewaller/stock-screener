name: Oneshot - Enable cares-ai-proxy public subdomain

# 緊急復旧 part 2:
# cares-ai-proxy の per-Worker workers.dev 公開トグルを Cloudflare
# API で ON にする。ダッシュボードの「ドメインとルート」→ workers.dev
# →「公開」トグルと同じ操作。Access policy 削除後は GUI でも ON に
# できるはずだが、Claude Code が手元で操作できないので API で代行。
#
# 何度実行しても OK (既に ON なら no-op 相当)。

on:
  push:
    branches:
      - claude/health-diary-spec-IjT9N
    paths:
      - ".github/workflows/oneshot-enable-cares-ai-proxy-subdomain.yml"
  workflow_dispatch:

jobs:
  enable:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: e479bf26646b0349928aed8505418638
      SCRIPT_NAME: cares-ai-proxy
      TARGET_HOST: cares-ai-proxy.agewaller.workers.dev
    steps:
      - name: Verify token
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret is missing."
            exit 1
          fi
          echo "✓ token present (length=${#T})"

      - name: Check current per-Worker subdomain status
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "## Before" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -s -H "Authorization: Bearer $T" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$SCRIPT_NAME/subdomain" \
            | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Enable per-Worker subdomain (POST enabled=true)
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "## Enable result" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          # The Cloudflare API accepts POST with body {"enabled": true} to
          # turn the workers.dev subdomain on for a specific script. Some
          # accounts/zones use PATCH instead — try POST first, fall back.
          OUT=$(curl -s -X POST \
            -H "Authorization: Bearer $T" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true, "previews_enabled": false}' \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$SCRIPT_NAME/subdomain")
          echo "$OUT" | tee -a $GITHUB_STEP_SUMMARY

          # If POST didn't succeed, try PATCH
          SUCCESS=$(echo "$OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('yes' if d.get('success') else 'no')" 2>/dev/null || echo "no")
          if [ "$SUCCESS" != "yes" ]; then
            echo "POST failed, trying PATCH..." | tee -a $GITHUB_STEP_SUMMARY
            curl -s -X PATCH \
              -H "Authorization: Bearer $T" \
              -H "Content-Type: application/json" \
              -d '{"enabled": true}' \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$SCRIPT_NAME/subdomain" \
              | tee -a $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check after
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "## After" >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          curl -s -H "Authorization: Bearer $T" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/scripts/$SCRIPT_NAME/subdomain" \
            | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Probe
        run: |
          echo "## Probe" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Waiting 20s for propagation..."
          sleep 20
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -s -o /tmp/probe.txt -w "%{http_code}" -m 10 \
              "https://${TARGET_HOST}/" || echo "000")
            body=$(head -c 200 /tmp/probe.txt 2>/dev/null)
            echo "attempt $i: HTTP $code body='$body'" | tee -a $GITHUB_STEP_SUMMARY
            if [ "$code" != "403" ] && [ "$code" != "000" ]; then
              echo "✓ Worker reachable" | tee -a $GITHUB_STEP_SUMMARY
              break
            fi
            sleep 10
          done
          echo '```' >> $GITHUB_STEP_SUMMARY

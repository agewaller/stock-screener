name: Deploy staging site

# staging ブランチに push すると、サイト一式を Cloudflare Worker の
# 静的アセット (cares-staging) として配信する。本番 (main → GitHub Pages
# + 各 Worker) には一切触れない。
#
# フロー: staging で動作確認 → staging を main にマージ → 本番反映

env:
  CLOUDFLARE_ACCOUNT_ID: e479bf26646b0349928aed8505418638

on:
  push:
    branches: ["staging"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify CLOUDFLARE_API_TOKEN
        env:
          T: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$T" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN secret missing."
            exit 1
          fi
          echo "✓ token present"

      - name: Build dist (static site files only)
        run: |
          mkdir -p dist
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.githooks' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'worker' \
            --exclude 'scripts' \
            --exclude 'tests' \
            --exclude 'wrangler.*' \
            --exclude 'CLAUDE.md' \
            --exclude 'CNAME' \
            --exclude 'firebase.json' \
            --exclude 'firestore.rules' \
            ./ dist/
          echo "files: $(find dist -type f | wc -l)"

      - name: Deploy cares-staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -o pipefail
          npx -y wrangler@4 deploy --config wrangler.staging.jsonc 2>&1 | tee /tmp/deploy.txt

      - name: Probe staging site
        run: |
          sleep 8
          code=$(curl -s -o /tmp/probe.txt -w "%{http_code}" -m 15 \
            https://cares-staging.agewaller.workers.dev/ || echo "000")
          echo "HTTP $code"
          head -c 300 /tmp/probe.txt; echo ""
          if [ "$code" != "200" ]; then
            echo "::error::staging probe failed with HTTP $code"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Staging deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "URL: https://cares-staging.agewaller.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -15 /tmp/deploy.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

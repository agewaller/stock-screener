<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronicCare AI - 慢性疾患管理ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
/* ============================================================
   Chronic Disease Management Dashboard - Main Styles
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* Theme Colors - Default Dark */
  --bg-primary: #0b0d14;
  --bg-secondary: #111520;
  --bg-tertiary: #181d2a;
  --bg-card: #151a28;
  --bg-hover: #1c2235;
  --border: #252d42;
  --border-light: #2a3350;
  --accent: #6C63FF;
  --accent-light: #8B85FF;
  --accent-bg: rgba(108, 99, 255, 0.08);
  --accent-border: rgba(108, 99, 255, 0.25);
  --success: #22c55e;
  --success-bg: rgba(34, 197, 94, 0.1);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.1);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.1);
  --info: #3b82f6;
  --info-bg: rgba(59, 130, 246, 0.1);
  --text-primary: #e8edf5;
  --text-secondary: #8896b0;
  --text-muted: #5a6680;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
  --sidebar-width: 260px;
}

/* Light Theme Override */
[data-theme="light"] {
  --bg-primary: #f5f7fb;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f2f7;
  --bg-card: #ffffff;
  --bg-hover: #f0f2f7;
  --border: #e2e6ef;
  --border-light: #d5dae5;
  --accent: #6C63FF;
  --accent-light: #5b52e6;
  --accent-bg: rgba(108, 99, 255, 0.06);
  --accent-border: rgba(108, 99, 255, 0.2);
  --text-primary: #1a1f36;
  --text-secondary: #5a6680;
  --text-muted: #8896b0;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ---- Layout ---- */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text-primary);
}

.sidebar-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.sidebar-logo-text {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
}

.sidebar-logo-sub {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  display: block;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.nav-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  padding: 16px 12px 8px;
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 2px;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-border);
}

.nav-item .icon {
  width: 20px;
  text-align: center;
  font-size: 16px;
  flex-shrink: 0;
}

.nav-item .badge-count {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.sidebar-user {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: #fff;
  flex-shrink: 0;
}

.user-avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.user-info {
  flex: 1;
  min-width: 0;
}

.user-name {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-disease {
  font-size: 11px;
  color: var(--text-muted);
}

/* ---- Main Content ---- */
.main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.top-bar-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.page-content {
  padding: 24px 28px;
  max-width: 1440px;
}

.page-content:has(.login-page),
.page-content:has(.disease-select-page) {
  padding: 0;
  max-width: none;
}

/* ---- Cards ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}

.card:hover {
  border-color: var(--border-light);
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
}

.card-body {
  padding: 20px;
}

.card-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-tertiary);
}

/* ---- Grid System ---- */
.grid { display: grid; gap: 20px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-auto { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

/* ---- Stat Cards ---- */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-card-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.stat-card-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.stat-card-change {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 20px;
}

.stat-card-change.positive {
  color: var(--success);
  background: var(--success-bg);
}

.stat-card-change.negative {
  color: var(--danger);
  background: var(--danger-bg);
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-primary:hover { background: var(--accent-light); }

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--border);
}

.btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-light); }

.btn-outline {
  background: transparent;
  color: var(--accent);
  border-color: var(--accent-border);
}

.btn-outline:hover { background: var(--accent-bg); }

.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }

.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 12px 24px; font-size: 15px; }
.btn-icon { padding: 8px; min-width: 36px; }

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Form Elements ---- */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  transition: border-color var(--transition);
  outline: none;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}

.form-textarea {
  min-height: 100px;
  resize: vertical;
}

/* ---- Tags / Badges ---- */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.tag-accent { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
.tag-success { background: var(--success-bg); color: var(--success); }
.tag-warning { background: var(--warning-bg); color: var(--warning); }
.tag-danger { background: var(--danger-bg); color: var(--danger); }
.tag-info { background: var(--info-bg); color: var(--info); }

/* ---- Tabs ---- */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  overflow-x: auto;
}

.tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}

.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ---- Modal ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition);
  backdrop-filter: blur(4px);
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform var(--transition);
}

.modal-overlay.active .modal {
  transform: translateY(0);
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title { font-size: 16px; font-weight: 700; }

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ---- Timeline ---- */
.timeline {
  position: relative;
  padding-left: 28px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}

.timeline-item {
  position: relative;
  margin-bottom: 24px;
}

.timeline-dot {
  position: absolute;
  left: -24px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-card);
}

.timeline-date {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 4px;
}

.timeline-content {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ---- Health Score Gauge ---- */
.health-gauge {
  width: 180px;
  height: 180px;
  position: relative;
  margin: 0 auto;
}

.health-gauge-circle {
  transform: rotate(-90deg);
}

.health-gauge-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 10;
}

.health-gauge-progress {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}

.health-gauge-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.health-gauge-value {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
}

.health-gauge-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ---- Severity Meter ---- */
.severity-bar {
  height: 8px;
  background: var(--bg-tertiary);
  border-radius: 4px;
  overflow: hidden;
}

.severity-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ---- Action Cards ---- */
.action-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
}

.action-card:hover {
  border-color: var(--accent-border);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.action-card-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-bottom: 14px;
}

.action-card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}

.action-card-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 14px;
}

.action-card-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
}

/* ---- Data Upload Area ---- */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}

.upload-area:hover {
  border-color: var(--accent);
  background: var(--accent-bg);
}

.upload-area-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.6;
}

.upload-area-text {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.upload-area-hint {
  font-size: 12px;
  color: var(--text-muted);
}

/* ---- Chat / Conversation ---- */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 500px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.chat-message {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  max-width: 85%;
}

.chat-message.user { margin-left: auto; flex-direction: row-reverse; }

.chat-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.6;
}

.chat-message.ai .chat-bubble {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.chat-message.user .chat-bubble {
  background: var(--accent);
  color: #fff;
  border-top-right-radius: 4px;
}

.chat-input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.chat-input {
  flex: 1;
  padding: 10px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  outline: none;
}

.chat-input:focus { border-color: var(--accent); }

/* ---- Loading / Skeleton ---- */
.skeleton {
  background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Toast Notifications ---- */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast-success { background: #166534; color: #fff; }
.toast-error { background: #991b1b; color: #fff; }
.toast-info { background: #1e40af; color: #fff; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ---- Table ---- */
.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  text-align: left;
  padding: 10px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}

.data-table td {
  padding: 12px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.data-table tbody tr:hover { background: var(--bg-hover); }

/* ---- Responsive ---- */
@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0 !important; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .page-content { padding: 12px; }
  .top-bar { padding: 10px 12px; }
  .top-bar-title { font-size: 15px; }
  #menu-toggle { display: inline-flex !important; }
  .sidebar-overlay { display: block; }
  .card-header { padding: 10px 14px; }
  .card-body { padding: 12px 14px; }
  .stat-card { padding: 12px; }
  .stat-card-value { font-size: 22px; }
  .stat-card-label { font-size: 10px; }

.sidebar-overlay {

/* ---- Login Page ---- */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary);
}

.login-container {
  width: 100%;
  max-width: 440px;
  padding: 40px;
}

.login-logo {
  text-align: center;
  margin-bottom: 36px;
}

.login-logo-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
}

.login-logo h1 {
  font-size: 22px;
  font-weight: 700;
}

.login-logo p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 6px;
}

.login-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
}

.google-btn {
  width: 100%;
  padding: 14px;
  background: #fff;
  color: #333;
  border: 1px solid #ddd;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  transition: all var(--transition);
  font-family: inherit;
}

.google-btn:hover { background: #f5f5f5; box-shadow: var(--shadow); }

.login-divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
  color: var(--text-muted);
  font-size: 12px;
}

.login-divider::before, .login-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ---- Disease Selector ---- */
.disease-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin: 20px 0;
}

.disease-option {
  padding: 20px;
  background: var(--bg-tertiary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
}

.disease-option:hover { border-color: var(--accent-border); }
.disease-option.selected { border-color: var(--accent); background: var(--accent-bg); }

.disease-option-icon { font-size: 28px; margin-bottom: 8px; }
.disease-option-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.disease-option-desc { font-size: 11px; color: var(--text-muted); }

/* ---- Print ---- */
@media print {
  .sidebar, .top-bar { display: none !important; }
  .main-content { margin-left: 0 !important; }
  .card { break-inside: avoid; }
}

/* ============================================================
   State Management Store
   Simple reactive store for the application
   ============================================================ */
var Store = class Store {
  constructor() {
    this.state = {
      // Auth
      user: null,
      isAuthenticated: false,

      // App state
      currentPage: 'login',
      selectedDisease: null,
      theme: 'light',
      sidebarOpen: window.innerWidth > 768,

      // Health data
      healthScore: 0,
      symptoms: [],
      vitals: [],
      bloodTests: [],
      medications: [],
      supplements: [],
      meals: [],
      sleepData: [],
      activityData: [],
      geneticData: null,
      photos: [],
      wearableData: [],
      conversationHistory: [],

      // AI Analysis
      latestAnalysis: null,
      analysisHistory: [],
      isAnalyzing: false,

      // Actions / Recommendations
      recommendations: [],
      actionItems: [],

      // Admin
      adminMode: false,
      selectedModel: 'claude-sonnet-4-6',
      customPrompts: {},
      dashboardLayout: 'default',
      affiliateConfig: {},

      // Notifications
      notifications: [],
      unreadCount: 0
    };

    this.listeners = new Map();
    this.loadFromStorage();
  }

  get(key) {
    return this.state[key];
  }

  set(key, value) {
    const old = this.state[key];
    this.state[key] = value;
    this.notify(key, value, old);
    this.saveToStorage(key, value);
  }

  update(updates) {
    Object.entries(updates).forEach(([key, value]) => {
      this.state[key] = value;
      this.notify(key, value);
    });
    Object.keys(updates).forEach(key => this.saveToStorage(key, updates[key]));
  }

  on(key, callback) {
    if (!this.listeners.has(key)) {
      this.listeners.set(key, new Set());
    }
    this.listeners.get(key).add(callback);
    return () => this.listeners.get(key).delete(callback);
  }

  notify(key, value, old) {
    if (this.listeners.has(key)) {
      this.listeners.get(key).forEach(cb => cb(value, old));
    }
    if (this.listeners.has('*')) {
      this.listeners.get('*').forEach(cb => cb(key, value, old));
    }
  }

  // Persistence
  saveToStorage(key, value) {
    const persistKeys = [
      'user', 'isAuthenticated',
      'theme', 'selectedDisease', 'selectedModel', 'customPrompts',
      'dashboardLayout', 'affiliateConfig', 'symptoms', 'vitals',
      'bloodTests', 'medications', 'supplements', 'meals', 'sleepData',
      'activityData', 'healthScore', 'analysisHistory', 'recommendations',
      'actionItems', 'conversationHistory', 'textEntries', 'selectedDiseases', 'customDiseaseName', 'userProfile', 'calendarEvents'
    ];
    if (persistKeys.includes(key)) {
      try {
        localStorage.setItem(`cc_${key}`, JSON.stringify(value));
      } catch (e) {
        console.warn('Storage save failed:', e);
      }
    }
  }

  loadFromStorage() {
    const keys = [
      'user', 'isAuthenticated',
      'theme', 'selectedDisease', 'selectedModel', 'customPrompts',
      'dashboardLayout', 'affiliateConfig', 'symptoms', 'vitals',
      'bloodTests', 'medications', 'supplements', 'meals', 'sleepData',
      'activityData', 'healthScore', 'analysisHistory', 'recommendations',
      'actionItems', 'conversationHistory', 'textEntries', 'selectedDiseases', 'customDiseaseName', 'userProfile', 'calendarEvents'
    ];
    keys.forEach(key => {
      try {
        const val = localStorage.getItem(`cc_${key}`);
        if (val !== null) {
          this.state[key] = JSON.parse(val);
        }
      } catch (e) {
        // ignore parse errors
      }
    });
  }

  // Add health data entry
  addHealthData(category, data) {
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2),
      timestamp: new Date().toISOString(),
      category,
      ...data
    };

    const key = this.categoryToStateKey(category);
    if (key && Array.isArray(this.state[key])) {
      this.state[key] = [...this.state[key], entry];
      this.notify(key, this.state[key]);
      this.saveToStorage(key, this.state[key]);
    }

    return entry;
  }

  categoryToStateKey(category) {
    const map = {
      'vitals': 'vitals',
      'symptoms': 'symptoms',
      'blood_test': 'bloodTests',
      'medication': 'medications',
      'nutrition': 'meals',
      'sleep': 'sleepData',
      'activity': 'activityData',
      'photos': 'photos',
      'wearable': 'wearableData',
      'genetic': 'geneticData'
    };
    return map[category];
  }

  // Get data for a time range
  getDataRange(key, days = 7) {
    const data = this.state[key];
    if (!Array.isArray(data)) return [];
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    return data.filter(d => new Date(d.timestamp) >= cutoff);
  }

  // Calculate health score from recent data
  calculateHealthScore() {
    const recentSymptoms = this.getDataRange('symptoms', 7);
    if (recentSymptoms.length === 0) return 50;

    // Use simple condition_level (1-10) if available
    const conditionScores = recentSymptoms.map(s => s.condition_level).filter(v => v != null);
    if (conditionScores.length > 0) {
      const avg = conditionScores.reduce((a, b) => a + b, 0) / conditionScores.length;
      const score = Math.round(avg * 10); // 1-10 → 10-100
      this.set('healthScore', score);
      return score;
    }

    // Fallback to detailed scores
    const avgFatigue = this.avg(recentSymptoms, 'fatigue_level');
    const avgPain = this.avg(recentSymptoms, 'pain_level');
    const avgBrainFog = this.avg(recentSymptoms, 'brain_fog');
    const avgSleep = this.avg(recentSymptoms, 'sleep_quality');

    const symptomScore = Math.max(0, 100 - ((avgFatigue + avgPain + avgBrainFog) / 3) * (100 / 7));
    const sleepScore = (avgSleep / 7) * 100;

    const score = Math.round(symptomScore * 0.7 + sleepScore * 0.3);
    this.set('healthScore', score);
    return score;
  }

  avg(arr, field) {
    const vals = arr.map(d => d[field]).filter(v => v !== undefined && v !== null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  }

  // Clear all data
  clearAll() {
    localStorage.clear();
    Object.keys(this.state).forEach(key => {
      if (Array.isArray(this.state[key])) this.state[key] = [];
      else if (typeof this.state[key] === 'object' && this.state[key] !== null) this.state[key] = {};
    });
    this.state.isAuthenticated = false;
    this.state.user = null;
    this.state.currentPage = 'login';
  }
};

/* ============================================================
   AI Analysis Engine
   Handles AI model integration and prompt execution
   ============================================================ */
var AIEngine = class AIEngine {
  constructor() {
    this.apiEndpoints = {
      'claude-sonnet-4-6': '/api/anthropic',
      'claude-opus-4-6': '/api/anthropic',
      'claude-haiku-4-5': '/api/anthropic',
      'gpt-4o': '/api/openai',
      'gemini-2.5-pro': '/api/google'
    };
  }

  // Main analysis function
  async analyze(promptTemplate, userData, options = {}) {
    const modelId = options.model || store.get('selectedModel') || 'claude-sonnet-4-6';
    store.set('isAnalyzing', true);

    try {
      const prompt = this.interpolatePrompt(promptTemplate, userData);
      const result = await this.callModel(modelId, prompt, options);

      const analysis = {
        id: this.generateId(),
        timestamp: new Date().toISOString(),
        model: modelId,
        promptName: options.promptName || 'custom',
        result: result,
        parsed: this.parseAnalysisResult(result),
        userData: this.summarizeUserData(userData)
      };

      // Store analysis
      const history = store.get('analysisHistory') || [];
      history.unshift(analysis);
      if (history.length > 100) history.pop();
      store.set('analysisHistory', history);
      store.set('latestAnalysis', analysis);

      // Extract recommendations and actions
      if (analysis.parsed.recommendations) {
        store.set('recommendations', analysis.parsed.recommendations);
      }
      if (analysis.parsed.actionItems) {
        store.set('actionItems', analysis.parsed.actionItems);
      }

      return analysis;
    } catch (error) {
      console.error('Analysis error:', error);
      throw error;
    } finally {
      store.set('isAnalyzing', false);
    }
  }

  // Interpolate prompt template with user data
  interpolatePrompt(template, data) {
    const today = new Date().toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    // Build user profile string
    const profile = store.get('userProfile') || {};
    const genderMap = { male: '男性', female: '女性', other: 'その他' };
    const rangeMap = { local: '近隣のみ', prefecture: '県内', region: '関東圏・地方圏', national: '国内全域', international: '海外含む' };
    const profileStr = [
      profile.age ? `年齢: ${profile.age}歳` : '',
      profile.gender ? `性別: ${genderMap[profile.gender] || profile.gender}` : '',
      profile.height ? `身長: ${profile.height}cm` : '',
      profile.weight ? `体重: ${profile.weight}kg` : '',
      profile.location ? `居住地: ${profile.location}` : '',
      profile.travelRange ? `通院可能範囲: ${rangeMap[profile.travelRange] || profile.travelRange}` : '',
      profile.notes ? `備考: ${profile.notes}` : ''
    ].filter(Boolean).join('\n') || '未設定';

    // Build selected diseases string
    const selectedDiseases = store.get('selectedDiseases') || [];
    const diseaseNames = [];
    selectedDiseases.forEach(id => {
      for (const cat of CONFIG.DISEASE_CATEGORIES) {
        const found = cat.diseases.find(d => d.id === id);
        if (found) { diseaseNames.push(found.name); break; }
      }
    });
    const diseasesStr = diseaseNames.join('、') || (store.get('selectedDisease')?.fullName || '未設定');

    let prompt = template
      .replace(/\{\{DATE\}\}/g, today)
      .replace(/\{\{USER_PROFILE\}\}/g, profileStr)
      .replace(/\{\{SELECTED_DISEASES\}\}/g, diseasesStr)
      .replace(/\{\{LOCATION\}\}/g, profile.location || '日本')
      .replace(/\{\{USER_DATA\}\}/g, JSON.stringify(data.current || {}, null, 2))
      .replace(/\{\{WEEKLY_DATA\}\}/g, JSON.stringify(data.weekly || {}, null, 2))
      .replace(/\{\{BLOOD_TEST_DATA\}\}/g, JSON.stringify(data.bloodTests || {}, null, 2))
      .replace(/\{\{CURRENT_SUPPLEMENTS\}\}/g, JSON.stringify(data.supplements || {}, null, 2))
      .replace(/\{\{SYMPTOM_DATA\}\}/g, JSON.stringify(data.symptoms || {}, null, 2))
      .replace(/\{\{HRV_DATA\}\}/g, JSON.stringify(data.hrv || {}, null, 2))
      .replace(/\{\{ACTIVITY_DATA\}\}/g, JSON.stringify(data.activity || {}, null, 2))
      .replace(/\{\{PEM_HISTORY\}\}/g, JSON.stringify(data.pemHistory || {}, null, 2));

    return prompt;
  }

  // Call AI model API - real implementation
  async callModel(modelId, prompt, options = {}) {
    const apiKey = this.getApiKey(modelId);

    // If no API key, use local keyword analysis
    if (!apiKey) {
      console.warn('No API key for', modelId, '- using local analysis');
      return this.generateDemoAnalysis();
    }

    try {
      if (modelId.startsWith('claude-')) {
        return await this.callAnthropic(modelId, prompt, apiKey, options);
      } else if (modelId.startsWith('gpt-')) {
        return await this.callOpenAI(modelId, prompt, apiKey, options);
      } else if (modelId.startsWith('gemini-')) {
        return await this.callGoogle(modelId, prompt, apiKey, options);
      }
      throw new Error('Unknown model: ' + modelId);
    } catch (error) {
      console.error('API call failed:', error.message);
      Components.showToast('API呼び出し失敗: ' + error.message + '（ローカル分析にフォールバック）', 'error');
      return this.generateDemoAnalysis();
    }
  }

  // Anthropic Claude API (direct browser access)
  async callAnthropic(modelId, prompt, apiKey, options) {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: modelId,
        max_tokens: options.maxTokens || 4096,
        temperature: options.temperature || 0.3,
        system: 'あなたは慢性疾患管理の専門AIアシスタントです。ME/CFS（筋痛性脳脊髄炎/慢性疲労症候群）の世界的権威として、最新のエビデンスに基づいた分析とアドバイスを日本語で提供してください。出力はJSON形式を含めてください。',
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(`Anthropic API ${response.status}: ${err.error?.message || response.statusText}`);
    }

    const data = await response.json();
    return data.content?.[0]?.text || JSON.stringify(data);
  }

  // OpenAI GPT API
  async callOpenAI(modelId, prompt, apiKey, options) {
    const response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: modelId,
        messages: [
          { role: 'system', content: 'あなたは慢性疾患管理の専門AIアシスタントです。ME/CFSの世界的権威として、最新のエビデンスに基づいた分析とアドバイスを日本語で提供してください。' },
          { role: 'user', content: prompt }
        ],
        max_tokens: options.maxTokens || 4096,
        temperature: options.temperature || 0.3
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(`OpenAI API ${response.status}: ${err.error?.message || response.statusText}`);
    }

    const data = await response.json();
    return data.choices?.[0]?.message?.content || JSON.stringify(data);
  }

  // Google Gemini API
  async callGoogle(modelId, prompt, apiKey, options) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${apiKey}`;
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: {
          temperature: options.temperature || 0.3,
          maxOutputTokens: options.maxTokens || 4096
        },
        systemInstruction: { parts: [{ text: 'あなたは慢性疾患管理の専門AIアシスタントです。ME/CFSの世界的権威として回答してください。' }] }
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(`Google API ${response.status}: ${err.error?.message || response.statusText}`);
    }

    const data = await response.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || JSON.stringify(data);
  }

  // PubMed real search
  async searchPubMed(query, maxResults = 10) {
    try {
      const searchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(query)}&retmax=${maxResults}&sort=date&retmode=json`;
      const searchRes = await fetch(searchUrl);
      const searchData = await searchRes.json();
      const ids = searchData.esearchresult?.idlist || [];

      if (ids.length === 0) return [];

      const fetchUrl = `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`;
      const fetchRes = await fetch(fetchUrl);
      const fetchData = await fetchRes.json();

      return ids.map(id => {
        const article = fetchData.result?.[id];
        if (!article) return null;

        // Extract DOI properly from elocationid or articleids
        let doi = '';
        if (article.elocationid) {
          const doiMatch = article.elocationid.match(/(?:doi:\s*)?((10\.\d{4,}\/[^\s]+))/i);
          if (doiMatch) doi = doiMatch[1];
        }
        if (!doi && article.articleids) {
          const doiEntry = article.articleids.find(a => a.idtype === 'doi');
          if (doiEntry) doi = doiEntry.value;
        }

        const pubmedUrl = `https://pubmed.ncbi.nlm.nih.gov/${id}/`;

        return {
          pmid: id,
          title: article.title || '',
          authors: (article.authors || []).map(a => a.name).join(', '),
          journal: article.fulljournalname || article.source || '',
          date: article.pubdate || article.sortpubdate || '',
          doi: doi,
          url: pubmedUrl,
          // Google Translate URL for the PubMed page (translate to Japanese)
          translateUrl: `https://translate.google.com/translate?sl=en&tl=ja&u=${encodeURIComponent(pubmedUrl)}`,
          doiUrl: doi ? `https://doi.org/${doi}` : '',
          doiTranslateUrl: doi ? `https://translate.google.com/translate?sl=en&tl=ja&u=${encodeURIComponent('https://doi.org/' + doi)}` : '',
          summary: article.title
        };
      }).filter(Boolean);

  getApiKey(modelId) {
    // Check all possible key storage patterns
    const directKey = localStorage.getItem(`apikey_${modelId}`);
    if (directKey) return directKey;

    // Fallback to provider-level keys
    if (modelId.startsWith('claude-')) return localStorage.getItem('apikey_anthropic') || '';
    if (modelId.startsWith('gpt-')) return localStorage.getItem('apikey_openai') || '';
    if (modelId.startsWith('gemini-')) return localStorage.getItem('apikey_google') || '';
    return '';
  }

  // Parse analysis result into structured data
  parseAnalysisResult(result) {
    if (typeof result === 'object') return result;

    const parsed = {
      summary: '',
      recommendations: [],
      actionItems: [],
      researchUpdates: [],
      riskAlerts: [],
      raw: result
    };

    try {
      // Try to extract JSON blocks from the response
      const jsonMatch = result.match(/```json\n?([\s\S]*?)\n?```/);
      if (jsonMatch) {
        const jsonData = JSON.parse(jsonMatch[1]);
        Object.assign(parsed, jsonData);
      }
    } catch (e) {
      // Parse as structured text
      parsed.summary = result.substring(0, 500);
    }

    return parsed;
  }

  summarizeUserData(data) {
    return {
      dataPoints: Object.values(data).reduce((sum, val) =>
        sum + (Array.isArray(val) ? val.length : val ? 1 : 0), 0),
      categories: Object.keys(data).filter(k => data[k] && (Array.isArray(data[k]) ? data[k].length > 0 : true)),
      timestamp: new Date().toISOString()
    };
  }

/* ============================================================
   Affiliate & Monetization Engine
   Manages affiliate links, tracking, and revenue
   ============================================================ */
var AffiliateEngine = class AffiliateEngine {
  constructor() {
    this.config = store.get('affiliateConfig') || {};
    this.trackingData = [];
  }

  // Generate affiliate link
  generateLink(product, storeId) {
    const networks = CONFIG.AFFILIATE_NETWORKS;
    const network = networks.find(n => n.id === storeId);
    if (!network) return product.url || '#';

    const customConfig = this.config[storeId] || {};
    const tag = customConfig.tag || network.tag;

    switch (storeId) {
      case 'amazon_jp':
        return this.amazonLink(product.url || product.asin, tag);
      case 'rakuten':
        return this.rakutenLink(product.url, tag);
      case 'iherb':
        return this.iherbLink(product.url, customConfig.code || network.code);
      default:
        return this.appendTag(product.url, tag);
    }
  }

  amazonLink(urlOrAsin, tag) {
    if (urlOrAsin.startsWith('http')) {
      const url = new URL(urlOrAsin);
      url.searchParams.set('tag', tag);
      return url.toString();
    }
    return `https://www.amazon.co.jp/dp/${urlOrAsin}?tag=${tag}`;
  }

  rakutenLink(url, affiliateId) {
    return `https://hb.afl.rakuten.co.jp/hgc/${affiliateId}/?pc=${encodeURIComponent(url)}`;
  }

  iherbLink(url, code) {
    if (url && url.includes('iherb.com')) {
      const u = new URL(url);
      u.searchParams.set('rcode', code);
      return u.toString();
    }
    return `https://www.iherb.com/search?kw=${encodeURIComponent(url || '')}&rcode=${code}`;
  }

  appendTag(url, tag) {
    if (!url) return '#';
    try {
      const u = new URL(url);
      u.searchParams.set('ref', tag);
      return u.toString();
    } catch {
      return url;
    }
  }

  // Track click
  trackClick(productId, storeId, actionType) {
    const event = {
      id: Date.now().toString(36),
      timestamp: new Date().toISOString(),
      productId,
      storeId,
      actionType,
      userId: store.get('user')?.uid || 'anonymous'
    };
    this.trackingData.push(event);
    this.saveTracking();

    // Send to analytics backend if available
    this.sendAnalyticsEvent('affiliate_click', event);
  }

  // Track conversion (called via postback URL from affiliate networks)
  trackConversion(orderId, storeId, amount, currency = 'JPY') {
    const event = {
      id: Date.now().toString(36),
      timestamp: new Date().toISOString(),
      type: 'conversion',
      orderId,
      storeId,
      amount,
      currency,
      userId: store.get('user')?.uid || 'anonymous'
    };
    this.trackingData.push(event);
    this.saveTracking();
    this.sendAnalyticsEvent('affiliate_conversion', event);
  }

  // Generate product card HTML with affiliate link
  renderProductCard(product) {
    const links = (product.links || []).map(link => {
      const affiliateUrl = this.generateLink(
        { url: link.url, asin: link.asin },
        link.storeId || this.detectStore(link.url)
      );
      return `
        <a href="${affiliateUrl}" target="_blank" rel="noopener"
           class="btn btn-sm btn-outline"
           onclick="affiliateEngine.trackClick('${product.id}', '${link.storeId || ''}', 'purchase')"
           style="margin-right: 6px; margin-bottom: 6px;">
          ${link.store || link.storeId} ${link.price || ''}
        </a>
      `;
    }).join('');

    return `
      <div class="action-card" data-product-id="${product.id}">
        <div class="action-card-icon" style="background: ${product.color || 'var(--accent-bg)'}">
          ${product.icon || '💊'}
        </div>
        <div class="action-card-title">${product.title}</div>
        <div class="action-card-desc">${product.description || ''}</div>
        ${product.evidence ? `<div class="tag tag-accent" style="margin-bottom:8px">エビデンス: ${product.evidence}</div>` : ''}
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          ${links}
        </div>
        ${product.cost ? `<div class="action-card-price" style="margin-top:10px">${product.cost}</div>` : ''}
      </div>
    `;
  }

  detectStore(url) {
    if (!url) return 'custom';
    if (url.includes('amazon.co.jp') || url.includes('amzn')) return 'amazon_jp';
    if (url.includes('rakuten.co.jp')) return 'rakuten';
    if (url.includes('iherb.com')) return 'iherb';
    return 'custom';
  }

  // Admin: Update affiliate config
  updateConfig(storeId, config) {
    this.config[storeId] = { ...this.config[storeId], ...config };
    store.set('affiliateConfig', this.config);
  }

  // Admin: Get revenue report
  getRevenueReport(days = 30) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);

    const conversions = this.trackingData.filter(
      e => e.type === 'conversion' && new Date(e.timestamp) >= cutoff
    );

    const clicks = this.trackingData.filter(
      e => e.type !== 'conversion' && new Date(e.timestamp) >= cutoff
    );

    const byStore = {};
    conversions.forEach(c => {
      if (!byStore[c.storeId]) byStore[c.storeId] = { clicks: 0, conversions: 0, revenue: 0 };
      byStore[c.storeId].conversions++;
      byStore[c.storeId].revenue += c.amount || 0;
    });
    clicks.forEach(c => {
      if (!byStore[c.storeId]) byStore[c.storeId] = { clicks: 0, conversions: 0, revenue: 0 };
      byStore[c.storeId].clicks++;
    });

    return {
      totalClicks: clicks.length,
      totalConversions: conversions.length,
      totalRevenue: conversions.reduce((sum, c) => sum + (c.amount || 0), 0),
      byStore,
      period: `${days}日間`
    };
  }

  saveTracking() {
    try {
      localStorage.setItem('cc_affiliate_tracking', JSON.stringify(this.trackingData.slice(-1000)));
    } catch (e) { /* ignore */ }
  }

  loadTracking() {
    try {
      const data = localStorage.getItem('cc_affiliate_tracking');
      if (data) this.trackingData = JSON.parse(data);
    } catch (e) { /* ignore */ }
  }

  sendAnalyticsEvent(eventName, data) {
    // Send to backend analytics
    fetch('/api/analytics', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: eventName, data })
    }).catch(() => { /* silent fail for analytics */ });
  }
};

      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')

      document.body.appendChild(c);

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span>${message}</span>`;
    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 4000);

/* ============================================================
   Google Calendar Integration
   Fetches and analyzes schedule data for health insights
   ============================================================ */
var CalendarIntegration = {
  // Cache calendar events in store
  saveEvents(events) {
    // Filter out birthday duplicates and format
    const seen = new Set();
    const cleaned = events
      .filter(e => {
        if (e.eventType === 'birthday') {
          if (seen.has(e.summary)) return false;
          seen.add(e.summary);
        }
        return true;
      })
      .map(e => ({
        id: e.id,
        title: e.summary || '',
        location: e.location || '',
        start: e.start?.dateTime || e.start?.date || '',
        end: e.end?.dateTime || e.end?.date || '',
        allDay: e.allDay || false,
        type: e.eventType || 'default',
        attendees: e.numAttendees || 0,
        description: (e.description || '').replace(/<[^>]*>/g, '').substring(0, 200)
      }));

    store.set('calendarEvents', cleaned);
    return cleaned;
  },

  // Get today's events
  getToday() {
    const events = store.get('calendarEvents') || [];
    const today = new Date().toISOString().split('T')[0];
    return events.filter(e => {
      const eDate = e.start.split('T')[0];
      const eEnd = (e.end || '').split('T')[0];
      return eDate === today || (eDate <= today && eEnd > today);
    });
  },

  // Get this week's events
  getThisWeek() {
    const events = store.get('calendarEvents') || [];
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 7);

    return events.filter(e => {
      const d = new Date(e.start);
      return d >= weekStart && d < weekEnd;
    });
  },

  // Analyze schedule load for health impact
  analyzeLoad(events) {
    const nonBirthday = events.filter(e => e.type !== 'birthday');
    const meetings = nonBirthday.filter(e => !e.allDay && e.attendees > 1);
    const tasks = nonBirthday.filter(e => !e.allDay && e.attendees <= 1);
    const travel = nonBirthday.filter(e => e.allDay && e.location);

    // Calculate total hours of scheduled time
    let totalMinutes = 0;
    nonBirthday.filter(e => !e.allDay).forEach(e => {
      if (e.start && e.end) {
        const diff = (new Date(e.end) - new Date(e.start)) / 60000;
        if (diff > 0 && diff < 1440) totalMinutes += diff;
      }
    });

    const totalHours = (totalMinutes / 60).toFixed(1);
    const level = totalHours > 6 ? 'high' : totalHours > 3 ? 'medium' : 'low';

    return {
      totalEvents: nonBirthday.length,
      meetings: meetings.length,
      tasks: tasks.length,
      travel: travel.length,
      totalHours,
      level,
      advice: level === 'high'
        ? 'スケジュールが詰まっています。ME/CFS等の慢性疾患では活動過多がPEMを誘発します。休憩時間を確保してください。'
        : level === 'medium'
        ? '適度なスケジュールです。予定の間に最低30分の休憩を入れましょう。'
        : 'スケジュールに余裕があります。体調に合わせて少しずつ活動を増やせます。'
    };
  },

  // Render calendar widget for dashboard
  renderWidget() {
    const events = store.get('calendarEvents') || [];
    if (events.length === 0) {
      return `
        <div class="card" style="margin-bottom:16px">
          <div class="card-header">
            <span class="card-title">📅 スケジュール</span>
          </div>
          <div class="card-body" style="text-align:center;padding:20px;font-size:13px;color:var(--text-muted)">
            カレンダーデータがありません。連携ページからGoogleカレンダーを同期してください。
            <div style="margin-top:10px"><button class="btn btn-outline btn-sm" onclick="app.navigate('integrations')">連携設定</button></div>
          </div>
        </div>`;
    }

    const today = this.getToday();
    const week = this.getThisWeek();
    const weekAnalysis = this.analyzeLoad(week);
    const levelColors = { high: 'var(--danger)', medium: 'var(--warning)', low: 'var(--success)' };
    const levelLabels = { high: '負荷高', medium: '適度', low: '余裕' };

    const todayItems = today.filter(e => e.type !== 'birthday').slice(0, 5);
    const birthdays = today.filter(e => e.type === 'birthday');

    return `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <span class="card-title">📅 今日のスケジュール</span>
          <span class="tag" style="background:${levelColors[weekAnalysis.level]}22;color:${levelColors[weekAnalysis.level]}">${levelLabels[weekAnalysis.level]}（週${weekAnalysis.totalHours}h）</span>
        </div>
        <div class="card-body" style="padding:12px 16px">
          ${weekAnalysis.level !== 'low' ? `<div style="padding:6px 10px;background:${weekAnalysis.level === 'high' ? 'var(--danger-bg)' : 'var(--warning-bg)'};border-radius:var(--radius-sm);font-size:11px;margin-bottom:10px;color:${levelColors[weekAnalysis.level]}">${weekAnalysis.advice}</div>` : ''}
          ${todayItems.length > 0 ? todayItems.map(e => {
            const time = e.allDay ? '終日' : new Date(e.start).toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
            return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;min-width:40px">${time}</span>
              <span style="font-size:12px;flex:1">${e.title}</span>
              ${e.location ? `<span style="font-size:10px;color:var(--text-muted)">📍${e.location.substring(0, 20)}</span>` : ''}
            </div>`;
          }).join('') : '<div style="font-size:12px;color:var(--text-muted);padding:8px 0">今日の予定はありません</div>'}
          ${birthdays.length > 0 ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px">🎂 ${birthdays.map(b => b.title.replace('さんの誕生日','')).join('、')}さんの誕生日</div>` : ''}
        </div>
      </div>`;
  }
};

/* ============================================================
   External Device & Service Integrations
   iPhone / Plaud / Fitbit / Wearables
   ============================================================ */
var Integrations = {

  // ======== USER-SPECIFIC EMAIL ENDPOINT ========
  // Each user gets a unique data ingestion email address
  generateUserEmail() {
    const user = store.get('user');
    if (!user) return null;
    const hash = this.simpleHash(user.email || user.uid);
    return `data-${hash}@inbox.chroniccare.ai`;
  },

  simpleHash(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h + str.charCodeAt(i)) | 0;
    }
    return Math.abs(h).toString(36).substring(0, 8);
  },

  // ======== PLAUD INTEGRATION ========
  // Plaud sends conversation transcripts to email
  plaud: {
    connected: false,

    getIngestEmail() {
      return Integrations.generateUserEmail();
    },

    // Parse Plaud transcript text
    parseTranscript(text) {
      const lines = text.split('\n').filter(l => l.trim());
      const entries = [];
      let currentEntry = { speaker: '', text: '', timestamp: '' };

      lines.forEach(line => {
        // Plaud format: [HH:MM:SS] Speaker: text
        const match = line.match(/^\[?(\d{1,2}:\d{2}(?::\d{2})?)\]?\s*(.+?):\s*(.+)/);
        if (match) {
          if (currentEntry.text) entries.push({ ...currentEntry });
          currentEntry = { timestamp: match[1], speaker: match[2].trim(), text: match[3].trim() };
        } else if (line.trim()) {
          currentEntry.text += ' ' + line.trim();
        }
      });
      if (currentEntry.text) entries.push(currentEntry);

      return {
        type: 'plaud_transcript',
        entries: entries,
        fullText: text,
        summary: entries.map(e => `${e.speaker}: ${e.text}`).join('\n').substring(0, 500),
        wordCount: text.split(/\s+/).length,
        speakerCount: new Set(entries.map(e => e.speaker)).size
      };
    },

    // Save parsed transcript to store
    saveTranscript(parsed, metadata = {}) {
      const entry = {
        id: Date.now().toString(36) + Math.random().toString(36).substr(2),
        timestamp: metadata.date || new Date().toISOString(),
        category: 'conversation',
        type: 'plaud_transcript',
        title: metadata.title || 'Plaud会話記録',
        content: parsed.fullText,
        summary: parsed.summary,
        speakerCount: parsed.speakerCount,
        wordCount: parsed.wordCount,
        source: 'plaud'
      };

      const textEntries = store.get('textEntries') || [];
      textEntries.push(entry);
      store.set('textEntries', textEntries);

      // Also add to conversation history for AI context
      const history = store.get('conversationHistory') || [];
      history.push({
        role: 'user',
        content: `[Plaud会話記録] ${entry.title}\n${parsed.summary}`,
        timestamp: entry.timestamp,
        type: 'plaud_data'
      });
      store.set('conversationHistory', history);

      return entry;
    }
  },

  // ======== FITBIT INTEGRATION ========
  fitbit: {
    CLIENT_ID: localStorage.getItem('fitbit_client_id') || '',
    REDIRECT_URI: window.location.origin + window.location.pathname,
    SCOPES: 'activity heartrate sleep profile weight nutrition',
    accessToken: localStorage.getItem('fitbit_token') || '',
    connected: false,

    // Start OAuth2 implicit flow
    connect() {
      const clientId = localStorage.getItem('fitbit_client_id');
      if (!clientId) {
        Components.showToast('管理パネルでFitbit Client IDを設定してください', 'error');
        return;
      }

      const authUrl = 'https://www.fitbit.com/oauth2/authorize' +
        `?response_type=token` +
        `&client_id=${clientId}` +
        `&redirect_uri=${encodeURIComponent(this.REDIRECT_URI)}` +
        `&scope=${encodeURIComponent(this.SCOPES)}` +
        `&expires_in=31536000`;

      window.location.href = authUrl;
    },

    // Check URL for OAuth callback token
    checkCallback() {
      const hash = window.location.hash;
      if (hash.includes('access_token=')) {
        const params = new URLSearchParams(hash.substring(1));
        const token = params.get('access_token');
        if (token) {
          localStorage.setItem('fitbit_token', token);
          this.accessToken = token;
          this.connected = true;
          // Clean URL
          history.replaceState(null, '', window.location.pathname);
          Components.showToast('Fitbitに接続しました', 'success');
          return true;
        }
      }
      if (this.accessToken) this.connected = true;
      return false;
    },

    disconnect() {
      localStorage.removeItem('fitbit_token');
      this.accessToken = '';
      this.connected = false;
      Components.showToast('Fitbit接続を解除しました', 'info');
    },

    // Fetch data from Fitbit API
    async fetchData(endpoint) {
      if (!this.accessToken) throw new Error('Fitbit未接続');

      const response = await fetch(`https://api.fitbit.com/1/user/-/${endpoint}`, {
        headers: { 'Authorization': `Bearer ${this.accessToken}` }
      });

      if (response.status === 401) {
        this.disconnect();
        throw new Error('Fitbitトークン期限切れ。再接続してください。');
      }
      if (!response.ok) throw new Error(`Fitbit API error: ${response.status}`);

      return await response.json();
    },

    // Fetch today's summary
    async fetchDailySummary(date) {
      const d = date || new Date().toISOString().split('T')[0];
      const [activity, sleep, heart] = await Promise.allSettled([
        this.fetchData(`activities/date/${d}.json`),
        this.fetchData(`sleep/date/${d}.json`),
        this.fetchData(`activities/heart/date/${d}/1d/1min.json`)
      ]);

      return {
        date: d,
        activity: activity.status === 'fulfilled' ? activity.value : null,
        sleep: sleep.status === 'fulfilled' ? sleep.value : null,
        heart: heart.status === 'fulfilled' ? heart.value : null
      };
    },

    // Import Fitbit data into store
    async importToday() {
      try {
        const data = await this.fetchDailySummary();

        // Parse activity
        if (data.activity?.summary) {
          const a = data.activity.summary;
          store.addHealthData('activity', {
            steps: a.steps,
            active_minutes: (a.fairlyActiveMinutes || 0) + (a.veryActiveMinutes || 0),
            calories: a.caloriesOut,
            rest_time: a.sedentaryMinutes,
            source: 'fitbit'
          });
        }

        // Parse sleep
        if (data.sleep?.summary) {
          const s = data.sleep.summary;
          store.addHealthData('sleep', {
            duration: (s.totalMinutesAsleep || 0) / 60,
            deep_sleep: (s.stages?.deep || 0) / 60,
            rem_sleep: (s.stages?.rem || 0) / 60,
            awakenings: s.stages?.wake || 0,
            source: 'fitbit'
          });
        }

        // Parse heart rate
        if (data.heart?.['activities-heart']?.[0]?.value) {
          const hr = data.heart['activities-heart'][0].value;
          store.addHealthData('vitals', {
            heart_rate: hr.restingHeartRate || 0,
            hrv_data: hr.heartRateZones || [],
            source: 'fitbit'
          });
        }

        Components.showToast('Fitbitデータを取り込みました', 'success');
        return data;
      } catch (err) {
        Components.showToast('Fitbitデータ取得エラー: ' + err.message, 'error');
        throw err;
      }
    },

    // Fetch historical data (past N days)
    async importHistory(days = 7) {
      const results = [];
      for (let i = 0; i < days; i++) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        try {
          const data = await this.fetchDailySummary(dateStr);
          results.push(data);
          // Small delay to avoid rate limiting
          await new Promise(r => setTimeout(r, 500));
        } catch (err) {
          console.warn(`Fitbit data for ${dateStr} failed:`, err);
        }
      }
      Components.showToast(`${results.length}日分のFitbitデータを取り込みました`, 'success');
      return results;
    }
  },

  // ======== APPLE HEALTH / iPhone ========
  appleHealth: {
    // Parse Apple Health XML export
    parseExport(xmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      const records = doc.querySelectorAll('Record');
      const data = { vitals: [], activity: [], sleep: [], nutrition: [] };

      records.forEach(r => {
        const type = r.getAttribute('type');
        const value = parseFloat(r.getAttribute('value'));
        const date = r.getAttribute('startDate');
        const source = r.getAttribute('sourceName');

        if (isNaN(value)) return;

        switch (type) {
          case 'HKQuantityTypeIdentifierHeartRate':
            data.vitals.push({ timestamp: date, heart_rate: value, source });
            break;
          case 'HKQuantityTypeIdentifierBloodPressureSystolic':
            data.vitals.push({ timestamp: date, bp_systolic: value, source });
            break;
          case 'HKQuantityTypeIdentifierBloodPressureDiastolic':
            data.vitals.push({ timestamp: date, bp_diastolic: value, source });
            break;
          case 'HKQuantityTypeIdentifierBodyTemperature':
            data.vitals.push({ timestamp: date, temperature: value, source });
            break;
          case 'HKQuantityTypeIdentifierOxygenSaturation':
            data.vitals.push({ timestamp: date, spo2: value * 100, source });
            break;
          case 'HKQuantityTypeIdentifierStepCount':
            data.activity.push({ timestamp: date, steps: value, source });
            break;
          case 'HKQuantityTypeIdentifierActiveEnergyBurned':
            data.activity.push({ timestamp: date, calories: value, source });
            break;
          case 'HKQuantityTypeIdentifierHeartRateVariabilitySDNN':
            data.vitals.push({ timestamp: date, hrv: value, source });
            break;
          case 'HKQuantityTypeIdentifierBodyMass':
            data.vitals.push({ timestamp: date, weight: value, source });
            break;
          case 'HKQuantityTypeIdentifierRespiratoryRate':
            data.vitals.push({ timestamp: date, respiratory_rate: value, source });
            break;
        }
      });

      return data;
    },

    // Import parsed Apple Health data
    importData(parsed) {
      let count = 0;
      ['vitals', 'activity', 'sleep', 'nutrition'].forEach(cat => {
        if (parsed[cat]) {
          parsed[cat].forEach(d => {
            store.addHealthData(cat === 'vitals' ? 'vitals' : cat, { ...d, source: 'apple_health' });
            count++;
          });
        }
      });
      Components.showToast(`Apple Health: ${count}件のデータを取り込みました`, 'success');
      return count;
    },

    // Generate iOS Shortcut instructions
    getShortcutInstructions() {
      const email = Integrations.generateUserEmail();
      return {
        email,
        steps: [
          '1. iPhoneで「ショートカット」アプリを開く',
          '2.「+」で新規ショートカット作成',
          '3.「ヘルスケアサンプルを検索」アクションを追加',
          '4. 取得したいデータタイプを選択（心拍数、歩数、睡眠等）',
          '5.「テキスト」アクションで結果をCSV形式にフォーマット',
          `6.「メールを送信」アクションで宛先を ${email} に設定`,
          '7.「オートメーション」タブで毎日自動実行を設定',
          '',
          '※ または、ヘルスケアアプリ → プロフィール →「すべてのヘルスケアデータを書き出す」でXMLエクスポートし、下のアップロードエリアにドロップすることもできます。'
        ]
      };
    }
  },

  // ======== GENERIC CSV/JSON IMPORT ========
  parseCSV(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    if (lines.length < 2) return [];

    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    return lines.slice(1).map(line => {
      const values = line.split(',').map(v => v.trim().replace(/"/g, ''));
      const obj = {};
      headers.forEach((h, i) => { obj[h] = isNaN(values[i]) ? values[i] : Number(values[i]); });
      return obj;
    });
  },

  parseJSON(text) {
    try { return JSON.parse(text); }
    catch { return null; }
  },

  // Auto-detect and import file
  async importFile(file) {
    const text = await file.text();
    const name = file.name.toLowerCase();

    if (name.endsWith('.xml') && text.includes('HealthData')) {
      const parsed = this.appleHealth.parseExport(text);
      return this.appleHealth.importData(parsed);
    }

    if (name.endsWith('.csv')) {
      const rows = this.parseCSV(text);
      if (rows.length > 0) {
        rows.forEach(r => {
          const cat = r.category || r.type || 'vitals';
          store.addHealthData(cat, { ...r, source: 'csv_import' });
        });
        Components.showToast(`CSV: ${rows.length}件のデータを取り込みました`, 'success');
        return rows.length;
      }
    }

    if (name.endsWith('.json')) {
      const data = this.parseJSON(text);
      if (data) {
        if (Array.isArray(data)) {
          data.forEach(d => store.addHealthData(d.category || 'vitals', { ...d, source: 'json_import' }));
          Components.showToast(`JSON: ${data.length}件のデータを取り込みました`, 'success');
          return data.length;
        }
      }
    }

    // Treat as Plaud transcript or plain text
    if (text.length > 50) {
      const parsed = this.plaud.parseTranscript(text);
      if (parsed.entries.length > 0) {
        this.plaud.saveTranscript(parsed, { title: file.name });
        Components.showToast(`会話記録: ${parsed.entries.length}件の発言を取り込みました`, 'success');
        return parsed.entries.length;
      }

      // Plain text as diary entry
      const textEntries = store.get('textEntries') || [];
      textEntries.push({
        id: Date.now().toString(36),
        timestamp: new Date().toISOString(),
        category: 'other',
        type: 'file_import',
        title: file.name,
        content: text,
        source: 'file_import'
      });
      store.set('textEntries', textEntries);
      Components.showToast('テキストファイルを取り込みました', 'success');
      return 1;
    }

    Components.showToast('未対応のファイル形式です', 'error');
    return 0;
  }
};

/* ============================================================
   Firebase Backend - Auth + Firestore Cloud Database
   Replaces localStorage with cloud persistence
   ============================================================ */
var FirebaseBackend = {
  app: null,
  auth: null,
  db: null,
  initialized: false,
  userId: null,

  // Initialize Firebase (call once on page load)
  init(firebaseConfig) {
    if (this.initialized) return;

    try {
      // Firebase v9+ compat mode (loaded via CDN)
      this.app = firebase.initializeApp(firebaseConfig);
      this.auth = firebase.auth();
      // Persist login across browser restarts (LOCAL = survives tab/browser close)
      this.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
      this.db = firebase.firestore();

      // Enable offline persistence
      this.db.enablePersistence({ synchronizeTabs: true }).catch(err => {
        if (err.code === 'failed-precondition') {
          console.warn('Firestore persistence: multiple tabs open');
        } else if (err.code === 'unimplemented') {
          console.warn('Firestore persistence: browser not supported');
        }
      });

      // Listen for auth state changes
      this.auth.onAuthStateChanged(user => {
        if (user) {
          this.userId = user.uid;
          const userData = {
            uid: user.uid,
            displayName: user.displayName,
            email: user.email,
            photoURL: user.photoURL
          };
          store.update({ user: userData, isAuthenticated: true });

          // Update sidebar user info
          const avatarEl = document.getElementById('user-avatar');
          const nameEl = document.getElementById('user-name');
          if (avatarEl) {
            if (user.photoURL) {
              avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
            } else {
              avatarEl.textContent = (user.displayName || user.email || '?')[0];
            }
          }
          if (nameEl) nameEl.textContent = user.displayName || user.email;

          // Load user data from Firestore
          this.loadAllData();

          // Navigate to appropriate page
          if (app.currentPage === 'login') {
            const disease = store.get('selectedDisease');
            app.navigate(disease ? 'dashboard' : 'disease-select');
          }
        } else {
          this.userId = null;
          store.update({ user: null, isAuthenticated: false });
          app.navigate('login');
        }
      });

      this.initialized = true;
      console.log('Firebase initialized');
    } catch (err) {
      console.error('Firebase init failed:', err);
      Components.showToast('Firebase初期化エラー: ' + err.message, 'error');
    }
  },

  // ---- Authentication ----
  async signInWithGoogle() {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      const result = await this.auth.signInWithPopup(provider);
      Components.showToast(`${result.user.displayName || result.user.email} でログインしました`, 'success');
      return result.user;
    } catch (err) {
      if (err.code === 'auth/popup-closed-by-user') return null;
      Components.showToast('Googleログインエラー: ' + err.message, 'error');
      throw err;
    }
  },

  async signInWithEmail(email, password) {
    try {
      // Try sign in first, if fails try create account
      try {
        const result = await this.auth.signInWithEmailAndPassword(email, password);
        Components.showToast('ログインしました', 'success');
        return result.user;
      } catch (err) {
        if (err.code === 'auth/user-not-found') {
          const result = await this.auth.createUserWithEmailAndPassword(email, password);
          Components.showToast('アカウントを作成しました', 'success');
          return result.user;
        }
        throw err;
      }
    } catch (err) {
      Components.showToast('ログインエラー: ' + err.message, 'error');
      throw err;
    }
  },

  async signOut() {
    try {
      await this.auth.signOut();
      store.clearAll();
      Components.showToast('ログアウトしました', 'info');
    } catch (err) {
      Components.showToast('ログアウトエラー: ' + err.message, 'error');
    }
  },

  // ---- Firestore Data Operations ----

  // Get reference to user's document collection
  userDoc() {
    if (!this.userId) throw new Error('Not authenticated');
    return this.db.collection('users').doc(this.userId);
  },

  userCollection(name) {
    return this.userDoc().collection(name);
  },

  // Save a single key-value to user profile
  async saveProfile(data) {
    try {
      await this.userDoc().set(data, { merge: true });
    } catch (err) {
      console.error('Save profile error:', err);
    }
  },

  // Save health data entry to a subcollection
  async saveHealthEntry(collection, entry) {
    try {
      const docRef = await this.userCollection(collection).add({
        ...entry,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      return docRef.id;
    } catch (err) {
      console.error('Save entry error:', err);
      return null;
    }
  },

  // Save text entry
  async saveTextEntry(entry) {
    return await this.saveHealthEntry('textEntries', entry);
  },

  // Save conversation message
  async saveConversation(message) {
    return await this.saveHealthEntry('conversations', message);
  },

  // Save settings (selected disease, model, prompts, affiliate config)
  async saveSettings(settings) {
    await this.saveProfile({ settings });
  },

  // Save API keys (encrypted in Firestore, not in localStorage)
  async saveApiKeys(keys) {
    // Store in a separate secured subcollection
    try {
      await this.userDoc().collection('secrets').doc('apikeys').set(keys);
      Components.showToast('APIキーをクラウドに保存しました', 'success');
    } catch (err) {
      console.error('Save API keys error:', err);
      Components.showToast('APIキー保存エラー', 'error');
    }
  },

  async loadApiKeys() {
    try {
      const doc = await this.userDoc().collection('secrets').doc('apikeys').get();
      return doc.exists ? doc.data() : {};
    } catch (err) {
      console.error('Load API keys error:', err);
      return {};
    }
  },

  // ---- Batch Load All User Data ----
  async loadAllData() {
    if (!this.userId) return;

    try {
      // Load user profile
      const profileDoc = await this.userDoc().get();
      if (profileDoc.exists) {
        const profile = profileDoc.data();
        if (profile.settings?.selectedDisease) store.set('selectedDisease', profile.settings.selectedDisease);
        if (profile.settings?.selectedModel) store.set('selectedModel', profile.settings.selectedModel);
        if (profile.settings?.customPrompts) store.set('customPrompts', profile.settings.customPrompts);
        if (profile.settings?.affiliateConfig) store.set('affiliateConfig', profile.settings.affiliateConfig);
        if (profile.settings?.dashboardLayout) store.set('dashboardLayout', profile.settings.dashboardLayout);
      }

      // Load collections in parallel
      const collections = {
        textEntries: 'textEntries',
        symptoms: 'symptoms',
        vitals: 'vitals',
        sleepData: 'sleep',
        activityData: 'activity',
        bloodTests: 'bloodTests',
        medications: 'medications',
        conversations: 'conversationHistory'
      };

      const loadPromises = Object.entries(collections).map(async ([storeKey, fbCollection]) => {
        try {
          const snapshot = await this.userCollection(fbCollection)
            .orderBy('createdAt', 'desc')
            .limit(500)
            .get();
          const data = [];
          snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
          data.reverse(); // chronological order
          store.set(storeKey, data);
        } catch (err) {
          // Collection might not exist yet
          console.warn(`Load ${fbCollection}:`, err.message);
        }
      });

      await Promise.all(loadPromises);

      // Load API keys
      const apiKeys = await this.loadApiKeys();
      if (apiKeys.anthropic) localStorage.setItem('apikey_anthropic', apiKeys.anthropic);
      if (apiKeys.openai) localStorage.setItem('apikey_openai', apiKeys.openai);
      if (apiKeys.google) localStorage.setItem('apikey_google', apiKeys.google);

      store.calculateHealthScore();
      console.log('All user data loaded from Firestore');
    } catch (err) {
      console.error('Load all data error:', err);
    }
  },

  // ---- Sync store changes to Firestore ----
  enableAutoSync() {
    // Watch for text entries
    store.on('textEntries', (entries) => {
      if (!this.userId || !entries?.length) return;
      const latest = entries[entries.length - 1];
      if (latest && !latest._synced) {
        this.saveHealthEntry('textEntries', latest);
        latest._synced = true;
      }
    });

    // Watch for symptom data
    store.on('symptoms', (entries) => {
      if (!this.userId || !entries?.length) return;
      const latest = entries[entries.length - 1];
      if (latest && !latest._synced) {
        this.saveHealthEntry('symptoms', latest);
        latest._synced = true;
      }
    });

    // Watch for vitals
    store.on('vitals', (entries) => {
      if (!this.userId || !entries?.length) return;
      const latest = entries[entries.length - 1];
      if (latest && !latest._synced) {
        this.saveHealthEntry('vitals', latest);
        latest._synced = true;
      }
    });

    // Watch for settings changes
    ['selectedDisease', 'selectedModel', 'customPrompts', 'affiliateConfig', 'dashboardLayout'].forEach(key => {
      store.on(key, (value) => {
        if (!this.userId) return;
        this.saveProfile({ settings: { [key]: value } });
      });
    });

    // Watch for analysis history
    store.on('latestAnalysis', (analysis) => {
      if (!this.userId || !analysis) return;
      this.saveHealthEntry('analyses', {
        timestamp: analysis.timestamp,
        model: analysis.model,
        promptName: analysis.promptName,
        summary: analysis.parsed?.summary || '',
      });
    });
  },

  // Check if Firebase is configured
  isConfigured() {
    const cfg = this.getConfig();
    return cfg && cfg.apiKey && cfg.apiKey !== 'YOUR_FIREBASE_API_KEY';
  },

  // Get Firebase config from CONFIG or localStorage
  getConfig() {
    const stored = localStorage.getItem('firebase_config');
    if (stored) {
      try { return JSON.parse(stored); } catch {}
    }
    return CONFIG.FIREBASE;
  },

  saveConfig(config) {
    localStorage.setItem('firebase_config', JSON.stringify(config));
  }
};

    this.ADMIN_EMAILS = ['agewaller@gmail.com'];

    } else {

      Components.showToast('この機能は管理者専用です', 'error');
      return;
    }

    this.currentPage = page;
    const content = document.getElementById('page-content');
    const sidebar = document.getElementById('sidebar');
    const topbar = document.getElementById('top-bar');
    if (!content) return;

    // Hide admin-only nav items for non-admin users
    document.querySelectorAll('.admin-only').forEach(el => {
      el.style.display = this.isAdmin() ? '' : 'none';
    });

    // Show/hide sidebar for login/disease-select
    if (['login', 'disease-select'].includes(page)) {
      if (sidebar) sidebar.style.display = 'none';
      if (topbar) topbar.style.display = 'none';
      document.querySelector('.main-content').style.marginLeft = '0';
    } else {
      if (sidebar) sidebar.style.display = '';
      if (topbar) topbar.style.display = '';

    document.querySelectorAll('.nav-item').forEach(el => {

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronicCare AI - 慢性疾患管理ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* ============================================================
   Chronic Disease Management Dashboard - Main Styles
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* Theme Colors - Default Dark */
  --bg-primary: #0b0d14;
  --bg-secondary: #111520;
  --bg-tertiary: #181d2a;
  --bg-card: #151a28;
  --bg-hover: #1c2235;
  --border: #252d42;
  --border-light: #2a3350;
  --accent: #6C63FF;
  --accent-light: #8B85FF;
  --accent-bg: rgba(108, 99, 255, 0.08);
  --accent-border: rgba(108, 99, 255, 0.25);
  --success: #22c55e;
  --success-bg: rgba(34, 197, 94, 0.1);
  --warning: #f59e0b;
  --warning-bg: rgba(245, 158, 11, 0.1);
  --danger: #ef4444;
  --danger-bg: rgba(239, 68, 68, 0.1);
  --info: #3b82f6;
  --info-bg: rgba(59, 130, 246, 0.1);
  --text-primary: #e8edf5;
  --text-secondary: #8896b0;
  --text-muted: #5a6680;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
  --sidebar-width: 260px;
}

/* Light Theme Override */
[data-theme="light"] {
  --bg-primary: #f5f7fb;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f2f7;
  --bg-card: #ffffff;
  --bg-hover: #f0f2f7;
  --border: #e2e6ef;
  --border-light: #d5dae5;
  --accent: #6C63FF;
  --accent-light: #5b52e6;
  --accent-bg: rgba(108, 99, 255, 0.06);
  --accent-border: rgba(108, 99, 255, 0.2);
  --text-primary: #1a1f36;
  --text-secondary: #5a6680;
  --text-muted: #8896b0;
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; }

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ---- Scrollbar ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ---- Layout ---- */
.app-container {
  display: flex;
  min-height: 100vh;
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  color: var(--text-primary);
}

.sidebar-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.sidebar-logo-text {
  font-weight: 700;
  font-size: 15px;
  letter-spacing: -0.3px;
}

.sidebar-logo-sub {
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 400;
  display: block;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.nav-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  color: var(--text-muted);
  padding: 16px 12px 8px;
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  margin-bottom: 2px;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-border);
}

.nav-item .icon {
  width: 20px;
  text-align: center;
  font-size: 16px;
  flex-shrink: 0;
}

.nav-item .badge-count {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.sidebar-user {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: #fff;
  flex-shrink: 0;
}

.user-avatar img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.user-info {
  flex: 1;
  min-width: 0;
}

.user-name {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.user-disease {
  font-size: 11px;
  color: var(--text-muted);
}

/* ---- Main Content ---- */
.main-content {
  margin-left: var(--sidebar-width);
  flex: 1;
  min-height: 100vh;
}

.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 50;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.top-bar-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.page-content {
  padding: 24px 28px;
  max-width: 1440px;
}

.page-content:has(.login-page),
.page-content:has(.disease-select-page) {
  padding: 0;
  max-width: none;
}

/* ---- Cards ---- */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}

.card:hover {
  border-color: var(--border-light);
}

.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
}

.card-body {
  padding: 20px;
}

.card-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg-tertiary);
}

/* ---- Grid System ---- */
.grid { display: grid; gap: 20px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-auto { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }

/* ---- Stat Cards ---- */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}

.stat-card-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}

.stat-card-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.stat-card-change {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  padding: 2px 8px;
  border-radius: 20px;
}

.stat-card-change.positive {
  color: var(--success);
  background: var(--success-bg);
}

.stat-card-change.negative {
  color: var(--danger);
  background: var(--danger-bg);
}

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.btn-primary:hover { background: var(--accent-light); }

.btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border-color: var(--border);
}

.btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-light); }

.btn-outline {
  background: transparent;
  color: var(--accent);
  border-color: var(--accent-border);
}

.btn-outline:hover { background: var(--accent-bg); }

.btn-success { background: var(--success); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-warning { background: var(--warning); color: #000; }

.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-lg { padding: 12px 24px; font-size: 15px; }
.btn-icon { padding: 8px; min-width: 36px; }

.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Form Elements ---- */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  transition: border-color var(--transition);
  outline: none;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-bg);
}

.form-textarea {
  min-height: 100px;
  resize: vertical;
}

/* ---- Tags / Badges ---- */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.tag-accent { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
.tag-success { background: var(--success-bg); color: var(--success); }
.tag-warning { background: var(--warning-bg); color: var(--warning); }
.tag-danger { background: var(--danger-bg); color: var(--danger); }
.tag-info { background: var(--info-bg); color: var(--info); }

/* ---- Tabs ---- */
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
  overflow-x: auto;
}

.tab {
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}

.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ---- Modal ---- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: all var(--transition);
  backdrop-filter: blur(4px);
}

.modal-overlay.active {
  opacity: 1;
  visibility: visible;
}

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 600px;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  transform: translateY(20px);
  transition: transform var(--transition);
}

.modal-overlay.active .modal {
  transform: translateY(0);
}

.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-title { font-size: 16px; font-weight: 700; }

.modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px;
}

.modal-body { padding: 24px; }
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ---- Timeline ---- */
.timeline {
  position: relative;
  padding-left: 28px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}

.timeline-item {
  position: relative;
  margin-bottom: 24px;
}

.timeline-dot {
  position: absolute;
  left: -24px;
  top: 4px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg-card);
}

.timeline-date {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 4px;
}

.timeline-content {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* ---- Health Score Gauge ---- */
.health-gauge {
  width: 180px;
  height: 180px;
  position: relative;
  margin: 0 auto;
}

.health-gauge-circle {
  transform: rotate(-90deg);
}

.health-gauge-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 10;
}

.health-gauge-progress {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}

.health-gauge-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.health-gauge-value {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
}

.health-gauge-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ---- Severity Meter ---- */
.severity-bar {
  height: 8px;
  background: var(--bg-tertiary);
  border-radius: 4px;
  overflow: hidden;
}

.severity-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ---- Action Cards ---- */
.action-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
}

.action-card:hover {
  border-color: var(--accent-border);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.action-card-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  margin-bottom: 14px;
}

.action-card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 6px;
}

.action-card-desc {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 14px;
}

.action-card-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
}

/* ---- Data Upload Area ---- */
.upload-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
}

.upload-area:hover {
  border-color: var(--accent);
  background: var(--accent-bg);
}

.upload-area-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.6;
}

.upload-area-text {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.upload-area-hint {
  font-size: 12px;
  color: var(--text-muted);
}

/* ---- Chat / Conversation ---- */
.chat-container {
  display: flex;
  flex-direction: column;
  height: 500px;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.chat-message {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  max-width: 85%;
}

.chat-message.user { margin-left: auto; flex-direction: row-reverse; }

.chat-bubble {
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.6;
}

.chat-message.ai .chat-bubble {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.chat-message.user .chat-bubble {
  background: var(--accent);
  color: #fff;
  border-top-right-radius: 4px;
}

.chat-input-area {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.chat-input {
  flex: 1;
  padding: 10px 16px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 24px;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  outline: none;
}

.chat-input:focus { border-color: var(--accent); }

/* ---- Loading / Skeleton ---- */
.skeleton {
  background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

.spinner {
  width: 24px;
  height: 24px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Toast Notifications ---- */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}

.toast-success { background: #166534; color: #fff; }
.toast-error { background: #991b1b; color: #fff; }
.toast-info { background: #1e40af; color: #fff; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* ---- Table ---- */
.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th {
  text-align: left;
  padding: 10px 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}

.data-table td {
  padding: 12px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
}

.data-table tbody tr:hover { background: var(--bg-hover); }

/* ---- Responsive ---- */
@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .page-content { padding: 16px; }
  .top-bar { padding: 12px 16px; }
}

/* ---- Login Page ---- */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary);
}

.login-container {
  width: 100%;
  max-width: 440px;
  padding: 40px;
}

.login-logo {
  text-align: center;
  margin-bottom: 36px;
}

.login-logo-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
}

.login-logo h1 {

/* ============================================================
   State Management Store
   Simple reactive store for the application
   ============================================================ */
var Store = class Store {
  constructor() {
    this.state = {
      // Auth
      user: null,
      isAuthenticated: false,

      // App state
      currentPage: 'login',
      selectedDisease: null,
      theme: localStorage.getItem('theme') || 'dark',
      sidebarOpen: window.innerWidth > 768,

      // Health data
      healthScore: 0,
      symptoms: [],
      vitals: [],
      bloodTests: [],
      medications: [],
      supplements: [],
      meals: [],
      sleepData: [],
      activityData: [],
      geneticData: null,
      photos: [],
      wearableData: [],
      conversationHistory: [],

      // AI Analysis
      latestAnalysis: null,
      analysisHistory: [],
      isAnalyzing: false,

      // Actions / Recommendations
      recommendations: [],
      actionItems: [],

      // Admin
      adminMode: false,
      selectedModel: 'claude-sonnet-4-6',
      customPrompts: {},
      dashboardLayout: 'default',
      affiliateConfig: {},

      // Notifications
      notifications: [],
      unreadCount: 0
    };

    this.listeners = new Map();
    this.loadFromStorage();
  }

  get(key) {
    return this.state[key];
  }

  set(key, value) {
    const old = this.state[key];
    this.state[key] = value;
    this.notify(key, value, old);
    this.saveToStorage(key, value);
  }

  update(updates) {
    Object.entries(updates).forEach(([key, value]) => {
      this.state[key] = value;
      this.notify(key, value);
    });
    Object.keys(updates).forEach(key => this.saveToStorage(key, updates[key]));
  }

  on(key, callback) {
    if (!this.listeners.has(key)) {
      this.listeners.set(key, new Set());
    }
    this.listeners.get(key).add(callback);
    return () => this.listeners.get(key).delete(callback);
  }

  notify(key, value, old) {
    if (this.listeners.has(key)) {
      this.listeners.get(key).forEach(cb => cb(value, old));
    }
    if (this.listeners.has('*')) {
      this.listeners.get('*').forEach(cb => cb(key, value, old));
    }
  }

  // Persistence
  saveToStorage(key, value) {
    const persistKeys = [
      'theme', 'selectedDisease', 'selectedModel', 'customPrompts',
      'dashboardLayout', 'affiliateConfig', 'symptoms', 'vitals',
      'bloodTests', 'medications', 'supplements', 'meals', 'sleepData',
      'activityData', 'healthScore', 'analysisHistory', 'recommendations',
      'actionItems', 'conversationHistory', 'textEntries'
    ];
    if (persistKeys.includes(key)) {
      try {
        localStorage.setItem(`cc_${key}`, JSON.stringify(value));
      } catch (e) {
        console.warn('Storage save failed:', e);
      }
    }
  }

  loadFromStorage() {
    const keys = [
      'theme', 'selectedDisease', 'selectedModel', 'customPrompts',
      'dashboardLayout', 'affiliateConfig', 'symptoms', 'vitals',
      'bloodTests', 'medications', 'supplements', 'meals', 'sleepData',
      'activityData', 'healthScore', 'analysisHistory', 'recommendations',
      'actionItems', 'conversationHistory', 'textEntries'
    ];
    keys.forEach(key => {
      try {
        const val = localStorage.getItem(`cc_${key}`);
        if (val !== null) {
          this.state[key] = JSON.parse(val);
        }
      } catch (e) {
        // ignore parse errors
      }
    });
  }

  // Add health data entry
  addHealthData(category, data) {
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2),
      timestamp: new Date().toISOString(),
      category,
      ...data
    };

    const key = this.categoryToStateKey(category);
    if (key && Array.isArray(this.state[key])) {
      this.state[key] = [...this.state[key], entry];
      this.notify(key, this.state[key]);
      this.saveToStorage(key, this.state[key]);
    }

    return entry;
  }

  categoryToStateKey(category) {
    const map = {
      'vitals': 'vitals',
      'symptoms': 'symptoms',
      'blood_test': 'bloodTests',
      'medication': 'medications',
      'nutrition': 'meals',
      'sleep': 'sleepData',
      'activity': 'activityData',
      'photos': 'photos',
      'wearable': 'wearableData',
      'genetic': 'geneticData'
    };
    return map[category];
  }

  // Get data for a time range
  getDataRange(key, days = 7) {
    const data = this.state[key];
    if (!Array.isArray(data)) return [];
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);
    return data.filter(d => new Date(d.timestamp) >= cutoff);
  }

  // Calculate health score from recent data
  calculateHealthScore() {
    const recentSymptoms = this.getDataRange('symptoms', 7);
    if (recentSymptoms.length === 0) return 50;

    const avgFatigue = this.avg(recentSymptoms, 'fatigue_level');
    const avgPain = this.avg(recentSymptoms, 'pain_level');
    const avgBrainFog = this.avg(recentSymptoms, 'brain_fog');
    const avgSleep = this.avg(recentSymptoms, 'sleep_quality');

    // Score 0-100, higher is better
    const symptomScore = Math.max(0, 100 - ((avgFatigue + avgPain + avgBrainFog) / 3) * (100 / 7));
    const sleepScore = (avgSleep / 7) * 100;

    const score = Math.round(symptomScore * 0.7 + sleepScore * 0.3);
    this.set('healthScore', score);
    return score;
  }

  avg(arr, field) {
    const vals = arr.map(d => d[field]).filter(v => v !== undefined && v !== null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  }

  // Clear all data
  clearAll() {
    localStorage.clear();
    Object.keys(this.state).forEach(key => {
      if (Array.isArray(this.state[key])) this.state[key] = [];
      else if (typeof this.state[key] === 'object' && this.state[key] !== null) this.state[key] = {};
    });
    this.state.isAuthenticated = false;
    this.state.user = null;
    this.state.currentPage = 'login';
  }
};

/* ============================================================
   AI Analysis Engine
   Handles AI model integration and prompt execution
   ============================================================ */
var AIEngine = class AIEngine {
  constructor() {
    this.apiEndpoints = {
      'claude-sonnet-4-6': '/api/anthropic',
      'claude-opus-4-6': '/api/anthropic',
      'claude-haiku-4-5': '/api/anthropic',
      'gpt-4o': '/api/openai',
      'gemini-2.5-pro': '/api/google'
    };
  }

  // Main analysis function
  async analyze(promptTemplate, userData, options = {}) {
    const modelId = options.model || store.get('selectedModel') || 'claude-sonnet-4-6';
    store.set('isAnalyzing', true);

    try {
      const prompt = this.interpolatePrompt(promptTemplate, userData);
      const result = await this.callModel(modelId, prompt, options);

      const analysis = {
        id: this.generateId(),
        timestamp: new Date().toISOString(),
        model: modelId,
        promptName: options.promptName || 'custom',
        result: result,
        parsed: this.parseAnalysisResult(result),
        userData: this.summarizeUserData(userData)
      };

      // Store analysis
      const history = store.get('analysisHistory') || [];
      history.unshift(analysis);
      if (history.length > 100) history.pop();
      store.set('analysisHistory', history);
      store.set('latestAnalysis', analysis);

      // Extract recommendations and actions
      if (analysis.parsed.recommendations) {
        store.set('recommendations', analysis.parsed.recommendations);
      }
      if (analysis.parsed.actionItems) {
        store.set('actionItems', analysis.parsed.actionItems);
      }

      return analysis;
    } catch (error) {
      console.error('Analysis error:', error);
      throw error;
    } finally {
      store.set('isAnalyzing', false);
    }
  }

  // Interpolate prompt template with user data
  interpolatePrompt(template, data) {
    const today = new Date().toLocaleDateString('ja-JP', {
      year: 'numeric', month: 'long', day: 'numeric'
    });

    let prompt = template
      .replace(/\{\{DATE\}\}/g, today)
      .replace(/\{\{USER_DATA\}\}/g, JSON.stringify(data.current || {}, null, 2))
      .replace(/\{\{WEEKLY_DATA\}\}/g, JSON.stringify(data.weekly || {}, null, 2))
      .replace(/\{\{BLOOD_TEST_DATA\}\}/g, JSON.stringify(data.bloodTests || {}, null, 2))
      .replace(/\{\{CURRENT_SUPPLEMENTS\}\}/g, JSON.stringify(data.supplements || {}, null, 2))
      .replace(/\{\{SYMPTOM_DATA\}\}/g, JSON.stringify(data.symptoms || {}, null, 2))
      .replace(/\{\{HRV_DATA\}\}/g, JSON.stringify(data.hrv || {}, null, 2))
      .replace(/\{\{ACTIVITY_DATA\}\}/g, JSON.stringify(data.activity || {}, null, 2))
      .replace(/\{\{PEM_HISTORY\}\}/g, JSON.stringify(data.pemHistory || {}, null, 2));

    // Add user profile context
    const disease = store.get('selectedDisease');
    if (disease) {
      prompt = `【対象疾患】${disease.fullName}\n\n` + prompt;
    }

    return prompt;
  }

  // Call AI model API
  async callModel(modelId, prompt, options = {}) {
    // In production, this calls the actual API through a backend proxy
    // For demo, we return a structured mock response
    const endpoint = this.apiEndpoints[modelId];

    try {
      const response = await fetch(endpoint || '/api/analyze', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${this.getApiKey(modelId)}`
        },
        body: JSON.stringify({
          model: modelId,
          messages: [
            { role: 'system', content: 'あなたは慢性疾患管理の専門AIアシスタントです。' },
            { role: 'user', content: prompt }
          ],
          max_tokens: options.maxTokens || 4096,
          temperature: options.temperature || 0.3
        })
      });

      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      return data.choices?.[0]?.message?.content || data.content?.[0]?.text || data;
    } catch (error) {
      // If API not available, return demo analysis
      console.warn('API not available, using demo mode:', error.message);
      return this.generateDemoAnalysis();
    }
  }

  getApiKey(modelId) {
    // In production, API keys are managed server-side
    return localStorage.getItem(`apikey_${modelId}`) || '';
  }

  // Parse analysis result into structured data
  parseAnalysisResult(result) {
    if (typeof result === 'object') return result;

    const parsed = {
      summary: '',
      recommendations: [],
      actionItems: [],
      researchUpdates: [],
      riskAlerts: [],
      raw: result
    };

    try {
      // Try to extract JSON blocks from the response
      const jsonMatch = result.match(/```json\n?([\s\S]*?)\n?```/);
      if (jsonMatch) {
        const jsonData = JSON.parse(jsonMatch[1]);
        Object.assign(parsed, jsonData);
      }
    } catch (e) {
      // Parse as structured text
      parsed.summary = result.substring(0, 500);
    }

    return parsed;
  }

/* ============================================================
   Affiliate & Monetization Engine
   Manages affiliate links, tracking, and revenue
   ============================================================ */
var AffiliateEngine = class AffiliateEngine {
  constructor() {
    this.config = store.get('affiliateConfig') || {};
    this.trackingData = [];
  }

  // Generate affiliate link
  generateLink(product, storeId) {
    const networks = CONFIG.AFFILIATE_NETWORKS;
    const network = networks.find(n => n.id === storeId);
    if (!network) return product.url || '#';

    const customConfig = this.config[storeId] || {};
    const tag = customConfig.tag || network.tag;

    switch (storeId) {
      case 'amazon_jp':
        return this.amazonLink(product.url || product.asin, tag);
      case 'rakuten':
        return this.rakutenLink(product.url, tag);
      case 'iherb':
        return this.iherbLink(product.url, customConfig.code || network.code);
      default:
        return this.appendTag(product.url, tag);
    }
  }

  amazonLink(urlOrAsin, tag) {
    if (urlOrAsin.startsWith('http')) {
      const url = new URL(urlOrAsin);
      url.searchParams.set('tag', tag);
      return url.toString();
    }
    return `https://www.amazon.co.jp/dp/${urlOrAsin}?tag=${tag}`;
  }

  rakutenLink(url, affiliateId) {
    return `https://hb.afl.rakuten.co.jp/hgc/${affiliateId}/?pc=${encodeURIComponent(url)}`;
  }

  iherbLink(url, code) {
    if (url && url.includes('iherb.com')) {
      const u = new URL(url);
      u.searchParams.set('rcode', code);
      return u.toString();
    }
    return `https://www.iherb.com/search?kw=${encodeURIComponent(url || '')}&rcode=${code}`;
  }

  appendTag(url, tag) {
    if (!url) return '#';
    try {
      const u = new URL(url);
      u.searchParams.set('ref', tag);
      return u.toString();
    } catch {
      return url;
    }
  }

  // Track click
  trackClick(productId, storeId, actionType) {
    const event = {
      id: Date.now().toString(36),
      timestamp: new Date().toISOString(),
      productId,
      storeId,
      actionType,
      userId: store.get('user')?.uid || 'anonymous'
    };
    this.trackingData.push(event);
    this.saveTracking();

    // Send to analytics backend if available
    this.sendAnalyticsEvent('affiliate_click', event);
  }

  // Track conversion (called via postback URL from affiliate networks)
  trackConversion(orderId, storeId, amount, currency = 'JPY') {
    const event = {
      id: Date.now().toString(36),
      timestamp: new Date().toISOString(),
      type: 'conversion',
      orderId,
      storeId,
      amount,
      currency,
      userId: store.get('user')?.uid || 'anonymous'
    };
    this.trackingData.push(event);
    this.saveTracking();
    this.sendAnalyticsEvent('affiliate_conversion', event);
  }

  // Generate product card HTML with affiliate link
  renderProductCard(product) {
    const links = (product.links || []).map(link => {
      const affiliateUrl = this.generateLink(
        { url: link.url, asin: link.asin },
        link.storeId || this.detectStore(link.url)
      );
      return `
        <a href="${affiliateUrl}" target="_blank" rel="noopener"
           class="btn btn-sm btn-outline"
           onclick="affiliateEngine.trackClick('${product.id}', '${link.storeId || ''}', 'purchase')"
           style="margin-right: 6px; margin-bottom: 6px;">
          ${link.store || link.storeId} ${link.price || ''}
        </a>
      `;
    }).join('');

    return `
      <div class="action-card" data-product-id="${product.id}">
        <div class="action-card-icon" style="background: ${product.color || 'var(--accent-bg)'}">
          ${product.icon || '💊'}
        </div>
        <div class="action-card-title">${product.title}</div>
        <div class="action-card-desc">${product.description || ''}</div>
        ${product.evidence ? `<div class="tag tag-accent" style="margin-bottom:8px">エビデンス: ${product.evidence}</div>` : ''}
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          ${links}
        </div>
        ${product.cost ? `<div class="action-card-price" style="margin-top:10px">${product.cost}</div>` : ''}
      </div>
    `;
  }

  detectStore(url) {
    if (!url) return 'custom';
    if (url.includes('amazon.co.jp') || url.includes('amzn')) return 'amazon_jp';
    if (url.includes('rakuten.co.jp')) return 'rakuten';
    if (url.includes('iherb.com')) return 'iherb';
    return 'custom';
  }

  // Admin: Update affiliate config
  updateConfig(storeId, config) {
    this.config[storeId] = { ...this.config[storeId], ...config };
    store.set('affiliateConfig', this.config);
  }

  // Admin: Get revenue report
  getRevenueReport(days = 30) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - days);

    const conversions = this.trackingData.filter(
      e => e.type === 'conversion' && new Date(e.timestamp) >= cutoff
    );

    const clicks = this.trackingData.filter(
      e => e.type !== 'conversion' && new Date(e.timestamp) >= cutoff
    );

    const byStore = {};
    conversions.forEach(c => {
      if (!byStore[c.storeId]) byStore[c.storeId] = { clicks: 0, conversions: 0, revenue: 0 };
      byStore[c.storeId].conversions++;
      byStore[c.storeId].revenue += c.amount || 0;
    });
    clicks.forEach(c => {
      if (!byStore[c.storeId]) byStore[c.storeId] = { clicks: 0, conversions: 0, revenue: 0 };
      byStore[c.storeId].clicks++;
    });

    return {
      totalClicks: clicks.length,
      totalConversions: conversions.length,
      totalRevenue: conversions.reduce((sum, c) => sum + (c.amount || 0), 0),
      byStore,
      period: `${days}日間`
    };
  }

  saveTracking() {
    try {
      localStorage.setItem('cc_affiliate_tracking', JSON.stringify(this.trackingData.slice(-1000)));
    } catch (e) { /* ignore */ }
  }

  loadTracking() {
    try {
      const data = localStorage.getItem('cc_affiliate_tracking');
      if (data) this.trackingData = JSON.parse(data);
    } catch (e) { /* ignore */ }
  }

  sendAnalyticsEvent(eventName, data) {
    // Send to backend analytics
    fetch('/api/analytics', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ event: eventName, data })
    }).catch(() => { /* silent fail for analytics */ });
  }
};

          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" class="btn btn-secondary" onclick="app.closeModal()">キャンセル</button>
        </div>
      </form>
    `;
  },

  sliderField(name, label, min, max) {
    return `
      <div class="form-group">
        <label class="form-label">${label}: <span id="val-${name}">${Math.floor((max-min)/2)}</span></label>
        <input type="range" name="${name}" min="${min}" max="${max}" value="${Math.floor((max-min)/2)}"
          style="width:100%;accent-color:var(--accent)"
          oninput="document.getElementById('val-${name}').textContent=this.value">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);margin-top:2px">
          <span>${CONFIG.SEVERITY_LEVELS[min]?.label || min}</span>
          <span>${CONFIG.SEVERITY_LEVELS[max]?.label || max}</span>
        </div>
      </div>
    `;
  },

  numberField(name, label, unit, min, max, step = 1) {
    return `
      <div class="form-group">
        <label class="form-label">${label}</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" name="${name}" min="${min}" max="${max}" step="${step}"
            class="form-input" style="width:120px" placeholder="--">
          <span style="font-size:12px;color:var(--text-muted)">${unit}</span>
        </div>
      </div>
    `;
  },

  textField(name, label) {
    return `
      <div class="form-group">
        <label class="form-label">${label}</label>
        <input type="text" name="${name}" class="form-input" placeholder="${label}を入力...">
      </div>
    `;
  },

  toggleField(name, label) {
    return `
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" name="${name}" style="width:18px;height:18px;accent-color:var(--accent)">
          <span style="font-size:13px">${label}</span>
        </label>
      </div>
    `;
  },

  bpField() {
    return `
      <div class="form-group">
        <label class="form-label">血圧</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" name="bp_systolic" class="form-input" style="width:80px" placeholder="収縮期" min="60" max="250">
          <span style="color:var(--text-muted)">/</span>
          <input type="number" name="bp_diastolic" class="form-input" style="width:80px" placeholder="拡張期" min="30" max="150">
          <span style="font-size:12px;color:var(--text-muted)">mmHg</span>
        </div>
      </div>
    `;
  },

  // Photo Upload Component
  photoUpload(category) {
    return `
      <div class="upload-area" onclick="document.getElementById('photo-input-${category}').click()"
           ondragover="event.preventDefault();this.style.borderColor='var(--accent)'"
           ondragleave="this.style.borderColor='var(--border)'"
           ondrop="app.handlePhotoDrop(event, '${category}')">
        <div class="upload-area-icon">📸</div>
        <div class="upload-area-text">クリックまたはドラッグ&ドロップ</div>
        <div class="upload-area-hint">写真・画像・PDF（血液検査結果、食事写真など）</div>
        <input type="file" id="photo-input-${category}" hidden multiple
          accept="image/*,.pdf" onchange="app.handlePhotoUpload(event, '${category}')">
      </div>
      <div id="photo-preview-${category}" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-top:12px"></div>
    `;
  },

  // Chat Message
  chatMessage(msg) {
    const isUser = msg.role === 'user';
    return `
      <div class="chat-message ${isUser ? 'user' : 'ai'}">
        ${!isUser ? '<div class="user-avatar" style="width:28px;height:28px;font-size:12px">AI</div>' : ''}
        <div class="chat-bubble">${this.formatMarkdown(msg.content)}</div>
      </div>
    `;
  },

  // Simple markdown formatter
  formatMarkdown(text) {
    if (!text) return '';
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`(.*?)`/g, '<code style="background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
      .replace(/\n/g, '<br>');
  },

  // Toast notification
  showToast(message, type = 'info') {
    const container = document.getElementById('toast-container') || (() => {
      const c = document.createElement('div');
      c.id = 'toast-container';
      c.className = 'toast-container';
      document.body.appendChild(c);
      return c;
    })();

    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span>${message}</span>`;
    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  },

  // Loading spinner
  loading(text = '分析中...') {
    return `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px">
        <div class="spinner" style="width:40px;height:40px;border-width:4px;margin-bottom:16px"></div>
        <span style="font-size:14px;color:var(--text-secondary)">${text}</span>
      </div>
    `;
  },

  // Empty state
  emptyState(icon, title, description) {
    return `
      <div style="text-align:center;padding:60px 20px">
        <div style="font-size:48px;margin-bottom:16px;opacity:0.5">${icon}</div>
        <h3 style="font-size:16px;font-weight:600;margin-bottom:8px">${title}</h3>
        <p style="font-size:13px;color:var(--text-secondary);max-width:400px;margin:0 auto">${description}</p>
      </div>
    `;
  }
};

/* ============================================================
   Main Application Controller
   ============================================================ */
var App = class App {
  constructor() {
    this.pages = {};
    this.currentPage = null;
    this.chartInstances = {};
  }

  init() {
    document.documentElement.setAttribute('data-theme', store.get('theme'));
    store.on('theme', (t) => document.documentElement.setAttribute('data-theme', t));
    store.on('currentPage', (p) => this.navigate(p));

    // Check auth state
    if (store.get('isAuthenticated') && store.get('user')) {
      this.navigate(store.get('selectedDisease') ? 'dashboard' : 'disease-select');
    } else {
      this.navigate('login');
    }

    // Set up periodic health score calc
    setInterval(() => store.calculateHealthScore(), 60000);
    store.calculateHealthScore();
  }

  // ---- Navigation ----
  navigate(page) {
    this.currentPage = page;
    const content = document.getElementById('page-content');
    const sidebar = document.getElementById('sidebar');
    const topbar = document.getElementById('top-bar');
    if (!content) return;

    // Show/hide sidebar for login/disease-select
    if (['login', 'disease-select'].includes(page)) {
      if (sidebar) sidebar.style.display = 'none';
      if (topbar) topbar.style.display = 'none';
      document.querySelector('.main-content').style.marginLeft = '0';
    } else {
      if (sidebar) sidebar.style.display = '';
      if (topbar) topbar.style.display = '';
      document.querySelector('.main-content').style.marginLeft = '';
    }

    // Update active nav
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });

    // Update top bar title
    const titles = {
      dashboard: 'ダッシュボード',
      'data-input': 'データ入力',
      analysis: 'AI分析',
      actions: 'アクションセンター',
      research: '最新研究',
      chat: 'AIコンサルタント',
      timeline: 'タイムライン',
      admin: '管理パネル',
      settings: '設定'
    };
    const titleEl = document.getElementById('top-bar-title');
    if (titleEl) titleEl.textContent = titles[page] || '';

    // Render page
    const renderer = this['render_' + page.replace(/-/g, '_')];
    if (renderer) {
      content.innerHTML = renderer.call(this);
      this.afterRender(page);
    }
  }

  afterRender(page) {
    if (page === 'dashboard') this.initDashboardCharts();
    if (page === 'analysis') this.loadLatestAnalysis();
  }

  // ---- Auth ----
  loginWithGoogle() {
    // In production, use Firebase Auth
    // For demo, simulate login
    const user = {
      uid: 'demo_user_001',
      displayName: 'デモユーザー',
      email: 'demo@chroniccare.ai',
      photoURL: null
    };
    store.update({ user, isAuthenticated: true });
    Components.showToast('ログインしました', 'success');
    this.navigate('disease-select');
  }

  loginWithEmail(e) {
    if (e) e.preventDefault();
    const form = e.target;
    const email = form.querySelector('[name=email]').value;
    const pass = form.querySelector('[name=password]').value;
    if (!email || !pass) { Components.showToast('メールとパスワードを入力してください', 'error'); return; }
    const user = { uid: 'user_' + Date.now(), displayName: email.split('@')[0], email, photoURL: null };
    store.update({ user, isAuthenticated: true });
    Components.showToast('ログインしました', 'success');
    this.navigate('disease-select');
  }

  logout() {
    store.update({ user: null, isAuthenticated: false, currentPage: 'login' });
    this.navigate('login');
  }

  // ---- Disease Selection ----
  selectDisease(diseaseId) {
    const disease = CONFIG.DISEASES.find(d => d.id === diseaseId);
    if (disease) {
      store.set('selectedDisease', disease);
      // Load default prompts for this disease
      if (!store.get('customPrompts') || Object.keys(store.get('customPrompts')).length === 0) {
        store.set('customPrompts', { ...DEFAULT_PROMPTS });
      }
      Components.showToast(`${disease.name} を選択しました`, 'success');
      this.navigate('dashboard');
    }
  }

  // ---- Data Input ----
  openDataInput(category) {
    const overlay = document.getElementById('modal-overlay');
    const body = document.getElementById('modal-body');
    const title = document.getElementById('modal-title');
    if (!overlay || !body) return;

    const cat = CONFIG.DATA_CATEGORIES.find(c => c.id === category);
    title.textContent = cat ? `${cat.icon} ${cat.name}を記録` : 'データ入力';

    if (category === 'photos') {
      body.innerHTML = Components.photoUpload(category);
    } else {
      body.innerHTML = Components.dataEntryForm(category);
    }
    overlay.classList.add('active');
  }

  closeModal() {
    document.getElementById('modal-overlay')?.classList.remove('active');
  }

  submitDataForm(e, category) {
    e.preventDefault();
    const form = e.target;
    const data = {};
    new FormData(form).forEach((val, key) => {
      data[key] = isNaN(val) ? val : Number(val);
    });
    // Handle checkboxes
    form.querySelectorAll('input[type=checkbox]').forEach(cb => {
      data[cb.name] = cb.checked;
    });

    store.addHealthData(category, data);
    store.calculateHealthScore();
    Components.showToast('データを保存しました', 'success');
    this.closeModal();
    if (this.currentPage === 'dashboard') this.navigate('dashboard');
  }

  handlePhotoUpload(e, category) {
    const files = e.target.files;
    this.processPhotos(files, category);
  }

  handlePhotoDrop(e, category) {
    e.preventDefault();
    const files = e.dataTransfer.files;
    this.processPhotos(files, category);
  }

  processPhotos(files, category) {
    const preview = document.getElementById(`photo-preview-${category}`);
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const entry = store.addHealthData('photos', {
          filename: file.name,
          type: file.type,
          size: file.size,
          dataUrl: ev.target.result.substring(0, 200) + '...',
          category
        });
        if (preview) {
          preview.innerHTML += `<div style="position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:var(--bg-tertiary)">
            <img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover">
            <div style="position:absolute;bottom:0;left:0;right:0;padding:4px 6px;background:rgba(0,0,0,0.7);font-size:10px;color:#fff">${file.name}</div>
          </div>`;
        }
      };
      reader.readAsDataURL(file);
    });
    Components.showToast(`${files.length}件のファイルをアップロードしました`, 'success');
  }

  // ---- Text Entry ----
  submitTextEntry() {
    const category = document.getElementById('text-input-category')?.value || 'other';
    const title = document.getElementById('text-input-title')?.value?.trim() || '';
    const content = document.getElementById('text-input-content')?.value?.trim() || '';

    if (!content) {
      Components.showToast('内容を入力してください', 'error');
      return;
    }

    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2),
      timestamp: new Date().toISOString(),
      category: category,
      type: 'text_entry',
      title: title,
      content: content
    };

    // Store in conversation history for AI context
    const history = store.get('conversationHistory') || [];
    history.push({
      role: 'user',
      content: `[${category}] ${title ? title + ': ' : ''}${content}`,
      timestamp: entry.timestamp,
      type: 'data_entry'
    });
    store.set('conversationHistory', history);

    // Also store as health data in the appropriate category
    const stateKey = store.categoryToStateKey(category);
    if (stateKey && Array.isArray(store.get(stateKey))) {
      store.addHealthData(category, { text_note: content, title: title });
    } else {
      // Store in a general text entries array
      const textEntries = store.get('textEntries') || [];
      textEntries.push(entry);
      store.set('textEntries', textEntries);
    }

    // Clear form
    document.getElementById('text-input-content').value = '';
    document.getElementById('text-input-title').value = '';

    // Show saved entry in the list
    this.renderTextEntries();
    Components.showToast('テキストを保存しました', 'success');
  }

  renderTextEntries() {
    const container = document.getElementById('text-entries-list');
    if (!container) return;

    const textEntries = store.get('textEntries') || [];
    const recent = textEntries.slice(-5).reverse();

    if (recent.length === 0) {
      container.innerHTML = '';
      return;
    }

    const categoryLabels = {
      symptoms: '症状', nutrition: '食事・栄養', medication: '服薬・処方',
      mental: '精神状態', activity: '活動', sleep: '睡眠',
      blood_test: '検査結果', doctor: '医師の所見', research: '調査メモ', other: 'その他'
    };

    container.innerHTML = `
      <div style="border-top:1px solid var(--border);padding-top:16px">
        <h4 style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:10px">最近の記録</h4>
        ${recent.map(e => `
          <div style="padding:10px 14px;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-bottom:8px;border-left:3px solid var(--accent)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <span class="tag tag-accent" style="font-size:10px">${categoryLabels[e.category] || e.category}</span>
              <span style="font-size:10px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${new Date(e.timestamp).toLocaleString('ja-JP')}</span>
            </div>
            ${e.title ? `<div style="font-size:13px;font-weight:600;margin-bottom:2px">${e.title}</div>` : ''}
            <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;white-space:pre-wrap">${e.content.length > 200 ? e.content.substring(0, 200) + '...' : e.content}</div>
          </div>
        `).join('')}
      </div>`;
  }

  // ---- AI Analysis ----
  async runAnalysis(promptKey) {
    const prompts = store.get('customPrompts') || DEFAULT_PROMPTS;
    const promptConfig = prompts[promptKey] || Object.values(prompts)[0];
    if (!promptConfig) { Components.showToast('プロンプトが見つかりません', 'error'); return; }

    const resultArea = document.getElementById('analysis-result');
    if (resultArea) resultArea.innerHTML = Components.loading('AI分析を実行中...');

    try {
      const result = await aiEngine.runScheduledAnalysis(promptConfig);
      if (resultArea) this.renderAnalysisResult(result, resultArea);
      Components.showToast('分析が完了しました', 'success');
    } catch (err) {
      if (resultArea) resultArea.innerHTML = `<div style="color:var(--danger);padding:20px">分析エラー: ${err.message}</div>`;
      Components.showToast('分析に失敗しました', 'error');
    }
  }

  loadLatestAnalysis() {
    const latest = store.get('latestAnalysis');
    const resultArea = document.getElementById('analysis-result');
    if (latest && resultArea) {
      this.renderAnalysisResult(latest, resultArea);
    }
  }

  renderAnalysisResult(analysis, container) {
    const p = analysis.parsed || analysis.result;
    if (typeof p === 'string') {
      container.innerHTML = `<div style="white-space:pre-wrap;font-size:13px;line-height:1.8">${Components.formatMarkdown(p)}</div>`;
      return;
    }

    let html = '';
    // Summary
    if (p.summary) {
      html += `<div class="card" style="margin-bottom:20px"><div class="card-body">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:10px">分析サマリー</h3>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.8">${p.summary}</p>
      </div></div>`;
    }

    // Risk Alerts
    if (p.riskAlerts?.length) {
      html += '<div style="margin-bottom:20px">';
      p.riskAlerts.forEach(a => {
        const c = a.level === 'warning' ? 'var(--warning)' : 'var(--info)';
        html += `<div style="padding:12px 16px;background:${c}15;border-left:3px solid ${c};border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;color:var(--text-primary)">${a.message}</div>`;
      });
      html += '</div>';
    }

    // Trends
    if (p.trends) {
      html += '<div class="grid grid-4" style="margin-bottom:20px">';
      const trendLabels = { fatigue: '疲労', pain: '痛み', sleep: '睡眠', cognitive: '認知機能' };
      const trendIcons = { fatigue: '😴', pain: '💢', sleep: '🌙', cognitive: '🧠' };
      Object.entries(p.trends).forEach(([k, v]) => {
        const dir = v.direction === 'improving' ? '改善↑' : v.direction === 'declining' ? '悪化↓' : '安定→';
        const cls = v.direction === 'improving' ? 'positive' : v.direction === 'declining' ? 'negative' : '';
        html += Components.statCard(trendLabels[k] || k, `${trendIcons[k] || ''} ${dir}`, v.change ? v.change * 100 : 0);
      });
      html += '</div>';
    }

    // Recommendations
    if (p.recommendations?.length) {
      html += '<h3 style="font-size:16px;font-weight:600;margin:24px 0 14px">推奨アクション</h3>';
      p.recommendations.forEach(r => { html += Components.recommendationCard(r); });
    }

    // Research
    if (p.researchUpdates?.length) {
      html += '<h3 style="font-size:16px;font-weight:600;margin:24px 0 14px">最新研究</h3>';
      p.researchUpdates.forEach(r => { html += Components.researchCard(r); });
    }

    container.innerHTML = html;
  }

  // ---- Chat ----
  async sendChat() {
    const input = document.getElementById('chat-input');
    if (!input || !input.value.trim()) return;

    const msg = input.value.trim();
    input.value = '';

    const history = store.get('conversationHistory') || [];
    history.push({ role: 'user', content: msg, timestamp: new Date().toISOString() });
    store.set('conversationHistory', history);
    this.renderChatMessages();

    // Get AI response
    try {
      const disease = store.get('selectedDisease');
      const systemPrompt = `あなたは${disease?.fullName || '慢性疾患'}の専門AIアシスタントです。患者に寄り添い、最新のエビデンスに基づいたアドバイスを提供してください。`;
      const userData = aiEngine.collectCurrentUserData();

      const response = await aiEngine.callModel(
        store.get('selectedModel'),
        `${systemPrompt}\n\nユーザーの健康データ: ${JSON.stringify(userData.current)}\n\nユーザーの質問: ${msg}`,
        { maxTokens: 2048 }
      );

      const aiMsg = typeof response === 'string' ? response : (response.summary || JSON.stringify(response));
      history.push({ role: 'assistant', content: aiMsg, timestamp: new Date().toISOString() });
      store.set('conversationHistory', history);
      this.renderChatMessages();
    } catch (err) {
      history.push({ role: 'assistant', content: 'すみません、応答の生成中にエラーが発生しました。もう一度お試しください。', timestamp: new Date().toISOString() });
      store.set('conversationHistory', history);
      this.renderChatMessages();
    }
  }

  renderChatMessages() {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    const history = store.get('conversationHistory') || [];
    container.innerHTML = history.map(m => Components.chatMessage(m)).join('');
    container.scrollTop = container.scrollHeight;
  }

  // ---- Theme ----
  toggleTheme() {
    const t = store.get('theme') === 'dark' ? 'light' : 'dark';
    store.set('theme', t);
  }

  // ---- Admin ----
  savePrompt(key) {
    const nameEl = document.querySelector(`[data-prompt-name="${key}"]`);
    const textEl = document.querySelector(`[data-prompt-text="${key}"]`);
    if (!nameEl || !textEl) return;

    const prompts = store.get('customPrompts') || {};
    prompts[key] = {
      ...prompts[key],
      name: nameEl.value,
      prompt: textEl.value,
      active: true
    };
    store.set('customPrompts', prompts);
    Components.showToast('プロンプトを保存しました', 'success');
  }

  addNewPrompt() {
    const key = 'custom_' + Date.now();
    const prompts = store.get('customPrompts') || {};
    prompts[key] = {
      name: '新しいプロンプト',
      description: '',
      prompt: 'ここにプロンプトを入力してください...',
      schedule: 'manual',
      active: true
    };
    store.set('customPrompts', prompts);
    this.navigate('admin');
  }

  deletePrompt(key) {
    const prompts = store.get('customPrompts') || {};
    delete prompts[key];
    store.set('customPrompts', prompts);
    this.navigate('admin');
    Components.showToast('プロンプトを削除しました', 'info');
  }

  setModel(modelId) {
    store.set('selectedModel', modelId);
    Components.showToast(`モデルを ${modelId} に変更しました`, 'success');
  }

  saveAffiliateConfig(e) {
    e.preventDefault();
    const form = e.target;
    CONFIG.AFFILIATE_NETWORKS.forEach(n => {
      const tagInput = form.querySelector(`[name="aff_${n.id}"]`);
      if (tagInput && tagInput.value) {
        affiliateEngine.updateConfig(n.id, { tag: tagInput.value });
      }
    });
    Components.showToast('アフィリエイト設定を保存しました', 'success');
  }

  // ---- Dashboard Charts ----
  initDashboardCharts() {
    // Symptom trend chart
    const sympCtx = document.getElementById('symptom-chart');
    if (sympCtx && typeof Chart !== 'undefined') {
      if (this.chartInstances.symptom) this.chartInstances.symptom.destroy();

      const symptoms = store.get('symptoms') || [];
      const last14 = symptoms.slice(-14);
      const labels = last14.map(s => {
        const d = new Date(s.timestamp);
        return `${d.getMonth()+1}/${d.getDate()}`;
      });

      this.chartInstances.symptom = new Chart(sympCtx, {
        type: 'line',
        data: {
          labels: labels.length ? labels : ['データなし'],
          datasets: [
            {
              label: '疲労度',
              data: last14.map(s => s.fatigue_level || 0),
              borderColor: '#ef4444',
              backgroundColor: 'rgba(239,68,68,0.1)',
              tension: 0.3, fill: true
            },
            {
              label: '痛み',
              data: last14.map(s => s.pain_level || 0),
              borderColor: '#f59e0b',
              backgroundColor: 'rgba(245,158,11,0.1)',
              tension: 0.3, fill: true
            },
            {
              label: 'ブレインフォグ',
              data: last14.map(s => s.brain_fog || 0),
              borderColor: '#8b5cf6',
              backgroundColor: 'rgba(139,92,246,0.1)',
              tension: 0.3, fill: true
            },
            {
              label: '睡眠品質',
              data: last14.map(s => s.sleep_quality || 0),
              borderColor: '#22c55e',
              backgroundColor: 'rgba(34,197,94,0.1)',
              tension: 0.3, fill: true
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { min: 0, max: 7, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8896b0' } },
            x: { grid: { display: false }, ticks: { color: '#8896b0' } }
          },
          plugins: {
            legend: { labels: { color: '#8896b0', font: { size: 11 } } }
          }
        }
      });
    }
  }

  // ---- Generate Demo Data ----
  generateDemoData() {
    const now = new Date();
    for (let i = 30; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const ts = d.toISOString();

      store.addHealthData('symptoms', {
        timestamp: ts,
        fatigue_level: Math.floor(Math.random() * 4) + 2,
        pain_level: Math.floor(Math.random() * 3) + 1,
        brain_fog: Math.floor(Math.random() * 4) + 1,
        sleep_quality: Math.floor(Math.random() * 3) + 2,
        pem_status: Math.random() > 0.7
      });

      store.addHealthData('vitals', {
        timestamp: ts,
        heart_rate: Math.floor(Math.random() * 30) + 60,
        temperature: (36 + Math.random() * 1.5).toFixed(1),
        spo2: Math.floor(Math.random() * 3) + 96
      });
    }
    store.calculateHealthScore();
    Components.showToast('デモデータを生成しました', 'success');
    this.navigate('dashboard');
  }
};

// Timeline Page
App.prototype.render_timeline = function() {
  const allData = [];
  ['symptoms', 'vitals', 'bloodTests', 'medications', 'sleepData'].forEach(key => {
    const data = store.get(key) || [];
    data.forEach(d => allData.push({ ...d, _type: key }));
  });

  allData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
  const recent = allData.slice(0, 50);

  const typeLabels = { symptoms: '症状記録', vitals: 'バイタル', bloodTests: '血液検査', medications: '服薬', sleepData: '睡眠' };
  const typeIcons = { symptoms: '📝', vitals: '💓', bloodTests: '🩸', medications: '💊', sleepData: '😴' };

  const items = recent.map(d => {
    const date = new Date(d.timestamp);
    const summary = Object.entries(d)
      .filter(([k]) => !['id', 'timestamp', 'category', '_type'].includes(k))
      .map(([k, v]) => `${k}: ${v}`)
      .join(', ');

    return `
    <div class="timeline-item">
      <div class="timeline-dot"></div>
      <div class="timeline-date">${date.toLocaleString('ja-JP')}</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">
        ${typeIcons[d._type] || '📋'} ${typeLabels[d._type] || d._type}
      </div>
      <div class="timeline-content">${summary.substring(0, 200)}</div>
    </div>`;
  }).join('');

  return `
  <div style="margin-bottom:20px">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">タイムライン</h2>
    <p style="font-size:13px;color:var(--text-secondary)">すべての健康データの時系列表示</p>

};

      style="${m.id === model ? 'border-color:var(--accent);background:var(--accent-bg)' : ''}">
      <div class="action-card-title">${m.name}</div>
      <div class="action-card-desc">${m.provider} - ${m.description}</div>
      ${m.id === model ? '<span class="tag tag-accent">使用中</span>' : ''}
    </div>
  `).join('');

  const promptEditors = Object.entries(prompts).map(([key, p]) => `
    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <input class="form-input" data-prompt-name="${key}" value="${p.name}" style="font-weight:600;border:none;background:transparent;padding:0;font-size:14px;color:var(--text-primary)">
        <div style="display:flex;gap:6px">
          <span class="tag ${p.active ? 'tag-success' : 'tag-warning'}">${p.schedule || 'manual'}</span>
          <button class="btn btn-sm btn-danger" onclick="app.deletePrompt('${key}')">削除</button>
        </div>
      </div>
      <div class="card-body">
        <textarea class="form-textarea" data-prompt-text="${key}" style="min-height:200px;font-family:'JetBrains Mono',monospace;font-size:12px">${p.prompt}</textarea>
        <div style="display:flex;justify-content:flex-end;margin-top:10px">
          <button class="btn btn-primary btn-sm" onclick="app.savePrompt('${key}')">保存</button>
        </div>
      </div>
    </div>
  `).join('');

  const affConfig = store.get('affiliateConfig') || {};
  const affFields = CONFIG.AFFILIATE_NETWORKS.map(n => `
    <div class="form-group" style="display:flex;align-items:center;gap:12px">
      <label style="min-width:120px;font-size:13px;font-weight:500">${n.name}</label>
      <input class="form-input" name="aff_${n.id}" value="${affConfig[n.id]?.tag || n.tag || n.code || ''}" placeholder="タグ/コード" style="flex:1">
    </div>
  `).join('');

  return `
  <div style="margin-bottom:20px">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">管理パネル</h2>
    <p style="font-size:13px;color:var(--text-secondary)">AIモデル・プロンプト・アフィリエイトの設定</p>
  </div>

  <!-- AI Model Selection -->
  <div style="margin-bottom:28px">
    <h3 style="font-size:15px;font-weight:600;margin-bottom:12px">AIモデル選択</h3>
    <div class="grid-auto" style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))">
      ${modelCards}
    </div>
  </div>

  <!-- API Key Configuration -->
  <div class="card" style="margin-bottom:28px">
    <div class="card-header"><span class="card-title">APIキー設定</span></div>
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Anthropic API Key</label>
        <input type="password" class="form-input" placeholder="sk-ant-..." onchange="localStorage.setItem('apikey_claude-sonnet-4-6',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">OpenAI API Key</label>
        <input type="password" class="form-input" placeholder="sk-..." onchange="localStorage.setItem('apikey_gpt-4o',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Google AI API Key</label>
        <input type="password" class="form-input" placeholder="AIza..." onchange="localStorage.setItem('apikey_gemini-2.5-pro',this.value)">
      </div>
    </div>
  </div>

  <!-- Prompt Management -->
  <div style="margin-bottom:28px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:15px;font-weight:600">分析プロンプト管理</h3>
      <button class="btn btn-primary btn-sm" onclick="app.addNewPrompt()">+ 新規プロンプト</button>
    </div>
    ${promptEditors}
  </div>

  <!-- Affiliate Configuration -->
  <div class="card" style="margin-bottom:28px">
    <div class="card-header"><span class="card-title">アフィリエイト設定</span></div>
    <div class="card-body">
      <form onsubmit="app.saveAffiliateConfig(event)">
        ${affFields}
        <button type="submit" class="btn btn-primary btn-sm" style="margin-top:12px">設定を保存</button>
      </form>
    </div>
  </div>

  <!-- Dashboard Layout -->
  <div class="card" style="margin-bottom:28px">
    <div class="card-header"><span class="card-title">ダッシュボードレイアウト</span></div>
    <div class="card-body">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-secondary" onclick="store.set('dashboardLayout','default');Components.showToast('デフォルトレイアウト','info')">デフォルト</button>
        <button class="btn btn-secondary" onclick="store.set('dashboardLayout','compact');Components.showToast('コンパクトレイアウト','info')">コンパクト</button>
        <button class="btn btn-secondary" onclick="store.set('dashboardLayout','detailed');Components.showToast('詳細レイアウト','info')">詳細表示</button>
      </div>
    </div>
  </div>

  <!-- Demo & Data -->
  <div class="card">
    <div class="card-header"><span class="card-title">データ管理</span></div>
    <div class="card-body" style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="app.generateDemoData()">デモデータ生成</button>
      <button class="btn btn-secondary" onclick="app.exportData()">データエクスポート</button>
      <button class="btn btn-danger" onclick="if(confirm('すべてのデータを削除しますか？')){store.clearAll();location.reload()}">データ全削除</button>
    </div>
  </div>`;
};

// Settings Page
App.prototype.render_settings = function() {
  const user = store.get('user') || {};
  const disease = store.get('selectedDisease') || {};
  const theme = store.get('theme');

  return `
  <div style="margin-bottom:20px">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">設定</h2>
  </div>

  <!-- Profile -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span class="card-title">プロフィール</span></div>
    <div class="card-body">
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
        <div class="user-avatar" style="width:56px;height:56px;font-size:22px">${user.displayName?.[0] || '?'}</div>
        <div>
          <div style="font-size:16px;font-weight:600">${user.displayName || 'ゲスト'}</div>
          <div style="font-size:13px;color:var(--text-muted)">${user.email || ''}</div>
          <div class="tag tag-accent" style="margin-top:6px">${disease.name || '未設定'} - ${disease.fullName || ''}</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm" onclick="app.navigate('disease-select')">疾患設定を変更</button>
    </div>
  </div>

  <!-- Theme -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span class="card-title">表示設定</span></div>
    <div class="card-body">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span>テーマ</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm ${theme==='dark'?'btn-primary':'btn-secondary'}" onclick="store.set('theme','dark')">ダーク</button>
          <button class="btn btn-sm ${theme==='light'?'btn-primary':'btn-secondary'}" onclick="store.set('theme','light')">ライト</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Data Export -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header"><span class="card-title">データ管理</span></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
      <button class="btn btn-secondary" onclick="app.exportData()">すべてのデータをエクスポート (JSON)</button>
      <button class="btn btn-danger" onclick="if(confirm('本当にログアウトしますか？')){app.logout()}">ログアウト</button>
    </div>
  </div>`;
};

// Export Data utility
App.prototype.exportData = function() {
  const data = {
    exportDate: new Date().toISOString(),
    user: store.get('user'),
    disease: store.get('selectedDisease'),
    symptoms: store.get('symptoms'),
    vitals: store.get('vitals'),
    bloodTests: store.get('bloodTests'),
    medications: store.get('medications'),
    supplements: store.get('supplements'),
    meals: store.get('meals'),
    sleepData: store.get('sleepData'),
    activityData: store.get('activityData'),
    analysisHistory: store.get('analysisHistory'),
    conversationHistory: store.get('conversationHistory')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chroniccare_export_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  Components.showToast('データをエクスポートしました', 'success');
};



document.addEventListener('DOMContentLoaded', function() { app.init(); });
</script>
</body>
</html>

/* ============================================================
   Firebase Backend - Auth + Firestore Cloud Database
   Replaces localStorage with cloud persistence
   ============================================================ */
var FirebaseBackend = {
  app: null,
  auth: null,
  db: null,
  initialized: false,
  userId: null,

  // Initialize Firebase (call once on page load)
  init(firebaseConfig) {
    if (this.initialized) return;

    try {
      // Firebase v9+ compat mode (loaded via CDN)
      this.app = firebase.initializeApp(firebaseConfig);
      this.auth = firebase.auth();
      // Persist login across browser restarts (LOCAL = survives tab/browser close)
      this.auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
      this.db = firebase.firestore();

      // Enable offline persistence
      this.db.enablePersistence({ synchronizeTabs: true }).catch(err => {
        if (err.code === 'failed-precondition') {
          console.warn('Firestore persistence: multiple tabs open');
        } else if (err.code === 'unimplemented') {
          console.warn('Firestore persistence: browser not supported');
        }
      });

      // Handle redirect result (for mobile Google sign-in)
      this.auth.getRedirectResult().then(result => {
        if (result?.user) {
          Components.showToast(`${result.user.displayName || result.user.email} でログインしました`, 'success');
        }
      }).catch(err => {
        console.warn('Redirect result error:', err.message);
      });

      // Listen for auth state changes
      this.auth.onAuthStateChanged(user => {
        if (user) {
          this.userId = user.uid;
          const userData = {
            uid: user.uid,
            displayName: user.displayName,
            email: user.email,
            photoURL: user.photoURL
          };
          store.update({ user: userData, isAuthenticated: true });

          // Update sidebar user info
          const avatarEl = document.getElementById('user-avatar');
          const nameEl = document.getElementById('user-name');
          if (avatarEl) {
            if (user.photoURL) {
              avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
            } else {
              avatarEl.textContent = (user.displayName || user.email || '?')[0];
            }
          }
          if (nameEl) nameEl.textContent = user.displayName || user.email;

          // Load user data from Firestore
          this.loadAllData();

          // Navigate to appropriate page
          if (app.currentPage === 'login') {
            const disease = store.get('selectedDisease');
            app.navigate(disease ? 'dashboard' : 'disease-select');
          }
        } else {
          this.userId = null;
          // Only force login if not already authenticated via localStorage
          if (!store.get('isAuthenticated')) {
            store.update({ user: null, isAuthenticated: false });
            app.navigate('login');
          }
        }
      });

      this.initialized = true;
      console.log('Firebase initialized');
    } catch (err) {
      console.error('Firebase init failed:', err);
      Components.showToast('Firebase初期化エラー: ' + err.message, 'error');
    }
  },

  // ---- Authentication ----
  async signInWithGoogle() {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });

      // Use redirect on mobile (popup often blocked), popup on desktop
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile) {
        await this.auth.signInWithRedirect(provider);
        // Page will redirect and come back; onAuthStateChanged handles the rest
        return null;
      } else {
        const result = await this.auth.signInWithPopup(provider);
        Components.showToast(`${result.user.displayName || result.user.email} でログインしました`, 'success');
        return result.user;
      }
    } catch (err) {
      if (err.code === 'auth/popup-closed-by-user') return null;
      if (err.code === 'auth/popup-blocked') {
        // Fallback to redirect
        const provider = new firebase.auth.GoogleAuthProvider();
        await this.auth.signInWithRedirect(provider);
        return null;
      }
      Components.showToast('Googleログインがうまくいきませんでした。メールアドレスでの登録もお試しください。', 'error');
      throw err;
    }
  },

  async signInWithEmail(email, password) {
    try {
      // Try sign in first, if fails try create account
      try {
        const result = await this.auth.signInWithEmailAndPassword(email, password);
        Components.showToast('おかえりなさい。ログインしました', 'success');
        return result.user;
      } catch (err) {
        if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
          // New user - create account
          try {
            const result = await this.auth.createUserWithEmailAndPassword(email, password);
            Components.showToast('アカウントを作成しました。ようこそ！', 'success');
            return result.user;
          } catch (createErr) {
            if (createErr.code === 'auth/email-already-in-use') {
              Components.showToast('このメールアドレスは登録済みです。パスワードをご確認ください', 'error');
            } else if (createErr.code === 'auth/weak-password') {
              Components.showToast('パスワードは6文字以上で設定してください', 'error');
            } else if (createErr.code === 'auth/invalid-email') {
              Components.showToast('メールアドレスの形式が正しくありません', 'error');
            } else {
              Components.showToast('登録できませんでした。もう一度お試しください', 'error');
            }
            throw createErr;
          }
        }
        if (err.code === 'auth/wrong-password') {
          Components.showToast('パスワードが違います。もう一度お試しください', 'error');
        } else if (err.code === 'auth/too-many-requests') {
          Components.showToast('しばらく時間をおいてからお試しください', 'error');
        } else if (err.code === 'auth/invalid-email') {
          Components.showToast('メールアドレスの形式が正しくありません', 'error');
        } else {
          Components.showToast('ログインできませんでした。もう一度お試しください', 'error');
        }
        throw err;
      }
    } catch (err) {
      throw err;
    }
  },

  async signOut() {
    try {
      await this.auth.signOut();
      store.clearAll();
      Components.showToast('ログアウトしました', 'info');
    } catch (err) {
      Components.showToast('ログアウトエラー: ' + err.message, 'error');
    }
  },

  // ---- Firestore Data Operations ----

  // Get reference to user's document collection
  userDoc() {
    if (!this.userId) throw new Error('Not authenticated');
    return this.db.collection('users').doc(this.userId);
  },

  userCollection(name) {
    return this.userDoc().collection(name);
  },

  // Save a single key-value to user profile
  async saveProfile(data) {
    try {
      await this.userDoc().set(data, { merge: true });
    } catch (err) {
      console.error('Save profile error:', err);
    }
  },

  // Save health data entry to a subcollection
  async saveHealthEntry(collection, entry) {
    try {
      const docRef = await this.userCollection(collection).add({
        ...entry,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      return docRef.id;
    } catch (err) {
      console.error('Save entry error:', err);
      return null;
    }
  },

  // Save text entry
  async saveTextEntry(entry) {
    return await this.saveHealthEntry('textEntries', entry);
  },

  // Save conversation message
  async saveConversation(message) {
    return await this.saveHealthEntry('conversations', message);
  },

  // Save settings (selected disease, model, prompts, affiliate config)
  async saveSettings(settings) {
    await this.saveProfile({ settings });
  },

  // Save API keys (encrypted in Firestore, not in localStorage)
  async saveApiKeys(keys) {
    // Store in a separate secured subcollection
    try {
      await this.userDoc().collection('secrets').doc('apikeys').set(keys);
      Components.showToast('APIキーをクラウドに保存しました', 'success');
    } catch (err) {
      console.error('Save API keys error:', err);
      Components.showToast('APIキー保存エラー', 'error');
    }
  },

  async loadApiKeys() {
    try {
      const doc = await this.userDoc().collection('secrets').doc('apikeys').get();
      return doc.exists ? doc.data() : {};
    } catch (err) {
      console.error('Load API keys error:', err);
      return {};
    }
  },

  // ---- Global admin-managed config (shared by all users) ----
  // Stored at admin/config. Writable only by admin (per firestore.rules),
  // readable by any authenticated user.
  async saveGlobalConfig(config) {
    try {
      await firebase.firestore().collection('admin').doc('config').set(config, { merge: true });
      Components.showToast('全ユーザー共通設定を保存しました', 'success');
      return true;
    } catch (err) {
      console.error('Save global config error:', err);
      Components.showToast('共通設定の保存に失敗しました（管理者権限が必要）', 'error');
      return false;
    }
  },

  async loadGlobalConfig() {
    try {
      const doc = await firebase.firestore().collection('admin').doc('config').get();
      return doc.exists ? doc.data() : {};
    } catch (err) {
      console.warn('Load global config:', err.message);
      return {};
    }
  },

  // ---- Batch Load All User Data ----
  async loadAllData() {
    if (!this.userId) return;

    try {
      // Load user profile
      const profileDoc = await this.userDoc().get();
      if (profileDoc.exists) {
        const profile = profileDoc.data();
        if (profile.settings?.selectedDisease) store.set('selectedDisease', profile.settings.selectedDisease);
        if (profile.settings?.selectedDiseases) store.set('selectedDiseases', profile.settings.selectedDiseases);
        if (profile.settings?.selectedModel) store.set('selectedModel', profile.settings.selectedModel);
        if (profile.settings?.customPrompts) store.set('customPrompts', profile.settings.customPrompts);
        if (profile.settings?.affiliateConfig) store.set('affiliateConfig', profile.settings.affiliateConfig);
        if (profile.settings?.dashboardLayout) store.set('dashboardLayout', profile.settings.dashboardLayout);
        if (profile.userProfile) store.set('userProfile', profile.userProfile);
        if (profile.adminEmails) {
          try { app.ADMIN_EMAILS = [...new Set(['agewaller@gmail.com', ...profile.adminEmails])]; } catch(e) {}
        }
      }

      // Load collections in parallel
      const collections = {
        textEntries: 'textEntries',
        symptoms: 'symptoms',
        vitals: 'vitals',
        sleepData: 'sleep',
        activityData: 'activity',
        bloodTests: 'bloodTests',
        medications: 'medications',
        conversations: 'conversationHistory'
      };

      const loadPromises = Object.entries(collections).map(async ([storeKey, fbCollection]) => {
        try {
          const snapshot = await this.userCollection(fbCollection)
            .orderBy('createdAt', 'desc')
            .limit(500)
            .get();
          const data = [];
          snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
          data.reverse(); // chronological order
          store.set(storeKey, data);
        } catch (err) {
          // Collection might not exist yet
          console.warn(`Load ${fbCollection}:`, err.message);
        }
      });

      await Promise.all(loadPromises);

      // Load global admin-managed config (shared by all users)
      // This takes precedence over any per-user legacy keys so that admin
      // changes propagate to everyone automatically.
      const globalConfig = await this.loadGlobalConfig();
      if (globalConfig.apiKeys) {
        if (globalConfig.apiKeys.anthropic) localStorage.setItem('apikey_anthropic', globalConfig.apiKeys.anthropic);
        if (globalConfig.apiKeys.openai) localStorage.setItem('apikey_openai', globalConfig.apiKeys.openai);
        if (globalConfig.apiKeys.google) localStorage.setItem('apikey_google', globalConfig.apiKeys.google);
      }
      if (globalConfig.proxyUrl) localStorage.setItem('anthropic_proxy_url', globalConfig.proxyUrl);
      if (globalConfig.selectedModel) store.set('selectedModel', globalConfig.selectedModel);

      // Legacy fallback: load user's own keys only if global config had none
      if (!globalConfig.apiKeys) {
        const apiKeys = await this.loadApiKeys();
        if (apiKeys.anthropic) localStorage.setItem('apikey_anthropic', apiKeys.anthropic);
        if (apiKeys.openai) localStorage.setItem('apikey_openai', apiKeys.openai);
        if (apiKeys.google) localStorage.setItem('apikey_google', apiKeys.google);
      }

      store.calculateHealthScore();
      console.log('All user data loaded from Firestore');
    } catch (err) {
      console.error('Load all data error:', err);
    }
  },

  // ---- Sync store changes to Firestore ----
  enableAutoSync() {
    // Watch for text entries
    store.on('textEntries', (entries) => {
      if (!this.userId || !entries?.length) return;
      const latest = entries[entries.length - 1];
      if (latest && !latest._synced) {
        this.saveHealthEntry('textEntries', latest);
        latest._synced = true;
      }
    });

    // Watch for symptom data
    store.on('symptoms', (entries) => {
      if (!this.userId || !entries?.length) return;
      const latest = entries[entries.length - 1];
      if (latest && !latest._synced) {
        this.saveHealthEntry('symptoms', latest);
        latest._synced = true;
      }
    });

    // Watch for vitals
    store.on('vitals', (entries) => {
      if (!this.userId || !entries?.length) return;
      const latest = entries[entries.length - 1];
      if (latest && !latest._synced) {
        this.saveHealthEntry('vitals', latest);
        latest._synced = true;
      }
    });

    // Watch for settings changes
    ['selectedDisease', 'selectedDiseases', 'selectedModel', 'customPrompts', 'affiliateConfig', 'dashboardLayout'].forEach(key => {
      store.on(key, (value) => {
        if (!this.userId) return;
        this.saveProfile({ settings: { [key]: value } });
      });
    });

    // Watch for user profile changes
    store.on('userProfile', (value) => {
      if (!this.userId) return;
      this.saveProfile({ userProfile: value });
    });

    // Watch for analysis history
    store.on('latestAnalysis', (analysis) => {
      if (!this.userId || !analysis) return;
      this.saveHealthEntry('analyses', {
        timestamp: analysis.timestamp,
        model: analysis.model,
        promptName: analysis.promptName,
        summary: analysis.parsed?.summary || '',
      });
    });
  },

  // Check if Firebase is configured
  isConfigured() {
    const cfg = this.getConfig();
    return cfg && cfg.apiKey && cfg.apiKey !== 'YOUR_FIREBASE_API_KEY';
  },

  // Get Firebase config from CONFIG or localStorage
  getConfig() {
    const stored = localStorage.getItem('firebase_config');
    if (stored) {
      try { return JSON.parse(stored); } catch {}
    }
    return CONFIG.FIREBASE;
  },

  saveConfig(config) {
    localStorage.setItem('firebase_config', JSON.stringify(config));
  }
};

  // ---- Navigation ----
  navigate(page) {
    // Block non-admin users from admin-only pages
    if (['admin', 'analysis'].includes(page) && !this.isAdmin()) {
      Components.showToast('この機能は管理者専用です', 'error');
      return;
    }

    this.currentPage = page;
    const content = document.getElementById('page-content');
    const sidebar = document.getElementById('sidebar');
    const topbar = document.getElementById('top-bar');
    if (!content) return;

    // Hide admin-only nav items for non-admin users
    document.querySelectorAll('.admin-only').forEach(el => {
      el.style.display = this.isAdmin() ? '' : 'none';
    });

    // Show/hide sidebar for login/disease-select
    if (['login', 'disease-select'].includes(page)) {
      if (sidebar) sidebar.style.display = 'none';
      if (topbar) topbar.style.display = 'none';
      document.querySelector('.main-content').style.marginLeft = '0';
    } else {
      if (sidebar) sidebar.style.display = '';
      if (topbar) topbar.style.display = '';
      document.querySelector('.main-content').style.marginLeft = '';
    }

    // Update active nav
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.page === page);
    });

    // Update top bar title
    const titles = {
      dashboard: 'ダッシュボード',
      'data-input': 'データ入力',
      analysis: 'AI分析',
      actions: 'アクションセンター',
      research: '最新研究',
      chat: '相談する',
      integrations: 'デバイス連携',
      timeline: 'タイムライン',
      admin: '管理パネル',
      settings: '設定'
    };
    const titleEl = document.getElementById('top-bar-title');
    if (titleEl) titleEl.textContent = titles[page] || '';

    // Close sidebar on mobile after navigation
    this.closeSidebar();

    // Render page
    const renderer = this['render_' + page.replace(/-/g, '_')];
    if (renderer) {
      try {
        content.innerHTML = renderer.call(this);
        this.afterRender(page);
      } catch(err) {
        console.error('Page render error:', page, err);
        content.innerHTML = `<div style="padding:20px"><p>ページの読み込みエラー</p><p style="font-size:12px;color:#94a3b8">${err.message}</p><button onclick="store.clearAll();location.reload()" style="margin-top:10px;padding:8px 16px;background:#6C63FF;color:white;border:none;border-radius:8px;cursor:pointer">リセットして再読み込み</button></div>`;
      }
    }
  }

  afterRender(page) {
    if (page === 'dashboard') {
      this.initDashboardCharts();
      setTimeout(() => this.loadDashResearch(), 300);
      setTimeout(() => this.loadActionRecommendations(), 600);
    }
    if (page === 'actions') {
      setTimeout(() => this.loadActionRecommendations(), 300);
    }
    if (page === 'research') {
      setTimeout(() => this.autoLoadResearchPage(), 300);
    }
    if (page === 'analysis') this.loadLatestAnalysis();
    if (page === 'admin') { this.loadApiKeyFields(); this.loadFirebaseConfigFields(); }
    if (page === 'settings') this.loadProfileFields();
  }

  // ---- API Key Management ----
  // ---- Firebase Config Management ----
  saveFirebaseConfig() {
    const fields = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
    const config = {};
    let filled = 0;
    fields.forEach(f => {
      const el = document.getElementById('fb-' + f);
      if (el && el.value.trim()) {
        config[f] = el.value.trim();
        filled++;
      }
    });

    if (filled < 3) {
      Components.showToast('API Key, Auth Domain, Project IDは必須です', 'error');
      return;
    }

    FirebaseBackend.saveConfig(config);
    Components.showToast('Firebase設定を保存しました。ページをリロードして接続します...', 'success');
    setTimeout(() => location.reload(), 1500);
  }

  clearFirebaseConfig() {
    localStorage.removeItem('firebase_config');
    Components.showToast('Firebase設定を削除しました。リロード後はローカルモードになります。', 'info');
    setTimeout(() => location.reload(), 1500);
  }

  loadFirebaseConfigFields() {
    const config = FirebaseBackend.getConfig();
    if (!config) return;
    ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'].forEach(f => {
      const el = document.getElementById('fb-' + f);
      if (el && config[f] && config[f] !== 'YOUR_FIREBASE_API_KEY') {
        el.value = config[f];
      }
    });
    const statusEl = document.getElementById('firebase-status');
    if (statusEl) {
      const configured = FirebaseBackend.isConfigured();
      const connected = FirebaseBackend.initialized;
      statusEl.className = 'tag ' + (connected ? 'tag-success' : configured ? 'tag-warning' : 'tag-danger');
      statusEl.textContent = connected ? '接続中' : configured ? '設定済(未接続)' : '未設定';
    }
  }

  loadApiKeyFields() {
    // Load proxy URL (show default if not custom-set)
    const proxyEl = document.getElementById('input-proxy-url');
    if (proxyEl) {
      const proxyStored = localStorage.getItem('anthropic_proxy_url');
      proxyEl.value = proxyStored || 'https://stock-screener.agewaller.workers.dev';
    }

    const keys = ['anthropic', 'openai', 'google'];
    keys.forEach(k => {
      const el = document.getElementById('input-apikey-' + k);
      const stored = localStorage.getItem('apikey_' + k);
      if (el && stored) {
        el.value = stored;
      }
    });
    // Update status badge
    const statusEl = document.getElementById('api-key-status');
    if (statusEl) {
      const hasAny = keys.some(k => localStorage.getItem('apikey_' + k));
      statusEl.className = 'tag ' + (hasAny ? 'tag-success' : 'tag-warning');
      statusEl.textContent = hasAny ? 'APIキー設定済' : 'APIキー未設定';
    }
  }

  async saveApiKeys() {
    if (!this.isAdmin()) {
      Components.showToast('APIキー設定は管理者専用です', 'error');
      return;
    }
    const keys = ['anthropic', 'openai', 'google'];
    const keyData = {};
    let saved = 0;
    let proxyUrl = '';
    // Save proxy URL
    const proxyEl = document.getElementById('input-proxy-url');
    if (proxyEl && proxyEl.value.trim()) {
      proxyUrl = proxyEl.value.trim();
      localStorage.setItem('anthropic_proxy_url', proxyUrl);
      saved++;
    }

    keys.forEach(k => {
      const el = document.getElementById('input-apikey-' + k);
      if (el && el.value.trim()) {
        localStorage.setItem('apikey_' + k, el.value.trim());
        keyData[k] = el.value.trim();
        saved++;
      }
    });
    if (saved > 0) {
      // Save to global admin config so all users inherit these settings
      if (FirebaseBackend.initialized) {
        const globalConfig = { apiKeys: keyData };
        if (proxyUrl) globalConfig.proxyUrl = proxyUrl;
        await FirebaseBackend.saveGlobalConfig(globalConfig);
      } else {
        Components.showToast(saved + '個のAPIキーを保存しました（ローカル）', 'success');
      }
      this.loadApiKeyFields();
    } else {
      Components.showToast('保存するAPIキーがありません', 'error');
    }
  }

  async testApiKey() {
    const result = document.getElementById('api-test-result');
    if (result) result.innerHTML = Components.loading('接続テスト中...');

    const model = store.get('selectedModel') || 'claude-sonnet-4-6';
    const apiKey = aiEngine.getApiKey(model);

    if (!apiKey) {
      if (result) result.innerHTML = '<div style="color:var(--danger);font-size:12px">APIキーが設定されていません。上のフィールドにキーを入力して「保存」してください。</div>';
      return;
    }

    try {
      const response = await aiEngine.callModel(model, 'こんにちは。接続テストです。「接続成功」と返答してください。', { maxTokens: 100 });
      if (result) result.innerHTML = `<div style="color:var(--success);font-size:12px;padding:8px;background:var(--success-bg);border-radius:var(--radius-sm)">接続成功（${model}）: ${typeof response === 'string' ? response.substring(0, 100) : 'OK'}</div>`;
    } catch (err) {
      if (result) result.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:8px;background:var(--danger-bg);border-radius:var(--radius-sm)">接続失敗: ${err.message}</div>`;
    }
  }

  async clearApiKeys() {
    if (!this.isAdmin()) {
      Components.showToast('APIキー設定は管理者専用です', 'error');
      return;
    }
    ['anthropic', 'openai', 'google'].forEach(k => {
      localStorage.removeItem('apikey_' + k);
      const el = document.getElementById('input-apikey-' + k);
      if (el) el.value = '';
    });
    if (FirebaseBackend.initialized) {
      await FirebaseBackend.saveGlobalConfig({ apiKeys: {} });
    }
    Components.showToast('すべてのAPIキーを削除しました', 'info');
    this.loadApiKeyFields();
  }

  async loginWithGoogle() {
    if (FirebaseBackend.initialized) {
      // Real Google OAuth via Firebase
      try {
        await FirebaseBackend.signInWithGoogle();
        // Navigation handled by onAuthStateChanged
      } catch (err) {
        // Fallback to prompt mode
        this.loginWithPrompt();

  loginWithPrompt() {
    const email = prompt('Googleアカウントのメールアドレスを入力してください:', 'agewaller@gmail.com');
    if (!email) return;
    const user = {
      uid: 'local_' + email.replace(/[^a-z0-9]/gi, '_'),
      displayName: email.split('@')[0],
      email: email,
      photoURL: null
    };
    store.update({ user, isAuthenticated: true });
    this.finishLogin(email);
  }

  finishLogin(email) {
    // Save custom disease name if selected
    const customInput = document.getElementById('custom-disease-name');
    if (customInput && customInput.value.trim()) {
      const diseases = store.get('selectedDiseases') || [];
      if (!diseases.includes('custom')) diseases.push('custom');
      store.set('selectedDiseases', diseases);
      store.set('customDiseaseName', customInput.value.trim());
    }

    // Ensure primary disease is set
    const diseases = store.get('selectedDiseases') || [];
    if (diseases.length > 0 && !store.get('selectedDisease')) {
      for (const cat of CONFIG.DISEASE_CATEGORIES) {
        const found = cat.diseases.find(d => d.id === diseases[0]);
        if (found) {
          store.set('selectedDisease', { id: found.id, name: found.name, fullName: found.name, icon: cat.icon, color: '#6C63FF' });
          break;
        }
      }
    }

    // Default to ME/CFS if nothing selected
    if (!store.get('selectedDisease')) {
      store.set('selectedDisease', { id: 'mecfs', name: 'ME/CFS', fullName: '筋痛性脳脊髄炎/慢性疲労症候群', icon: '🧠', color: '#6C63FF' });
    }

    // Load default prompts
    if (!store.get('customPrompts') || Object.keys(store.get('customPrompts')).length === 0) {
      store.set('customPrompts', { ...DEFAULT_PROMPTS });
    }

    Components.showToast(`${email} でログインしました（${diseases.length}疾患選択）`, 'success');
    this.navigate('dashboard');
  }

  async loginWithEmail(e) {
    if (e) e.preventDefault();
    const form = e.target;
    const email = form.querySelector('[name=email]').value;
    const pass = form.querySelector('[name=password]').value;
    if (!email || !pass) { Components.showToast('メールとパスワードを入力してください', 'error'); return; }

    if (FirebaseBackend.initialized) {
      try {
        await FirebaseBackend.signInWithEmail(email, pass);
      } catch (err) { /* error shown in signInWithEmail */ }
    } else {
      const user = { uid: 'local_' + Date.now(), displayName: email.split('@')[0], email, photoURL: null };
      store.update({ user, isAuthenticated: true });
      Components.showToast('ログインしました（ローカルモード）', 'success');
      this.navigate('disease-select');
    }
  }

  // Generic inline double-tap to proceed (mobile-safe, no modal dialogs)
  confirmAction(btn, label, callback) {
    if (!btn) return;
    if (btn.dataset.confirmed) { callback(); return; }
    const orig = btn.textContent;
    const origBg = btn.style.background;
    btn.dataset.confirmed = '1';
    btn.textContent = `${label}？もう一度押して確定`;
    btn.style.background = 'var(--danger)';
    btn.style.color = '#fff';
    setTimeout(() => {
      if (btn.dataset.confirmed) {
        btn.textContent = orig;
        btn.style.background = origBg;
        btn.style.color = '';
        delete btn.dataset.confirmed;
      }
    }, 4000);
  }

    const btn = document.getElementById('logout-btn');

    btn.outerHTML = `
      <div style="text-align:center;padding:12px;background:var(--danger-bg);border-radius:12px">

  async logout() {
    try {
      if (FirebaseBackend.initialized) {
        await FirebaseBackend.signOut();
      }
    } catch(e) {
      console.warn('Logout error:', e);

  // ---- Disease Selection ----
  // ---- Disease Selection (multi-select) ----
  toggleDiseaseSelection(checkbox) {
    const selected = store.get('selectedDiseases') || [];
    const id = checkbox.value;

    if (checkbox.checked) {
      if (!selected.includes(id)) selected.push(id);
    } else {
      const idx = selected.indexOf(id);
      if (idx >= 0) selected.splice(idx, 1);
    }

    store.set('selectedDiseases', selected);

    // Update count badge
    const countEl = document.getElementById('disease-count');
    if (countEl) countEl.textContent = selected.length + '件選択中';

    // Show/hide custom input
    if (id === 'custom') {
      const customInput = document.getElementById('custom-disease-name');
      if (customInput) customInput.style.display = checkbox.checked ? 'block' : 'none';
    }

    // Also set primary disease for backward compat
    if (selected.length > 0) {
      const primaryId = selected[0];
      // Find disease name from categories
      let primaryDisease = null;
      for (const cat of CONFIG.DISEASE_CATEGORIES) {
        const found = cat.diseases.find(d => d.id === primaryId);
        if (found) {
          primaryDisease = { id: found.id, name: found.name, fullName: found.name, icon: cat.icon, color: '#6C63FF' };
          break;
        }
      }
      if (primaryDisease) store.set('selectedDisease', primaryDisease);
    }
  }

  selectDisease(diseaseId) {
    // Legacy single-select support
    const disease = CONFIG.DISEASES.find(d => d.id === diseaseId);
    if (disease) {
      store.set('selectedDisease', disease);
      store.set('selectedDiseases', [diseaseId]);
      if (!store.get('customPrompts') || Object.keys(store.get('customPrompts')).length === 0) {
        store.set('customPrompts', { ...DEFAULT_PROMPTS });
      }
      Components.showToast(`${disease.name} を選択しました`, 'success');
      this.navigate('dashboard');
    }
  }

  // ---- Data Input ----
  openDataInput(category) {
    const overlay = document.getElementById('modal-overlay');
    const body = document.getElementById('modal-body');
    const title = document.getElementById('modal-title');
    if (!overlay || !body) return;

    const cat = CONFIG.DATA_CATEGORIES.find(c => c.id === category);
    title.textContent = cat ? `${cat.icon} ${cat.name}を記録` : 'データ入力';

    if (category === 'photos') {
      body.innerHTML = Components.photoUpload(category);
    } else {
      body.innerHTML = Components.dataEntryForm(category);
    }
    overlay.classList.add('active');
  }

  closeModal() {
    document.getElementById('modal-overlay')?.classList.remove('active');
  }

  submitDataForm(e, category) {
    e.preventDefault();
    const form = e.target;
    const data = {};
    new FormData(form).forEach((val, key) => {
      data[key] = isNaN(val) ? val : Number(val);
    });
    // Handle checkboxes
    form.querySelectorAll('input[type=checkbox]').forEach(cb => {
      data[cb.name] = cb.checked;
    });

    store.addHealthData(category, data);
    store.calculateHealthScore();
    Components.showToast('データを保存しました', 'success');
    this.closeModal();
    if (this.currentPage === 'dashboard') this.navigate('dashboard');
  }

  submitTextEntry() {
    const category = document.getElementById('text-input-category')?.value || 'other';
    const title = document.getElementById('text-input-title')?.value?.trim() || '';
    const content = document.getElementById('text-input-content')?.value?.trim() || '';
    const dateStr = document.getElementById('text-input-date')?.value || '';

    if (!content) {
      Components.showToast('内容を入力してください', 'error');
      return;
    }

    const timestamp = dateStr ? new Date(dateStr + 'T12:00:00').toISOString() : new Date().toISOString();

    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).substr(2),
      timestamp: timestamp,
      category: category,
      type: 'text_entry',
      title: title,
      content: content
    };

    // Store in conversation history for AI context
    const history = store.get('conversationHistory') || [];
    history.push({
      role: 'user',
      content: `[${category}] ${title ? title + ': ' : ''}${content}`,
      timestamp: entry.timestamp,
      type: 'data_entry'
    });
    store.set('conversationHistory', history);

    // Always store in textEntries for AI analysis
    const textEntries = store.get('textEntries') || [];
    textEntries.push(entry);
    store.set('textEntries', textEntries);

    // Also store as health data in the appropriate category
    const stateKey = store.categoryToStateKey(category);
    if (stateKey && Array.isArray(store.get(stateKey))) {
      store.addHealthData(category, { text_note: content, title: title });
    }

    // Clear form
    document.getElementById('text-input-content').value = '';
    document.getElementById('text-input-title').value = '';

    // Navigate to dashboard and run API analysis
    this.navigate('dashboard');
    Components.showToast('保存しました', 'success');

    // ALL analysis via API prompt
    const inputWithContext = `[${category}] ${title ? title + ': ' : ''}${content}`;
    const promptType = category === 'conversation' ? 'conversation_analysis' : 'text_analysis';
    setTimeout(() => {
      this.analyzeViaAPI(inputWithContext, promptType).then(result => {
        store.set('latestFeedback', result);
        this.saveAIComment(entry.id, result);
        const el = document.getElementById('dash-ai-feedback');
        if (el) el.innerHTML = this.renderAnalysisCard(result);
      });
    }, 500);
  }

  // ---- AI Analysis ----
  async runAnalysis(promptKey) {
    const prompts = { ...DEFAULT_PROMPTS, ...(store.get('customPrompts') || {}) };
    const promptConfig = prompts[promptKey] || Object.values(prompts)[0];
    if (!promptConfig) { Components.showToast('プロンプトが見つかりません', 'error'); return; }

    const resultArea = document.getElementById('analysis-result');
    if (resultArea) resultArea.innerHTML = Components.loading('分析を実行中...');

    try {
      const result = await aiEngine.runScheduledAnalysis(promptConfig);
      if (resultArea) this.renderAnalysisResult(result, resultArea);
      Components.showToast('分析が完了しました', 'success');
    } catch (err) {
      if (resultArea) resultArea.innerHTML = `<div style="color:var(--danger);padding:20px">分析エラー: ${err.message}</div>`;
      Components.showToast('分析に失敗しました', 'error');
    }
  }

    if (p.summary) {
      html += `<div class="card" style="margin-bottom:20px"><div class="card-body">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:10px">分析サマリー</h3>
        <p style="font-size:13px;color:var(--text-secondary);line-height:1.8">${p.summary}</p>
      </div></div>`;
    }

    // Risk Alerts
    if (p.riskAlerts?.length) {
      html += '<div style="margin-bottom:20px">';
      p.riskAlerts.forEach(a => {
        const c = a.level === 'warning' ? 'var(--warning)' : 'var(--info)';
        html += `<div style="padding:12px 16px;background:${c}15;border-left:3px solid ${c};border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;color:var(--text-primary)">${a.message}</div>`;
      });
      html += '</div>';
    }

    // Trends
    if (p.trends) {
      html += '<div class="grid grid-4" style="margin-bottom:20px">';
      const trendLabels = { fatigue: '疲労', pain: '痛み', sleep: '睡眠', cognitive: '認知機能' };
      const trendIcons = { fatigue: '😴', pain: '💢', sleep: '🌙', cognitive: '🧠' };
      Object.entries(p.trends).forEach(([k, v]) => {
        const dir = v.direction === 'improving' ? '改善↑' : v.direction === 'declining' ? '悪化↓' : '安定→';
        const cls = v.direction === 'improving' ? 'positive' : v.direction === 'declining' ? 'negative' : '';
        html += Components.statCard(trendLabels[k] || k, `${trendIcons[k] || ''} ${dir}`, v.change ? v.change * 100 : 0);
      });
      html += '</div>';
    }

    // Recommendations
    if (p.recommendations?.length) {
      html += '<h3 style="font-size:16px;font-weight:600;margin:24px 0 14px">推奨アクション</h3>';
      p.recommendations.forEach(r => { html += Components.recommendationCard(r); });
    }

    // Research
    if (p.researchUpdates?.length) {
      html += '<h3 style="font-size:16px;font-weight:600;margin:24px 0 14px">最新研究</h3>';
      p.researchUpdates.forEach(r => { html += Components.researchCard(r); });
    }

    container.innerHTML = html;
  }

  // ---- Chat ----
  async sendChat() {
    const input = document.getElementById('chat-input');
    if (!input || !input.value.trim()) return;

    const msg = input.value.trim();
    input.value = '';

    const history = store.get('conversationHistory') || [];
    history.push({ role: 'user', content: msg, timestamp: new Date().toISOString() });
    store.set('conversationHistory', history);
    this.renderChatMessages();

    // Generate response
    try {
      const apiKey = aiEngine.getApiKey(store.get('selectedModel'));
      let responseText;

      // ALL responses via API prompt
      const result = await this.analyzeViaAPI(msg, 'text_analysis');
      if (result._raw) {
        responseText = result._raw;
      } else if (result.findings) {
        responseText = (result.summary ? result.summary + '\n\n' : '') + result.findings;
        if (result.actions?.length) responseText += '\n\n推奨アクション:\n' + result.actions.map(a => '→ ' + a).join('\n');
      } else {
        if (advice.actions.length > 0) {
          responseText += '\n\n📋 推奨アクション:\n' + advice.actions.map(a => '→ ' + a).join('\n');
        }
      }

      history.push({ role: 'assistant', content: responseText, timestamp: new Date().toISOString() });
      store.set('conversationHistory', history);
      this.renderChatMessages();
    } catch (err) {
      history.push({ role: 'assistant', content: 'すみません、応答の生成中にエラーが発生しました。もう一度お試しください。\n\nエラー: ' + err.message, timestamp: new Date().toISOString() });
      store.set('conversationHistory', history);
      this.renderChatMessages();
    }
  }

  renderChatMessages() {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    const history = store.get('conversationHistory') || [];
    container.innerHTML = history.map(m => Components.chatMessage(m)).join('');
    container.scrollTop = container.scrollHeight;
  }

  // ---- Integrations ----
  importPlaudTranscript() {
    const text = document.getElementById('plaud-transcript')?.value?.trim();
    const title = document.getElementById('plaud-title')?.value?.trim() || 'Plaud会話記録';
    const date = document.getElementById('plaud-date')?.value;

    if (!text) { Components.showToast('テキストを入力してください', 'error'); return; }

    const parsed = Integrations.plaud.parseTranscript(text);
    Integrations.plaud.saveTranscript(parsed, { title, date: date ? new Date(date + 'T12:00:00').toISOString() : undefined });

    document.getElementById('plaud-transcript').value = '';
    document.getElementById('plaud-title').value = '';

    Components.showToast(`会話記録を取り込みました（${parsed.entries.length}発言, ${parsed.wordCount}語）`, 'success');

    // Navigate to dashboard and run API analysis
    this.navigate('dashboard');

    // ALL analysis via API
    setTimeout(() => {
      this.analyzeViaAPI('[会話データ] ' + title + '\n' + text, 'conversation_analysis').then(result => {
        store.set('latestFeedback', result);
        // Save AI comment for the Plaud entry
        const plaudEntries = (store.get('textEntries') || []).filter(e => e.type === 'plaud_transcript');
        const lastPlaud = plaudEntries[plaudEntries.length - 1];
        if (lastPlaud) this.saveAIComment(lastPlaud.id, result);
        const el = document.getElementById('dash-ai-feedback');
        if (el) el.innerHTML = this.renderAnalysisCard(result);
      });
    }, 500);
  }

    items.forEach(item => {
      const keywords = item.name.toLowerCase().split(/[（）/・]+/).filter(k => k.length > 1);
      if (keywords.some(k => recentText.includes(k))) item.relevance += 5;
    });

    // Low health score boosts energy/recovery items
    if (score < 40) {
      items.find(i => i.id === 'coq10').relevance += 3;
      items.find(i => i.id === 'bcomplex').relevance += 3;
      items.find(i => i.id === 'magnesium').relevance += 2;
    }

    items.sort((a, b) => b.relevance - a.relevance);

    // Pattern-based quick insights
    if (/pem|労作後|倦怠感がひどい|動けな/.test(lower)) return 'PEMの兆候。24-48時間の安静を推奨。活動量の見直しが必要です。';
    if (/疼痛|痛[いみ]|頭痛/.test(lower)) return '疼痛記録。痛みの時間帯・トリガーのパターンを追跡中。';
    if (/頭痛|偏頭痛|片頭痛/.test(lower)) return '頭痛パターンを追跡中。頻度・トリガー（気圧/食事/ストレス/生理周期）の記録が予防に繋がります。';
    if (/生理|月経|pms|ホルモン/.test(lower)) return '月経・ホルモン周期を追跡中。体調との相関分析で症状予防が可能になります。';
    if (/更年期|ホットフラッシュ/.test(lower)) return '更年期症状の記録。エクオール・漢方・HRT等の選択肢を主治医と相談してください。';
    if (/お腹|下痢|便秘|吐き気|胃/.test(lower)) return '消化器症状を追跡中。食事内容との相関が見えてくると改善策が明確に。';
    if (/めまい|ふらつき|立ちくらみ/.test(lower)) return 'めまいの記録。水分・塩分摂取量と起立時の状況を合わせて記録すると診断の助けに。';
    if (/肌荒れ|かゆ|湿疹|アトピー/.test(lower)) return '皮膚症状を記録中。食事・ストレス・環境との相関を分析しています。';
    if (/息苦し|呼吸|胸が/.test(lower)) return '呼吸器症状の記録。腹式呼吸の練習と姿勢改善が基本的な対策です。';
    if (/だるい|倦怠|疲れ/.test(lower)) return '疲労の記録。鉄・ビタミンB12・甲状腺機能の検査を検討してください。';
    if (/鬱|孤独|辛|死|ネガティ|絶望/.test(lower)) return '精神面のケアが重要です。信頼できる方への連絡を検討してください。';
    if (/眠[れり]|不眠|寝[れた]/.test(lower)) return '睡眠パターンを追跡中。睡眠衛生の見直しで改善の可能性があります。';
    if (/先生|診察|クリニック|病院/.test(lower)) return '医療記録。次回診察に向けてこの記録を共有することを推奨。';
    if (/ツートラム|リンデロン|エチゾラム|ステロイド|プレドニゾ/.test(lower)) return '服薬メモ。効果と副作用を追跡しています。';
    if (/コエンザイム|nmn|ビタミン|マグネシウム|サプリ/.test(lower)) return 'サプリメント記録。効果評価のため2-4週間の継続観察を。';
    if (/良[いか]|楽|元気|調子が良|できた|回復/.test(lower)) return '改善傾向。何が効果的だったか分析し、再現性を高めましょう。';
    if (/エプソムソルト|風呂|入浴/.test(lower)) return '入浴療法の記録。マグネシウム吸収と自律神経調整の効果を追跡。';
    if (/瞑想|呼吸法|ヨガ/.test(lower)) return '迷走神経トーニング効果を記録中。継続が自律神経改善の鍵です。';
    if (/気圧|天候|天気/.test(lower)) return '気象感受性を記録。気圧変動と症状の相関を分析しています。';
    if (/ジム|運動|散歩|ストレッチ/.test(lower)) return '活動記録。翌日のPEM有無を確認し、安全な活動量を学習中。';
    if (/食[べ事]|ご飯|料理/.test(lower)) return '食事記録。栄養バランスと体調の相関を分析中。';

    // Generic insight based on text length
    if (text.length > 200) return '詳しい記録ありがとうございます。蓄積データから傾向を整理しています。';
    if (text.length > 50) return '記録を継続中。パターンの把握精度が向上しています。';
    return '';
  }

  // ============================================================
  // Unified API Analysis - ALL advice comes from prompts, not JS
  // ============================================================

  // Main entry point: analyze any user input via API
  async analyzeViaAPI(input, type, options = {}) {
    const apiKey = aiEngine.getApiKey(store.get('selectedModel'));

    // Select prompt template
    let promptTemplate = INLINE_PROMPTS[type] || INLINE_PROMPTS.text_analysis;
    let prompt = promptTemplate
      .replace(/\{\{INPUT\}\}/g, (input || '').substring(0, 8000))
      .replace(/\{\{SEED\}\}/g, Math.floor(Date.now() / 86400000).toString());

    // Interpolate standard variables
    prompt = aiEngine.interpolatePrompt(prompt, aiEngine.collectCurrentUserData());

    if (!apiKey) {
      // No API key - return minimal feedback
      return {
        summary: '記録を保存しました。',
        findings: 'APIキーを設定すると、詳細な分析結果が表示されます。\n管理パネル → APIキータブで設定してください。',
        actions: ['管理者にAPIキーの設定を依頼する'],
        products: [],
        _fromAPI: false
      };
    }

    try {
      const modelOptions = { maxTokens: 2048 };
      if (options.imageBase64) modelOptions.imageBase64 = options.imageBase64;
      if (type === 'image_analysis') {
        modelOptions.systemPrompt = '画像を詳細に分析し、慢性疾患患者の健康管理に役立つ情報を日本語で提供してください。必ずJSON形式で返してください。';
      }

      const response = await aiEngine.callModel(store.get('selectedModel'), prompt, modelOptions);

      // Try to parse JSON response
      try {
        // Extract JSON from response (may be wrapped in markdown code block)
        const jsonMatch = (response || '').match(/\{[\s\S]*\}|\[[\s\S]*\]/);
        if (jsonMatch) {
          const parsed = JSON.parse(jsonMatch[0]);
          parsed._fromAPI = true;
          parsed._raw = response;
          return parsed;
        }
      } catch (e) {
        // Not JSON - return as text
      }

      // Return raw text response
      return {
        summary: '',
        findings: response,
        actions: [],
        products: [],
        _fromAPI: true,
        _raw: response
      };
    } catch (err) {
      console.warn('[API Analysis] Failed:', err.message);
      return {
        summary: '記録を保存しました。',
        findings: '分析を実行できませんでした。しばらくしてからもう一度お試しください。',
        actions: [],
        products: [],
        _fromAPI: false
      };
    }
  }

  // Render API analysis result as HTML card
  renderAnalysisCard(result) {
    if (!result) return '';

    // If raw text (not JSON), render as formatted text
    if (result._raw && !result.summary && result.findings === result._raw) {
      return `
        <div class="card" style="border-left:4px solid var(--success);margin-bottom:12px">
          <div class="card-body" style="padding:14px 16px">
            <div style="font-size:13px;color:var(--text-primary);line-height:1.8;white-space:pre-wrap">${Components.formatMarkdown(result._raw)}</div>
          </div>
        </div>`;
    }

    const urgencyColor = result.urgency === 'urgent' ? 'var(--danger)' : result.urgency === 'attention' ? 'var(--warning)' : 'var(--accent)';

    let html = `<div class="card" style="border-left:4px solid ${urgencyColor};margin-bottom:12px">`;

    // Summary
    if (result.summary) {
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600">${result.summary}</div>`;
    }

    // Findings
    if (result.findings) {
      html += `<div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.8;white-space:pre-wrap">${Components.formatMarkdown(result.findings)}</div>
      </div>`;
    }

    // Details (for image analysis)
    if (result.details) {
      html += `<div style="padding:12px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.8;white-space:pre-wrap">${Components.formatMarkdown(result.details)}</div>
      </div>`;
    }

    // Actions
    if (result.actions && result.actions.length > 0) {
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px">推奨アクション</div>
        ${result.actions.map(a => `<div style="font-size:12px;margin-bottom:3px"><span style="color:var(--accent)">→</span> ${a}</div>`).join('')}
      </div>`;
    }

    // New approach (fresh suggestion user hasn't tried)
    if (result.new_approach) {
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border);background:linear-gradient(135deg, rgba(99,102,241,0.03), rgba(168,85,247,0.03))">
        <div style="font-size:11px;font-weight:600;color:#6366f1;margin-bottom:4px">✨ 新しい打ち手</div>
        <div style="font-size:12px;color:var(--text-primary);line-height:1.7;white-space:pre-wrap">${Components.formatMarkdown(result.new_approach)}</div>
      </div>`;
    }

    // Trend analysis
    if (result.trend) {
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px">📈 経過の変化</div>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap">${Components.formatMarkdown(result.trend)}</div>
      </div>`;
    }

    // Products
    if (result.products && result.products.length > 0) {
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:6px">おすすめ</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${result.products.map(p => `<a href="${p.url || '#'}" target="_blank" rel="noopener" class="btn btn-sm btn-outline" style="font-size:10px">${p.name}</a>`).join('')}
        </div>
      </div>`;
    }

    // Next check / tracking reminder
    if (result.next_check) {
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px">📋 次にやること</div>
        <div style="font-size:12px;color:var(--text-secondary);line-height:1.7">${Components.formatMarkdown(result.next_check)}</div>
      </div>`;
    }

    // Monitoring metrics
    if (result.monitoring?.items?.length) {
      const statusIcons = { improving: '📈', stable: '➡️', declining: '📉', unknown: '❓' };
      const statusColors = { improving: 'var(--success)', stable: 'var(--text-muted)', declining: 'var(--danger)', unknown: 'var(--text-muted)' };
      html += `<div style="padding:10px 16px;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:11px;font-weight:600;color:var(--text-muted)">📊 定点観測</div>
          ${result.monitoring.overall_trend ? `<span style="font-size:10px;color:${result.monitoring.overall_trend.includes('改善') ? 'var(--success)' : result.monitoring.overall_trend.includes('注意') ? 'var(--danger)' : 'var(--text-muted)'}">${result.monitoring.overall_trend}</span>` : ''}
        </div>
        ${result.monitoring.items.slice(0, 6).map(m => `
          <div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:11px">
            <span>${statusIcons[m.status] || '❓'}</span>
            <span style="flex:1;color:var(--text-secondary)">${m.metric}</span>
            <span style="font-weight:600;color:${statusColors[m.status] || 'var(--text-muted)'}">${m.current || '-'}</span>
            <span style="color:var(--text-muted);font-size:10px">目標:${m.target || '-'}</span>
          </div>
        `).join('')}
        ${result.monitoring.next_milestone ? `<div style="font-size:10px;color:var(--accent);margin-top:6px">🎯 ${result.monitoring.next_milestone}</div>` : ''}
      </div>`;
    }

    // Deeper prompt
    if (result.deeper_prompt) {
      html += `<div style="padding:8px 16px;background:var(--accent-bg);font-size:11px;color:var(--accent)">💡 ${result.deeper_prompt}</div>`;
    }

    html += '</div>';
    return html;
  }

  // Auto-translate URLs for non-tech-savvy users (avg age 65)
  // Uses translate.goog format which works better than translate.google.com/translate
  translateUrl(url) {
    if (!url || url.length < 10) return url || '#';

    // Clean URL: remove non-ASCII chars that may have been appended
    let cleanUrl = url.replace(/[^\x20-\x7E]/g, '').trim().replace(/[.,;:!?]+$/, '');
    if (cleanUrl.length < 10) return url;

    // Don't translate if already translated or internal
    if (cleanUrl.includes('translate.goog') || cleanUrl.includes('translate.google')) return cleanUrl;
    if (cleanUrl.includes('cares.advisers.jp')) return cleanUrl;

    const profile = store.get('userProfile') || {};
    const lang = profile.language || 'ja';

    // Same-language sites: direct link
    const lowerUrl = cleanUrl.toLowerCase();
    const sameLang = {
      'ja': ['.co.jp', '.jp/', '.jp?', 'peatix.com', 'note.com', 'amazon.co.jp'],
      'en': ['.com/', '.com?', '.org/', '.io/', 'pubmed', 'clinicaltrials.gov', 'iherb.com'],
      'ko': ['.co.kr', 'naver.com'],
      'zh': ['.cn/', '.tw/'],
    };
    if ((sameLang[lang] || []).some(p => lowerUrl.includes(p))) return cleanUrl;

    // Translate using translate.goog
    try {
      const parsed = new URL(cleanUrl);
      return `https://${parsed.hostname.replace(/\./g, '-')}.translate.goog${parsed.pathname}${parsed.search ? parsed.search + '&' : '?'}_x_tr_sl=auto&_x_tr_tl=${lang}&_x_tr_hl=${lang}`;
    } catch(e) {
      return cleanUrl;
    }
  }

  async guestAnalyze() {

    if (!input || !input.value.trim()) {
      Components.showToast('体調や気になることを書いてみてください', 'info');
      return;
    }
    const text = input.value.trim();
    const resultEl = document.getElementById('guest-result');
    if (resultEl) resultEl.innerHTML = Components.loading('分析しています...');

    // Collect selected diseases from guest tags
    const selectedTags = document.querySelectorAll('.guest-disease-tag.selected');
    const diseases = Array.from(selectedTags).map(t => t.dataset.id);

    // Temporarily set diseases for prompt interpolation
    const prevDiseases = store.get('selectedDiseases');
    if (diseases.length > 0) store.set('selectedDiseases', diseases);

    const result = await this.analyzeViaAPI(text, 'text_analysis');

    // Restore
    if (prevDiseases) store.set('selectedDiseases', prevDiseases);

    if (resultEl) {
      resultEl.innerHTML = this.renderAnalysisCard(result) +
        `<div style="margin-top:12px;padding:12px;background:#f0fdf4;border-radius:12px;text-align:center">

    const file = event.target.files?.[0];
    if (!file) return;
    const resultEl = document.getElementById('guest-result');
    if (resultEl) resultEl.innerHTML = Components.loading('写真を分析しています...');

    reader.onload = async (ev) => {

      // Determine file category from type and name
      const isImage = file.type.startsWith('image/');

      const fileName = file.name.toLowerCase();

      // Auto-categorize
      let category = 'その他';
      let analysisPrompt = '';

        // Images are likely: food photos, test results, prescriptions, skin conditions
        category = '写真';
        analysisPrompt = `[写真アップロード] ${file.name}
これは画像ファイルです。以下の可能性があります：

【食事写真の場合】
・写真に写っている料理の推定カロリー、栄養バランス（タンパク質/脂質/炭水化物）を分析
・慢性疾患との関連（抗炎症食か、血糖値への影響、腸内環境への影響）
・改善提案（不足している栄養素、追加すべき食材）

・数値を読み取り、基準値との比較

・薬の飲み合わせチェック

  // Image analysis using Vision API
  // File-specific deep analysis
  // ---- Data Page File Upload ----
  dataPageFileUpload(files) {
    if (!files || !files.length) return;
    const resultEl = document.getElementById('data-file-result');
    if (resultEl) resultEl.innerHTML = Components.loading('ファイルを分析中...');

    Array.from(files).forEach(async (file) => {
      const isImage = file.type.startsWith('image/');

      // Try auto-import for non-image files
      if (!isImage) {
        try {
          const count = await Integrations.importFile(file);
          if (count > 0) Components.showToast(`${file.name}: ${count}件のデータを取り込みました`, 'success');
        } catch(e) { /* fall through */ }
      }

      const reader = new FileReader();
      reader.onload = async (ev) => {
        // Save file reference
        store.addHealthData('photos', {
          filename: file.name, type: file.type, size: file.size,
          dataUrl: isImage ? ev.target.result.substring(0, 500) : '',
          category: isImage ? '写真' : 'ファイル'
        });

        // Save to text entries for timeline
        const entryId = Date.now().toString(36) + Math.random().toString(36).substr(2);
        const textEntries = store.get('textEntries') || [];
        textEntries.push({
          id: entryId,
          timestamp: new Date().toISOString(),
          category: isImage ? '写真' : 'ファイル',
          type: 'file_upload',
          title: `📎 ${file.name}`,
          content: `${isImage ? '写真' : 'ファイル'}をアップロード（${(file.size/1024).toFixed(0)}KB）`
        });
        store.set('textEntries', textEntries);

        // Add to conversation history
        const history = store.get('conversationHistory') || [];
        history.push({ role: 'user', content: `[ファイル: ${file.name}]`, timestamp: new Date().toISOString(), type: 'file_upload' });
        store.set('conversationHistory', history);

        Components.showToast(`${file.name} を分析中...`, 'info');

        // Run API analysis
        const imgOpts = isImage ? { imageBase64: ev.target.result } : {};
        const result = await this.analyzeViaAPI(
          `[ファイル: ${file.name}] ${isImage ? '写真' : 'ファイル'}`,
          isImage ? 'image_analysis' : 'text_analysis',
          imgOpts
        );

        // Save AI comment
        this.saveAIComment(entryId, result);
        store.set('latestFeedback', result);

        // Show result on the page
        if (resultEl) {
          resultEl.innerHTML = this.renderAnalysisCard(result);
        }

        Components.showToast(`${file.name} の分析が完了しました`, 'success');
      };
      reader.readAsDataURL(file);
    });
  }

App.prototype.render_dashboard = function() {
  try {
  const disease = store.get('selectedDisease') || { name: 'ME/CFS', icon: '🧠' };
  const score = store.get('healthScore') || 50;
  const symptoms = store.get('symptoms') || [];
  const latest = symptoms[symptoms.length - 1] || {};
  const recs = store.get('recommendations') || [];
  const textEntries = store.get('textEntries') || [];
  const conversations = store.get('conversationHistory') || [];
  const latestAnalysis = store.get('latestAnalysis');

  // Real data counts
  const totalEntries = textEntries.length;
  const totalSymptoms = symptoms.length;
  const lastEntry = textEntries[textEntries.length - 1];
  const lastUpdate = lastEntry ? new Date(lastEntry.timestamp).toLocaleString('ja-JP') : (symptoms.length ? new Date(latest.timestamp).toLocaleString('ja-JP') : '未記録');

  // Calculate real stats from symptom data
  const recent7 = symptoms.filter(s => (Date.now() - new Date(s.timestamp)) < 7 * 86400000);
  const avgField = (arr, f) => { const v = arr.map(s => s[f]).filter(x => x != null); return v.length ? (v.reduce((a,b) => a+b, 0) / v.length).toFixed(1) : '--'; };
  const changeField = (arr, f) => {
    if (arr.length < 2) return 0;
    const half = Math.floor(arr.length / 2);
    const first = arr.slice(0, half).map(s => s[f]).filter(x => x != null);
    const second = arr.slice(half).map(s => s[f]).filter(x => x != null);
    if (!first.length || !second.length) return 0;
    const avg1 = first.reduce((a,b) => a+b, 0) / first.length;
    const avg2 = second.reduce((a,b) => a+b, 0) / second.length;
    return avg1 === 0 ? 0 : Math.round(((avg2 - avg1) / avg1) * 100);
  };

  const fatigueAvg = avgField(recent7, 'fatigue_level');
  const painAvg = avgField(recent7, 'pain_level');
  const fogAvg = avgField(recent7, 'brain_fog');
  const sleepAvg = avgField(recent7, 'sleep_quality');
  const fatigueChange = changeField(recent7, 'fatigue_level');
  const painChange = changeField(recent7, 'pain_level');
  const fogChange = changeField(recent7, 'brain_fog');
  const sleepChange = changeField(recent7, 'sleep_quality');

  // Latest text entries for dashboard
  const recentTexts = textEntries.slice(-3).reverse();

  // Show all selected diseases
  const selectedDiseases = store.get('selectedDiseases') || [];
  const diseaseNames = [];

    if (id === 'custom') { diseaseNames.push(store.get('customDiseaseName') || 'その他'); return; }
    for (const cat of CONFIG.DISEASE_CATEGORIES) {
      const found = cat.diseases.find(d => d.id === id);
      if (found) { diseaseNames.push(found.name); break; }
    }

  const diseaseTagsHtml = diseaseNames.length > 0
    ? diseaseNames.map(n => `<span class="tag tag-accent" style="font-size:10px">${n}</span>`).join(' ')
    : `<span class="tag tag-accent" style="font-size:10px">${disease.name}</span>`;

  const latestParsed = latestAnalysis?.parsed || latestAnalysis?.result || {};
  const latestAlerts = latestParsed.riskAlerts || [];
  const allRecs = recs.length > 0 ? recs : (latestParsed.recommendations || []);
  const hasData = totalEntries > 0 || totalSymptoms > 0;

    const insight = app.generateQuickInsight(e.content || '');
    return { ...e, _insight: insight };

  // Welcome message for new users (minimal)

    <div style="text-align:center;padding:12px 0;font-size:13px;color:var(--text-muted)">

  return `
  <!-- 1. Quick Input Area (always top) -->

        </div>

          <button class="btn btn-primary btn-sm" onclick="app.dashQuickSubmit()">送信</button>
          <label class="btn btn-secondary btn-sm" style="cursor:pointer;text-align:center">
            📎
            <input type="file" hidden multiple accept="image/*,.pdf,.csv,.json,.xml,.txt" onchange="app.dashQuickFile(event)">
          </label>

// Timeline Page
App.prototype.render_timeline = function() {
  // Collect ALL data sources
  const allEntries = [];

  // Text entries (diary, notes)
  (store.get('textEntries') || []).forEach(d => allEntries.push({
    ...d, _type: 'text', _icon: '📝', _label: d.title || '日記',
    _category: d.category || 'other'
  }));

  // Symptoms
  (store.get('symptoms') || []).forEach(d => {
    if (d.text_note) {
      allEntries.push({ ...d, _type: 'symptom_note', _icon: '📝', _label: d.title || '症状メモ' });
    } else {
      allEntries.push({ ...d, _type: 'symptom_data', _icon: '📊', _label: '症状スコア' });
    }
  });

  // Vitals
  (store.get('vitals') || []).forEach(d => allEntries.push({
    ...d, _type: 'vitals', _icon: '💓', _label: 'バイタル'
  }));

  // Blood tests
  (store.get('bloodTests') || []).forEach(d => allEntries.push({
    ...d, _type: 'blood', _icon: '🩸', _label: '血液検査'
  }));

  // Medications
  (store.get('medications') || []).forEach(d => allEntries.push({
    ...d, _type: 'medication', _icon: '💊', _label: '服薬記録'
  }));

  // Sleep
  (store.get('sleepData') || []).forEach(d => allEntries.push({
    ...d, _type: 'sleep', _icon: '😴', _label: '睡眠'
  }));

  // Activity
  (store.get('activityData') || []).forEach(d => allEntries.push({
    ...d, _type: 'activity', _icon: '🚶', _label: '活動量'
  }));

  // Photos
  (store.get('photos') || []).forEach(d => allEntries.push({
    ...d, _type: 'photo', _icon: '📸', _label: d.filename || '写真'
  }));

  // Conversation history (AI chat)
  (store.get('conversationHistory') || []).filter(c => c.type === 'data_entry').forEach(d => {
    // Already in textEntries, skip duplicates
  });

  // Sort by timestamp (newest first)
  allEntries.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0));

  // Group by date
  const byDate = {};
  allEntries.forEach(e => {
    const dateKey = e.timestamp ? new Date(e.timestamp).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' }) : '日付不明';
    if (!byDate[dateKey]) byDate[dateKey] = [];
    byDate[dateKey].push(e);
  });

  // Category labels for filter
  const categoryLabels = {
    text: '日記・メモ', symptom_note: '症状メモ', symptom_data: '症状スコア',
    vitals: 'バイタル', blood: '血液検査', medication: '服薬',
    sleep: '睡眠', activity: '活動', photo: '写真'
  };

  // Render entries
  const renderEntry = (e) => {
    const time = e.timestamp ? new Date(e.timestamp).toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit' }) : '';
    const skipKeys = ['id', 'timestamp', 'category', '_type', '_icon', '_label', '_category', 'createdAt', '_synced', 'type', 'source', 'dataUrl'];

    // Text entries - show formatted content
    if (e._type === 'text' || e._type === 'symptom_note') {
      const content = e.content || e.text_note || '';
      const aiInsight = app.generateQuickInsight(content);
      return `
        <div class="card" style="margin-bottom:10px;border-left:3px solid var(--accent)">
          <div class="card-body" style="padding:12px 16px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div style="display:flex;align-items:center;gap:8px">
                <span>${e._icon}</span>
                <span style="font-size:12px;font-weight:600">${e._label}</span>
                ${e._category ? `<span class="tag tag-accent" style="font-size:9px">${e._category}</span>` : ''}
              </div>
              <span style="font-size:11px;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${time}</span>
            </div>
            <div style="font-size:13px;color:var(--text-primary);line-height:1.8;white-space:pre-wrap;margin-bottom:8px">${content}</div>
            ${aiInsight ? `<div style="padding:8px 12px;background:var(--accent-bg);border-radius:var(--radius-sm);font-size:11px;color:var(--accent)"><strong>分析:</strong> ${aiInsight}</div>` : ''}
          </div>
        </div>`;
    }

    // Symptom scores
    if (e._type === 'symptom_data') {
      const fields = [];
      if (e.fatigue_level != null) fields.push(`疲労: ${e.fatigue_level}/7`);
      if (e.pain_level != null) fields.push(`痛み: ${e.pain_level}/7`);
      if (e.brain_fog != null) fields.push(`脳霧: ${e.brain_fog}/7`);
      if (e.sleep_quality != null) fields.push(`睡眠: ${e.sleep_quality}/7`);
      if (e.pem_status) fields.push('PEM: あり');
      const avgScore = fields.length > 0 ? '（平均 ' + (((e.fatigue_level||0)+(e.pain_level||0)+(e.brain_fog||0))/3).toFixed(1) + '/7）' : '';
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-bottom:6px">
          <span>${e._icon}</span>
          <span style="font-size:12px;flex:1">${fields.join(' | ')}</span>
          <span style="font-size:11px;color:var(--text-muted)">${avgScore} ${time}</span>
        </div>`;
    }

    // Vitals
    if (e._type === 'vitals') {
      const fields = [];
      if (e.heart_rate) fields.push(`HR: ${e.heart_rate}bpm`);
      if (e.temperature) fields.push(`体温: ${e.temperature}°C`);
      if (e.spo2) fields.push(`SpO2: ${e.spo2}%`);
      if (e.bp_systolic) fields.push(`BP: ${e.bp_systolic}/${e.bp_diastolic}`);
      if (e.hrv) fields.push(`HRV: ${e.hrv}ms`);
      if (e.weight) fields.push(`体重: ${e.weight}kg`);
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-bottom:6px">
          <span>💓</span>
          <span style="font-size:12px;flex:1">${fields.join(' | ') || 'バイタルデータ'}</span>
          <span style="font-size:11px;color:var(--text-muted)">${time}</span>
        </div>`;
    }

    // Photos
    if (e._type === 'photo') {
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-bottom:6px">
          <span>📸</span>
          <span style="font-size:12px;flex:1">${e.filename || '画像'} (${e.type || ''}, ${e.size ? (e.size/1024).toFixed(0)+'KB' : ''})</span>
          <span style="font-size:11px;color:var(--text-muted)">${time}</span>
        </div>`;
    }

    // Generic data entry
    const dataFields = Object.entries(e)
      .filter(([k, v]) => !skipKeys.includes(k) && v != null && v !== '' && !k.startsWith('_'))
      .map(([k, v]) => `<span style="margin-right:12px"><strong style="color:var(--text-muted)">${k}:</strong> ${v}</span>`)
      .join('');
    return `
      <div style="display:flex;align-items:start;gap:10px;padding:8px 14px;background:var(--bg-tertiary);border-radius:var(--radius-sm);margin-bottom:6px">
        <span>${e._icon}</span>
        <div style="font-size:12px;flex:1;line-height:1.6">${dataFields || e._label}</div>
        <span style="font-size:11px;color:var(--text-muted);white-space:nowrap">${time}</span>
      </div>`;
  };

  // Render by date
  const dateGroups = Object.entries(byDate).map(([dateStr, entries]) => `
    <div style="margin-bottom:24px">
      <div style="font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--accent);display:inline-block">${dateStr}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;display:inline;margin-left:10px">${entries.length}件</div>
      ${entries.map(renderEntry).join('')}
    </div>
  `).join('');

  return `
  <div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
    <div>
      <h2 style="font-size:18px;font-weight:700;margin-bottom:4px">経過・データ一覧</h2>
      <p style="font-size:12px;color:var(--text-muted)">${allEntries.length}件のデータ（日記・検査・薬剤・バイタル・写真）</p>
    </div>
    <div style="display:flex;gap:8px">
      <select class="form-select" style="width:auto;font-size:12px" onchange="app.filterTimeline(this.value)">
        <option value="">すべて表示</option>
        ${Object.entries(categoryLabels).map(([k, v]) => `<option value="${k}">${v}</option>`).join('')}
      </select>
    </div>
  </div>
  <div id="timeline-content">
    ${allEntries.length > 0 ? dateGroups : Components.emptyState('📅', 'データがありません', 'ダッシュボードから体調を記録すると、ここに時系列で表示されます。')}
  </div>`;
};

// Admin Page
App.prototype.render_admin = function() {
  const model = store.get('selectedModel') || 'claude-sonnet-4-6';
  // Merge: DEFAULT_PROMPTS as base, user customPrompts override
  const userPrompts = store.get('customPrompts') || {};
  const prompts = { ...DEFAULT_PROMPTS, ...userPrompts };

  const modelCards = CONFIG.AI_MODELS.map(m => `
    <div class="action-card ${m.id === model ? 'selected' : ''}"
      onclick="app.setModel('${m.id}')"
      style="${m.id === model ? 'border-color:var(--accent);background:var(--accent-bg)' : ''}">
      <div class="action-card-title">${m.name}</div>
      <div class="action-card-desc">${m.provider} - ${m.description}</div>
      ${m.id === model ? '<span class="tag tag-accent">使用中</span>' : ''}
    </div>
  `).join('');

  // Group prompts by disease
  const promptsByDisease = {};
  Object.entries(prompts).forEach(([key, p]) => {
    const group = p.disease || '_universal';
    if (!promptsByDisease[group]) promptsByDisease[group] = [];
    promptsByDisease[group].push({ key, ...p });
  });

  const diseaseLabels = { '_universal': '共通（全疾患・健常者）' };
  CONFIG.DISEASE_CATEGORIES.forEach(cat => {
    cat.diseases.forEach(d => { diseaseLabels[d.id] = d.name; });
  });

  const promptEditors = Object.entries(promptsByDisease).map(([diseaseId, promptList]) => `
    <div style="margin-bottom:24px">
      <h4 style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px;padding:6px 12px;background:var(--accent-bg);border-radius:var(--radius-xs);display:inline-block">${diseaseLabels[diseaseId] || diseaseId}（${promptList.length}件）</h4>
      ${promptList.map(p => `
        <div class="card" style="margin-bottom:16px">
          <div class="card-header" style="padding:14px 20px">
            <div style="flex:1">
              <input class="form-input" data-prompt-name="${p.key}" value="${p.name}"
                style="font-weight:600;border:none;background:transparent;padding:0;font-size:14px;color:var(--text-primary);width:100%">
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${p.description || ''}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
              <select class="form-select" data-prompt-disease="${p.key}" style="font-size:11px;padding:4px 8px;width:auto">
                <option value="_universal" ${(p.disease||'_universal')==='_universal'?'selected':''}>共通</option>
                ${CONFIG.DISEASE_CATEGORIES.map(cat => `<optgroup label="${cat.name}">${cat.diseases.map(d => `<option value="${d.id}" ${p.disease===d.id?'selected':''}>${d.name}</option>`).join('')}</optgroup>`).join('')}
              </select>
              <select class="form-select" data-prompt-schedule="${p.key}" style="font-size:11px;padding:4px 8px;width:auto">

                <option value="weekly" ${p.schedule==='weekly'?'selected':''}>毎週</option>

                <option value="manual" ${p.schedule==='manual'?'selected':''}>手動</option>

            </div>
          </div>
          <div class="card-body" style="padding:0">
            <textarea class="form-textarea" data-prompt-text="${p.key}"
              style="min-height:300px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;border:none;border-radius:0;border-top:1px solid var(--border);resize:vertical">${p.prompt}</textarea>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');

  const affConfig = store.get('affiliateConfig') || {};
  const affFields = CONFIG.AFFILIATE_NETWORKS.map(n => `
    <div class="form-group" style="display:flex;align-items:center;gap:12px">
      <label style="min-width:120px;font-size:13px;font-weight:500">${n.name}</label>
      <input class="form-input" name="aff_${n.id}" value="${affConfig[n.id]?.tag || n.tag || n.code || ''}" placeholder="タグ/コード" style="flex:1">
    </div>
  `).join('');

  // Flat list of all prompts for table view

    <h2 style="font-size:18px;font-weight:700;margin-bottom:6px">管理パネル</h2>

    <div class="tab active" onclick="app.switchAdminTab('prompts')">プロンプト管理（${totalPrompts}）</div>

// Export Data utility
App.prototype.exportData = function() {
  const data = {
    exportDate: new Date().toISOString(),
    user: store.get('user'),
    disease: store.get('selectedDisease'),
    selectedDiseases: store.get('selectedDiseases'),
    symptoms: store.get('symptoms'),
    vitals: store.get('vitals'),
    bloodTests: store.get('bloodTests'),
    medications: store.get('medications'),
    supplements: store.get('supplements'),
    meals: store.get('meals'),
    sleepData: store.get('sleepData'),
    activityData: store.get('activityData'),
    analysisHistory: store.get('analysisHistory'),
    conversationHistory: store.get('conversationHistory'),
    textEntries: store.get('textEntries'),
    customPrompts: store.get('customPrompts'),
    selectedModel: store.get('selectedModel')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `chroniccare_export_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  Components.showToast('データをエクスポートしました', 'success');
};

// Import Data from JSON file
App.prototype.importDataFile = function(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      let count = 0;

      const importKeys = [
        'selectedDisease', 'selectedDiseases', 'symptoms', 'vitals',
        'bloodTests', 'medications', 'supplements', 'meals',
        'sleepData', 'activityData', 'analysisHistory',
        'conversationHistory', 'textEntries', 'customPrompts', 'selectedModel'
      ];

      importKeys.forEach(key => {
        if (data[key] !== undefined && data[key] !== null) {
          const existing = store.get(key);
          if (Array.isArray(existing) && Array.isArray(data[key])) {
            // Merge arrays (avoid duplicates by id)
            const existingIds = new Set(existing.map(e => e.id).filter(Boolean));
            const newItems = data[key].filter(item => !item.id || !existingIds.has(item.id));
            store.set(key, [...existing, ...newItems]);
            count += newItems.length;
          } else if (!existing || (Array.isArray(existing) && existing.length === 0) || (typeof existing === 'object' && Object.keys(existing).length === 0)) {
            store.set(key, data[key]);
            count++;
          }
        }
      });

      store.calculateHealthScore();
      Components.showToast('データをインポートしました（' + count + '件）', 'success');

      // Sync to Firestore if connected
      if (FirebaseBackend.initialized) {
        FirebaseBackend.loadAllData().then(() => {
          // Re-save all imported data to Firestore
          const textEntries = store.get('textEntries') || [];
          textEntries.forEach(entry => {
            if (!entry._synced) {
              FirebaseBackend.saveHealthEntry('textEntries', entry);
              entry._synced = true;
            }
          });
        });
        Components.showToast('Firestoreに同期中...', 'info');
      }
    } catch (err) {
      Components.showToast('インポートエラー: ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
};

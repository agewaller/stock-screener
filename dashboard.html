<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChronicCare AI - 慢性疾患管理ダッシュボード</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a class="sidebar-logo">
          <div class="sidebar-logo-icon">⚕️</div>
          <div>
            <span class="sidebar-logo-text">ChronicCare AI</span>
            <span class="sidebar-logo-sub">慢性疾患管理システム</span>
          </div>
        </a>
      </div>
      <nav class="sidebar-nav">
        <!-- Nav section: メイン -->
        <div class="nav-section-title">メイン</div>
        <a class="nav-item" data-page="dashboard" onclick="app.navigate('dashboard')">
          <span class="icon">📊</span> ダッシュボード
        </a>
        <a class="nav-item" data-page="data-input" onclick="app.navigate('data-input')">
          <span class="icon">📝</span> データ入力
        </a>
        <a class="nav-item" data-page="analysis" onclick="app.navigate('analysis')">
          <span class="icon">🤖</span> AI分析
        </a>
        <a class="nav-item" data-page="actions" onclick="app.navigate('actions')">
          <span class="icon">⚡</span> アクションセンター
        </a>

        <!-- Nav section: 情報 -->
        <div class="nav-section-title">情報</div>
        <a class="nav-item" data-page="research" onclick="app.navigate('research')">
          <span class="icon">🔬</span> 最新研究
        </a>
        <a class="nav-item" data-page="chat" onclick="app.navigate('chat')">
          <span class="icon">💬</span> AIコンサルタント
        </a>
        <a class="nav-item" data-page="timeline" onclick="app.navigate('timeline')">
          <span class="icon">📅</span> タイムライン
        </a>

        <!-- Nav section: システム -->
        <div class="nav-section-title">システム</div>
        <a class="nav-item" data-page="admin" onclick="app.navigate('admin')">
          <span class="icon">⚙️</span> 管理パネル
        </a>
        <a class="nav-item" data-page="settings" onclick="app.navigate('settings')">
          <span class="icon">🔧</span> 設定
        </a>
      </nav>
      <div class="sidebar-user" id="sidebar-user">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">ゲスト</div>
          <div class="user-disease" id="user-disease">未設定</div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div class="top-bar" id="top-bar">
        <div class="top-bar-left">
          <button class="btn btn-icon btn-secondary" onclick="document.getElementById('sidebar').classList.toggle('open')" style="display:none" id="menu-toggle">☰</button>
          <h2 class="top-bar-title" id="top-bar-title">ダッシュボード</h2>
        </div>
        <div class="top-bar-right">
          <button class="btn btn-sm btn-secondary" onclick="app.toggleTheme()" title="テーマ切替">🌓</button>
          <button class="btn btn-sm btn-secondary" onclick="app.navigate('settings')" title="設定">⚙️</button>
        </div>
      </div>
      <div class="page-content" id="page-content">
        <!-- Pages rendered here by JS -->
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)app.closeModal()">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">モーダル</h3>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Application Scripts -->
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/affiliate.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

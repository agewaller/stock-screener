    <text x="0" y="100" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="52" font-weight="900" fill="#451a03">肥満症（医療的肥満）</text>
    <text x="0" y="155" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="32" font-weight="600" fill="#92400e">BMI・診断基準・GLP-1・外科手術ガイド</text>
    <text x="0" y="210" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="24" font-weight="600" fill="#64748b">食事・運動・薬物療法・記録による体重管理の完全ガイド</text>
  </g>
  <g transform="translate(80,380)">

    <text x="0" y="162" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="42" font-weight="900" fill="#334155">（EHS・電磁波不耐症）</text>
    <text x="0" y="218" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="24" font-weight="600" fill="#64748b">電磁波曝露・症状パターン・生活環境を AI で記録・管理</text>

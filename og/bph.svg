    <text x="20" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="24" font-weight="800" fill="#1e3a8a">約530万人</text>
    <rect x="240" y="0" width="340" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="260" y="36" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="16" fill="#64748b">主な症状</text>
    <text x="260" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">頻尿・夜間頻尿・残尿・排尿困難</text>
    <rect x="600" y="0" width="180" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="620" y="36" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="16" fill="#64748b">ICD-11</text>
    <text x="620" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="28" font-weight="800" fill="#1e3a8a">GA90</text>

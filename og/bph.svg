      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>
  <g transform="translate(80,90)">
    <text x="0" y="0" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8" letter-spacing="2">健康日記  HEALTH DIARY</text>
    <text x="0" y="100" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="60" font-weight="900" fill="#1e3a8a">前立腺肥大症</text>
    <text x="0" y="162" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="40" font-weight="900" fill="#1e40af">（BPH・良性前立腺過形成）</text>
    <text x="0" y="218" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="24" font-weight="600" fill="#64748b">頻尿・夜間頻尿・残尿感・排尿困難を AI で記録・管理</text>
  </g>
  <g transform="translate(80,380)">

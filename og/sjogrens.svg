    <text x="0" y="100" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="52" font-weight="900" fill="#082f49">シェーグレン症候群</text>
    <text x="0" y="155" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="28" font-weight="600" fill="#0369a1">ドライアイ・ドライマウス・全身症状の完全ガイド</text>
  </g>

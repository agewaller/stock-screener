    <text x="0" y="218" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="24" font-weight="600" fill="#64748b">口腔潰瘍・眼炎症・皮膚症状を AI で記録・医師に報告</text>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#g)"/>
  <rect x="0" y="0" width="1200" height="8" fill="url(#accent)"/>
  <g transform="translate(80,90)">
    <text x="0" y="0" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#16a34a" letter-spacing="2">健康日記  HEALTH DIARY</text>
    <text x="0" y="100" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="68" font-weight="900" fill="#052e16">NAFLD / MASLD</text>
    <text x="0" y="155" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="32" font-weight="600" fill="#15803d">非アルコール性脂肪性肝疾患</text>
    <text x="0" y="210" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="24" font-weight="600" fill="#64748b">症状・診断・食事療法・経過観察の完全ガイド</text>
  </g>
  <g transform="translate(80,380)">
    <rect x="0" y="0" width="520" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="20" y="36" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="16" fill="#64748b">患者数</text>
    <text x="20" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#1e1b4b">日本 2,000-3,000 万人 / 世界 15 億人</text>
    <rect x="540" y="0" width="280" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="560" y="36" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="16" fill="#64748b">分類</text>
    <text x="560" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#1e1b4b">ICD-11  DB92</text>
  </g>
  <g transform="translate(80,510)">
    <text x="0" y="28" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#1e1b4b">📝  完全無料  ・  広告なし</text>

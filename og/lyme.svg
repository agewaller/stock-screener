    <text x="20" y="32" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="14" fill="#64748b">世界年間新規感染</text>
    <text x="20" y="60" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="28" font-weight="800" fill="#14532d">約 60 万件（米国）</text>
    <rect x="280" y="0" width="280" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="300" y="32" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="14" fill="#64748b">PTLDS（治療後症候群）</text>
    <text x="300" y="60" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="800" fill="#14532d">感染者の約10〜20%</text>
    <rect x="580" y="0" width="220" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="600" y="32" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="14" fill="#64748b">ICD-11</text>
    <text x="600" y="60" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="28" font-weight="800" fill="#14532d">1C1G</text>
  </g>
  <g transform="translate(80,510)">
    <text x="0" y="28" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#14532d">📝  完全無料  ・  広告なし  ・  AI 分析</text>
    <text x="0" y="62" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="20" font-weight="600" fill="#15803d">cares.advisers.jp/lyme.html</text>

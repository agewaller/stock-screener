    <rect x="240" y="0" width="340" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="260" y="36" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="16" fill="#64748b">主な症状</text>
    <text x="260" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#052e16">記憶障害・見当識障害・BPSD</text>
    <rect x="600" y="0" width="180" height="80" rx="12" fill="#fff" opacity="0.85"/>

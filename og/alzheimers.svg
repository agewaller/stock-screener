    <text x="20" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#2e1065">日本 600 万人 / 世界 5,500 万人</text>
    <rect x="540" y="0" width="280" height="80" rx="12" fill="#fff" opacity="0.85"/>
    <text x="560" y="36" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="16" fill="#64748b">分類</text>
    <text x="560" y="64" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#2e1065">ICD-11  8A20</text>
  </g>
  <g transform="translate(80,510)">
    <text x="0" y="28" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="22" font-weight="700" fill="#2e1065">📝  完全無料  ・  広告なし  ・  AI 分析</text>
    <text x="0" y="62" font-family="-apple-system, Hiragino Sans, Noto Sans JP, sans-serif" font-size="20" font-weight="600" fill="#7c3aed">cares.advisers.jp/alzheimers.html</text>
